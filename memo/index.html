<!DOCTYPE html>
<html>
<head>
  <title>메모</title>

  <style>
    body {
      font-family: sans-serif;
      background: #f0f0f0;
      padding: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .left-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
      background: white;
      cursor: pointer;
    }

    button:hover {
      background: #e8e8e8;
    }

    .memo {
      background: white;
      padding: 15px;
      margin-top: 10px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .memo-content {
      flex: 1;
    }

    .title {
      font-weight: bold;
      font-size: 17px;
    }

    .info {
      font-size: 12px;
      color: gray;
      margin-top: 5px;
    }

    #search {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 12px;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    .empty {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      color: gray;
      margin-top: 10px;
    }

    .select-bar {
      margin-bottom: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #version {
      position: fixed;
      right: 15px;
      bottom: 15px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 12px;
      z-index: 9999;
    }

  </style>
</head>

<body>

<div class="top-bar">

  <div class="left-buttons">
    <button onclick="goHome()">홈</button>
    <button onclick="goTrash()">휴지통</button>
    <button onclick="resetAll()">초기화</button>
  </div>

  <button onclick="goCreate()">+ 새 메모</button>

</div>

<div class="select-bar">
  <button onclick="selectAll()">전체 선택</button>
  <button onclick="deleteSelected()">선택 삭제</button>
</div>

<input
  id="search"
  placeholder="검색..."
  oninput="render()"
/>

<div id="list"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  query,
  orderBy,
  deleteDoc,
  doc,
  updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCN6oIrvun0LDBJ940l5c7-cfRrJuePIA",
  authDomain: "memo-5123c.firebaseapp.com",
  projectId: "memo-5123c"
});

const db = getFirestore(app);

let notes = [];

async function load() {

  const q =
    query(
      collection(db, "notes"),
      orderBy("createdAt", "desc")
    );

  const snap =
    await getDocs(q);

  notes = snap.docs.map(d => ({
    id: d.id,
    ...d.data()
  }));

  render();

}

function render() {

  const search =
    document.getElementById("search")
    .value
    .toLowerCase();

  const list =
    document.getElementById("list");

  list.innerHTML = "";

  const filtered = notes
    .filter(n => !n.deleted)
    .filter(n =>
      (n.title || "")
      .toLowerCase()
      .includes(search)
    );

  if (filtered.length === 0) {

    list.innerHTML = `
      <div class="empty">
        메모 없음
      </div>
    `;

    return;
  }

  filtered.forEach(n => {

    const div =
      document.createElement("div");

    div.className = "memo";

    div.innerHTML = `

      <input
        type="checkbox"
        class="memo-check"
        value="${n.id}"
        onclick="event.stopPropagation()"
      >

      <div class="memo-content">

        <div class="title">
          📄 ${n.title}
        </div>

        <div class="info">
          👤 ${n.authorName || "guest"}
          ·
          🕒 ${
            n.createdAt
            ? new Date(n.createdAt).toLocaleString()
            : "알 수 없음"
          }
        </div>

      </div>
    `;

    div.onclick = () => {
      location.href =
        "view.html?id=" + n.id;
    };

    list.appendChild(div);

  });

}

function goHome() {

  location.href =
    "https://25withcoding.kr";

}

function goCreate() {

  location.href = "create.html";

}

function goTrash() {

  location.href = "trash.html";

}

async function resetAll() {

  const password =
    prompt("초기화 비밀번호 입력");

  if (password !== "trandon@webt00n") {

    alert("비밀번호 틀림");
    return;

  }

  const ok =
    confirm("모든 메모를 삭제할까요?");

  if (!ok) return;

  const snap =
    await getDocs(collection(db, "notes"));

  for (const d of snap.docs) {

    await deleteDoc(
      doc(db, "notes", d.id)
    );

  }

  alert("초기화 완료!");

  location.reload();

}

function selectAll() {

  const checks =
    document.querySelectorAll(".memo-check");

  checks.forEach(c => {
    c.checked = true;
  });

}

async function deleteSelected() {

  const checks =
    document.querySelectorAll(".memo-check:checked");

  if (checks.length === 0) {

    alert("선택된 메모 없음");
    return;

  }

  const ok =
    confirm("선택한 메모를 삭제할까요?");

  if (!ok) return;

  for (const c of checks) {

    await updateDoc(
      doc(db, "notes", c.value),
      {
        deleted: true
      }
    );

  }

  alert("선택 삭제 완료!");

  load();

}

window.goHome = goHome;
window.goCreate = goCreate;
window.goTrash = goTrash;
window.resetAll = resetAll;
window.selectAll = selectAll;
window.deleteSelected = deleteSelected;

load();

</script>

<div id="version">
  v26.5.18.8
</div>

</body>
</html>
``
