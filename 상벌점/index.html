<!DOCTYPE html>
<html>
<head>
  <title>로그인</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f0f0f0;
      font-family: sans-serif;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      width: 260px;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 5px;
    }

    h2 {
      font-size: 14px;
      margin-bottom: 20px;
      color: #555;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 12px;
      border: none;
      background: #f5f5f5;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      border-radius: 12px;
      border: none;
      background: #ddd;
      cursor: pointer;
    }

    button:hover {
      background: #ccc;
    }

    .pw-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toggle {
      margin-left: 5px;
      cursor: pointer;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>2026 코딩과 함께라면</h1>
  <h2>상벌점 시스템 로그인</h2>

  <input id="id" placeholder="학번을 입력하세요.">

  <div class="pw-wrap">
    <input id="pw" type="password" placeholder="비밀번호를 입력하세요.">
    <span class="toggle" onclick="togglePw()">보기</span>
  </div>

  <button onclick="login()">로그인</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgOAO72ArbW8dO7OSYsTVEQtRHT049U20",
  authDomain: "points2026-f5e50.firebaseapp.com",
  projectId: "points2026-f5e50"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.togglePw = () => {
  const pw = document.getElementById("pw");
  pw.type = pw.type === "password" ? "text" : "password";
};

window.login = async () => {
  const id = document.getElementById("id").value;
  const pw = document.getElementById("pw").value;

  const snap = await getDoc(doc(db, "users", id));

  if(!snap.exists()){
    alert("계정 없음");
    return;
  }

  const data = snap.data();

  if(pw !== data.password){
    alert("비밀번호 틀림");
    return;
  }

  localStorage.setItem("userId", id);

  if(data.password === data.birth || data.password === "qwer1234!"){
    location.href = "change.html";
  } else {
    location.href = "main.html";
  }
};
</script>

</body>
</html>
