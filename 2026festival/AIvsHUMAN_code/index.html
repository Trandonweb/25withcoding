<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI vs HUMAN</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Pretendard",sans-serif;
}

body{
    background:#f0f0f0;
    color:#222;
    width:100%;
    min-height:100vh;
}

#screen{
    width:100%;
    min-height:100vh;
    padding:24px;
}

/* 홈 */
#homeScreen{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    gap:20px;
}

.logo{
    font-size:2rem;
    font-weight:700;
    margin-bottom:20px;
}

.main-btn{
    width:min(700px,95%);
    min-height:110px;
    border-radius:24px;
    background:#33cc77;
    color:#222;
    font-size:1.3rem;
    font-weight:700;
    cursor:pointer;
}

/* 화면 */
#categoryScreen,
#gameScreen{
    display:none;
}

.top-bar{
    display:flex;
    gap:12px;
    margin-bottom:24px;
}

.back-btn{
    width:50px;
    height:50px;
}

#gameList{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.game-select-btn{
    min-height:150px;
    border-radius:24px;
    background:#33cc77;
    font-size:1.2rem;
    font-weight:700;
    cursor:pointer;
}

#gameArea{
    min-height:70vh;
    border-radius:24px;
    padding:24px;
}
</style>
</head>

<body>

<div id="screen">

    <!-- HOME -->
    <div id="homeScreen">
        <div class="logo">AI vs HUMAN</div>

        <button class="main-btn" onclick="showCategory('intelligence')">지능</button>
        <button class="main-btn" onclick="showCategory('physical')">피지컬</button>
        <button class="main-btn" onclick="showRanking()">랭킹</button>
    </div>

    <!-- CATEGORY -->
    <div id="categoryScreen">

        <div class="top-bar">
            <button class="back-btn" onclick="showHome()">←</button>
            <div id="categoryTitle"></div>
        </div>

        <div id="gameList"></div>
    </div>

    <!-- GAME -->
    <div id="gameScreen">

        <div class="top-bar">
            <button class="back-btn" onclick="backToCategory()">←</button>
            <div id="gameTitle"></div>
        </div>

        <div id="gameArea"></div>
    </div>

</div>

<script>

const intelligenceGames = ["틱택토","미로","숫자 맞추기"];
const physicalGames = ["축구","야구"];

let currentCategory = "";

function showHome(){
    document.getElementById("homeScreen").style.display = "flex";
    document.getElementById("categoryScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "none";
}

function showCategory(type){

    currentCategory = type;

    document.getElementById("homeScreen").style.display = "none";
    document.getElementById("categoryScreen").style.display = "block";
    document.getElementById("gameScreen").style.display = "none";

    document.getElementById("categoryTitle").textContent =
        type === "intelligence" ? "지능" : "피지컬";

    const gameList = document.getElementById("gameList");
    gameList.innerHTML = "";

    const list = type === "intelligence" ? intelligenceGames : physicalGames;

    list.forEach(game=>{
        const btn = document.createElement("button");
        btn.className = "game-select-btn";
        btn.textContent = game;
        btn.onclick = ()=>openGame(game);
        gameList.appendChild(btn);
    });
}

function openGame(game){

    document.getElementById("categoryScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";

    document.getElementById("gameTitle").textContent = game;

    const gameArea = document.getElementById("gameArea");

    if(game === "틱택토"){

        import("./js/games/tictactoe.js").then(m => {
            m.openTicTacToe(gameArea);
        });

        return;
    }

    gameArea.innerHTML = `
        <div class="game-title">${game}</div>
        <div>아직 구현되지 않았습니다.</div>
    `;
}

function backToCategory(){
    showCategory(currentCategory);
}

function showRanking(){
    alert("랭킹 시스템은 추후 구현됩니다.");
}

showHome();

</script>

</body>
</html>
