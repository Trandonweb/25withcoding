<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>휴지통</title>

  <style>

    body {
      font-family: sans-serif;
      background: #f0f0f0;
      margin: 0;
      padding: 20px;
    }

    .top {
      margin-bottom: 15px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: white;
    }

    button:hover {
      background: #eee;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 16px;
      margin-top: 10px;
    }

    .memo {
      background: #f9f9f9;
      padding: 12px;
      border-radius: 12px;
      margin: 8px 0;
    }

    .empty {
      color: gray;
      text-align: center;
      margin-top: 30px;
    }

    .buttons {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    .restore {
      background: #dfffe0;
    }

    .delete {
      background: #ffdede;
    }

    #version {
      position: fixed;
      right: 15px;
      bottom: 15px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 12px;
      z-index: 9999;
    }

  </style>
</head>

<body>

<div class="top">

  <button onclick="goList()">
    ← 목록
  </button>

</div>

<h2>🗑 휴지통</h2>

<div class="card" id="list">
  로딩중...
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  updateDoc,
  deleteDoc,
  doc
}
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCN6oIrvun0LDBJ940l5c7-cfRrJuePIA",
  authDomain: "memo-5123c.firebaseapp.com",
  projectId: "memo-5123c"
});

const db = getFirestore(app);

const listDiv =
  document.getElementById("list");

async function loadTrash() {

  const snap =
    await getDocs(collection(db, "notes"));

  listDiv.innerHTML = "";

  let hasData = false;

  snap.forEach(docu => {

    const data = docu.data();

    if (!data.deleted) return;

    hasData = true;

    const div =
      document.createElement("div");

    div.className = "memo";

    div.innerHTML = `
      <b>${data.title}</b><br>

      <small>
        👤 ${data.authorName || "unknown"}
      </small>

      <div class="buttons">

        <button
          class="restore"
          onclick="restoreMemo('${docu.id}')"
        >
          복구
        </button>

        <button
          class="delete"
          onclick="deleteForever('${docu.id}')"
        >
          영구삭제
        </button>

      </div>
    `;

    listDiv.appendChild(div);

  });

  if (!hasData) {

    listDiv.innerHTML =
      "<div class='empty'>휴지통이 비어있음</div>";

  }

}

async function restoreMemo(id) {

  await updateDoc(
    doc(db, "notes", id),
    {
      deleted: false
    }
  );

  loadTrash();

}

async function deleteForever(id) {

  const ok =
    confirm("영구삭제할까요?");

  if (!ok) return;

  await deleteDoc(
    doc(db, "notes", id)
  );

  loadTrash();

}

function goList() {

  location.href = "index.html";

}

window.restoreMemo = restoreMemo;
window.deleteForever = deleteForever;
window.goList = goList;

loadTrash();

</script>

<div id="version">
  v26.5.18.8
</div>

</body>
</html>
