<!DOCTYPE html>
<html>
<head>
  <title>메모 보기</title>

  <style>

    body {
      font-family: sans-serif;
      background: #f0f0f0;
      padding: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 14px;
      background: white;
      cursor: pointer;
      margin: 3px;
    }

    button:hover {
      background: #e6e6e6;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      border: none;
      border-radius: 14px;
      padding: 12px;
      margin-top: 10px;
      background: #f5f5f5;
      font-family: sans-serif;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
    }

    .info {
      margin-top: 10px;
      color: gray;
      font-size: 14px;
    }

    .content {
      margin-top: 20px;
      background: #f5f5f5;
      padding: 15px;
      border-radius: 14px;
      white-space: pre-wrap;
      font-family: monospace;
      min-height: 200px;
    }

    .hidden {
      display: none;
    }

    .bottom {
      margin-top: 20px;
      text-align: right;
    }

    .center {
      text-align: center;
    }

  </style>
</head>

<body>

<div class="top-bar">

  <button onclick="goBack()">
    뒤로가기
  </button>

</div>

<!-- PIN 입력 -->

<div
  class="card"
  id="pinCard"
>

  <h2>🔒 PIN 입력</h2>

  <input
    id="pinInput"
    type="password"
    maxlength="4"
    inputmode="numeric"
    placeholder="PIN 입력"
  >

  <div class="bottom">

    <button onclick="checkPin()">
      열기
    </button>

  </div>

</div>

<!-- 메모 -->

<div
  class="card hidden"
  id="memoCard"
>

  <div
    class="title"
    id="memoTitle"
  ></div>

  <div
    class="info"
    id="memoInfo"
  ></div>

  <div
    class="content"
    id="memoContent"
  ></div>

  <div class="bottom">

    <button onclick="editMemo()">
      수정
    </button>

    <button onclick="deleteMemo()">
      삭제
    </button>

  </div>

</div>

<script>

  const params =
    new URLSearchParams(location.search);

  const noteId =
    params.get("id");

  function getNotes() {

    return JSON.parse(
      localStorage.getItem("notes")
    ) || [];

  }

  const notes = getNotes();

  const note =
    notes.find(n => n.id === noteId);

  if (!note) {

    alert("메모를 찾을 수 없습니다.");

    location.href = "index.html";

  }

  function checkPin() {

    const input =
      document.getElementById("pinInput")
      .value
      .trim();

    if (input !== note.pin) {

      alert("PIN이 틀렸습니다.");

      return;

    }

    showMemo();

  }

  function showMemo() {

    document.getElementById("pinCard")
      .classList.add("hidden");

    document.getElementById("memoCard")
      .classList.remove("hidden");

    document.getElementById("memoTitle")
      .innerText = "📄 " + note.title;

    document.getElementById("memoInfo")
      .innerText =
        "👤 " + note.author
        + " · 🕒 "
        + note.createdAt;

    document.getElementById("memoContent")
      .innerText = note.content;

  }

  function editMemo() {

    location.href =
      "edit.html?id=" + note.id;

  }

  function deleteMemo() {

    const ok =
      confirm("휴지통으로 이동할까요?");

    if (!ok) return;

    note.deleted = true;

    localStorage.setItem(
      "notes",
      JSON.stringify(notes)
    );

    alert("휴지통으로 이동되었습니다.");

    location.href = "index.html";

  }

  function goBack() {

    location.href = "index.html";

  }

</script>

</body>
</html>
