<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>코딩과 함께라면_메모장</title>

  <style>
    body {
      font-family: sans-serif;
      background: #f0f0f0;
      padding: 20px;
    }

    .notice-box {
      background: #fff7d1;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .notice-title {
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 18px;
    }

    .notice-item {
      background: white;
      border-radius: 10px;
      padding: 12px;
      margin-top: 8px;
      transition: 0.2s;
      font-weight: bold;
      cursor: pointer;
    }

    .notice-item:hover {
      background: #f3f3f3;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .left-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
      background: white;
      cursor: pointer;
    }

    button:hover {
      background: #e8e8e8;
    }

    .memo {
      background: white;
      padding: 15px;
      margin-top: 10px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .memo-content {
      flex: 1;
    }

    .title {
      font-weight: bold;
      font-size: 17px;
    }

    .info {
      font-size: 12px;
      color: gray;
      margin-top: 5px;
    }

    #search {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 12px;
    }

    .empty {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      color: gray;
      margin-top: 10px;
    }

    #version {
      position: fixed;
      right: 15px;
      bottom: 15px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 12px;
    }

    #warning {
      position: fixed;
      left: 15px;
      bottom: 15px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="notice-box">
  <div class="notice-title">📢 공지사항</div>
  <div id="notice-list">
    <div class="notice-item">현재 공지사항이 없습니다.</div>
  </div>
</div>

<div class="top-bar">
  <div class="left-buttons">
    <button onclick="goHome()">홈</button>
    <button onclick="goTrash()">휴지통</button>
    <button onclick="resetAll()">초기화</button>
  </div>
  <button onclick="goCreate()">+ 새 메모</button>
</div>

<div style="display:flex; gap:8px; margin-bottom:10px;">
  <input id="search" placeholder="검색..." onkeydown="handleSearchKey(event)" style="flex:1;">
  <button onclick="render()">검색</button>
</div>

<div class="select-bar">
  <button onclick="selectAll()">전체 선택</button>
  <button onclick="deleteSelected()">선택 삭제</button>
</div>

<div id="list"></div>

<div id="version">v26.6.27.1</div>
<div id="warning">부적절한 어휘는 조치될 수 있습니다.</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  orderBy,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const MASTER_KEY = "20262326";

const app = initializeApp({
  apiKey: "AIzaSyCN6oIrvun0LDBJ940l5c7-cfRrJuePIA",
  authDomain: "memo-5123c.firebaseapp.com",
  projectId: "memo-5123c"
});

const db = getFirestore(app);
const auth = getAuth(app);

let notes = [];

function isNotice(title) {
  return title && title.startsWith("!@#") && title.endsWith("#@!");
}

async function init() {
  try {
    await signInAnonymously(auth);
    await load();
  } catch (error) {
    console.error("초기화 중 오류 발생:", error);
  }
}

async function load() {
  try {
    const q = query(collection(db, "notes"), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);

    notes = snap.docs.map(d => ({
      id: d.id,
      ...d.data()
    }));

    render();
    renderNotice();
  } catch (error) {
    console.error("데이터 로드 중 오류 발생:", error);
    document.getElementById("list").innerHTML = `<div class="empty">데이터를 불러오지 못했습니다.</div>`;
  }
}

function renderNotice() {
  const list = document.getElementById("notice-list");
  if (!list) return;

  const notices = notes.filter(n =>
    !n.deleted && !n.delete && isNotice(n.title)
  );

  if (notices.length === 0) {
    list.innerHTML = `<div class="notice-item">현재 공지사항이 없습니다.</div>`;
    return;
  }

  list.innerHTML = notices.map(n => `
    <div class="notice-item"
      onclick="location.href='view.html?id=${n.id}'">
      ⭐️ ${n.title.replace("!@#", "").replace("#@!", "").trim()}
    </div>
  `).join("");
}

function render() {
  const searchInput = document.getElementById("search");
  const search = searchInput ? searchInput.value.toLowerCase() : "";
  const list = document.getElementById("list");
  if (!list) return;

  const filtered = notes
    .filter(n => !n.deleted && !n.delete)
    .filter(n => !isNotice(n.title))
    .filter(n => {
      const t = (n.title || "").toLowerCase();
      const c = (n.content || "").toLowerCase();
      const a = (n.authorName || "").toLowerCase();
      return t.includes(search) || c.includes(search) || a.includes(search);
    });

  list.innerHTML = "";

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">메모 없음</div>`;
    return;
  }

  filtered.forEach(n => {
    const div = document.createElement("div");
    div.className = "memo";

    div.innerHTML = `
      <input type="checkbox"
        class="memo-check"
        value="${n.id}"
        onclick="event.stopPropagation()">

      <div class="memo-content">
        <div class="title">📄 ${n.title}</div>
        <div class="info">
          👤 ${n.authorName || "guest"}
          · 🕒 ${n.createdAt ? new Date(n.createdAt).toLocaleString() : "알 수 없음"}
        </div>
      </div>
    `;

    div.onclick = () => {
      location.href = "view.html?id=" + n.id;
    };

    list.appendChild(div);
  });
}

function handleSearchKey(e) {
  if (e.key === "Enter") render();
}

function goHome() {
  location.href = "https://25withcoding.kr";
}

function goCreate() {
  location.href = "create.html";
}

function goTrash() {
  location.href = "trash.html";
}

function selectAll() {
  document.querySelectorAll(".memo-check").forEach(c => c.checked = true);
}

async function deleteSelected() {
  const pw = prompt("마스터키 입력");
  if (pw !== MASTER_KEY) return alert("마스터키 틀림");

  const checks = document.querySelectorAll(".memo-check:checked");
  if (!checks.length) return alert("선택된 메모 없음");

  if (!confirm("삭제할까요?")) return;

  for (const c of checks) {
    await updateDoc(doc(db, "notes", c.value), {
      deleted: true
    });
  }

  alert("삭제 완료");
  load();
}

async function resetAll() {
  const pw = prompt("마스터키 입력");
  if (pw !== MASTER_KEY) return alert("마스터키 틀림");

  if (!confirm("전체 삭제할까요?")) return;

  const snap = await getDocs(collection(db, "notes"));

  for (const d of snap.docs) {
    await deleteDoc(doc(db, "notes", d.id));
  }

  alert("초기화 완료");
  location.reload();
}

// HTML 인라인 이벤트 바인딩을 위해 window 객체에 먼저 등록
window.goHome = goHome;
window.goCreate = goCreate;
window.goTrash = goTrash;
window.resetAll = resetAll;
window.selectAll = selectAll;
window.deleteSelected = deleteSelected;
window.handleSearchKey = handleSearchKey;
window.render = render;

// DOM이 완전히 로드된 후 안전하게 데이터 호출
document.addEventListener("DOMContentLoaded", () => {
  init();
});
</script>

</body>
</html>
