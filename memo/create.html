<!DOCTYPE html>
<html>
<head>
  <title>메모 생성</title>

  <style>
    body {
      font-family: sans-serif;
      background: #f0f0f0;
      padding: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 14px;
      background: white;
      cursor: pointer;
      margin: 3px;
    }

    button:hover {
      background: #e6e6e6;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
    }

    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      border: none;
      border-radius: 14px;
      padding: 12px;
      margin-top: 10px;
      background: #f5f5f5;
      font-family: sans-serif;
    }

    textarea {
      resize: vertical;
      min-height: 300px;
      font-family: monospace;
    }

    .label {
      margin-top: 15px;
      font-weight: bold;
    }

    .bottom {
      margin-top: 20px;
      text-align: right;
    }

            #version {
  position: fixed;
  right: 15px;
  bottom: 15px;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 6px 10px;
  border-radius: 10px;
  font-size: 12px;
  z-index: 9999;
}
    
  </style>
</head>

<body>

<div class="top-bar">
  <button onclick="goBack()">뒤로가기</button>
</div>

<div class="card">
  <h2>📄 새 메모</h2>

  <div class="label">제목</div>
  <input id="titleInput" placeholder="제목을 입력하세요.">

  <div class="label">PIN (4자리)</div>
  <input id="pinInput" type="password" maxlength="4" inputmode="numeric" placeholder="PIN 입력">

  <div class="label">내용</div>
  <textarea id="contentInput" placeholder="내용을 입력하세요."></textarea>

  <div class="bottom">
    <button onclick="saveMemo()">저장</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
  
  // 🔥 Firebase 설정
  const firebaseConfig = {
    apiKey: "AIzaSyCN6oIrvun0LDBJ940l5c7-cfRrJuePIA",
    authDomain: "memo-5123c.firebaseapp.com",
    projectId: "memo-5123c",
    storageBucket: "memo-5123c.firebasestorage.app",
    messagingSenderId: "984347291633",
    appId: "1:984347291633:web:e80fd3f599f62c46a11e50"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 🔥 ID 생성
  function generateId() {
    return Math.random().toString(36).substring(2, 10);
  }

  // 🔥 저장
  async function saveMemo() {
    const title = document.getElementById("titleInput").value.trim();
    const pin = document.getElementById("pinInput").value.trim();
    const content = document.getElementById("contentInput").value;

    if (!title) {
      alert("제목을 입력해주세요.");
      return;
    }

    if (!pin) {
      alert("PIN을 입력해주세요.");
      return;
    }

    if (!/^[0-9]+$/.test(pin)) {
      alert("PIN은 숫자만 가능합니다.");
      return;
    }

    if (pin.length !== 4) {
      alert("PIN은 4자리여야 합니다.");
      return;
    }
    const q =
      query(
        collection(db, "notes"),
        where("title", "==", title)
      );
    
    const snap =
      await getDocs(q);
    
    if (!snap.empty) {
    
      alert("이미 존재하는 제목입니다.");
      return;
    
    }
    try {
      await addDoc(collection(db, "notes"), {
        id: generateId(),
        title: title,
        pin: pin,
        content: content,
        authorName: localStorage.getItem("userId") || "unknown",
        deleted: false,
        createdAt: Date.now()
      });

      alert("저장 완료!");
      location.href = "index.html";

    } catch (e) {
      console.error(e);
      alert("저장 실패!");
    }
  }

  function goBack() {
    location.href = "index.html";
  }

  // 🔥 module 대응 (필수)
  window.saveMemo = saveMemo;
  window.goBack = goBack;
</script>
<div id="version">
  v26.5.18.6
</body>
</html>
