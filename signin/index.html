<!DOCTYPE html>
<html>
<head>
  <title>코딩과 함께라면_로그인</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f0f0f0;
      font-family: sans-serif;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      width: 260px;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 5px;
    }

    h2 {
      font-size: 14px;
      margin-bottom: 20px;
      color: #555;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 12px;
      border: none;
      background: #f5f5f5;
    }

    .pw-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toggle {
      cursor: pointer;
      font-size: 16px;
      opacity: 0.5;
      margin-left: 5px;
      transition: 0.2s;
    }

    .toggle:hover {
      opacity: 1;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      border-radius: 12px;
      border: none;
      background: #ddd;
      cursor: pointer;
    }

    button:hover {
      background: #ccc;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>2026 코딩과 함께라면</h1>
  <h2>로그인</h2>

  <input id="id" placeholder="학번을 입력하세요.">

  <div class="pw-wrap">
    <input id="pw" type="password" placeholder="비밀번호를 입력하세요.">
    <span class="toggle" onclick="togglePw()">👁</span>
  </div>

  <button onclick="login()">로그인</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgOAO72ArbW8dO7OSYsTVEQtRHT049U20",
  authDomain: "points2026-f5e50.firebaseapp.com",
  projectId: "points2026-f5e50"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 로그인 후 돌아갈 주소
const params = new URLSearchParams(window.location.search);
const redirect = params.get("redirect") || "/";

// 이미 로그인된 경우
if (localStorage.getItem("userId")) {
  location.href = redirect;
}

window.togglePw = () => {
  const pw = document.getElementById("pw");
  pw.type = pw.type === "password" ? "text" : "password";
};

window.login = async () => {
  const id = document.getElementById("id").value.trim();
  const pw = document.getElementById("pw").value;

  if (!id || !pw) {
    alert("학번과 비밀번호를 입력하세요.");
    return;
  }

  try {
    const snap = await getDoc(doc(db, "users", id));

    if (!snap.exists()) {
      alert("계정 없음");
      return;
    }

    const data = snap.data();

    if (pw !== data.password) {
      alert("비밀번호 틀림");
      return;
    }

    localStorage.setItem("userId", id);

    // 기본 비밀번호면 변경 페이지
    if (data.password === "qwer1234!") {
      location.href = "/상벌점/change.html";
      return;
    }

    // 원래 있던 페이지로 복귀
    location.href = redirect;

  } catch (e) {
    console.error(e);
    alert("로그인 중 오류 발생");
  }
};
</script>

</body>
</html>
