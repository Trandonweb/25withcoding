<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>화면 모니터링</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#f0f0f0;
    font-family:sans-serif;
}


/* 상단 바 */

header{

    width:100%;
    height:70px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 20px;

    background:white;

    box-shadow:0 0 10px rgba(0,0,0,.1);

}

#back{

    padding:10px 15px;

    border:none;
    border-radius:10px;

    background:#27ae60;
    color:white;

    cursor:pointer;

}

#online{

    font-weight:bold;
    margin-left:20px;

}

.left{

    display:flex;
    align-items:center;

}


/* 학생 카드 */

#grid{

    padding:20px;

    display:grid;
    grid-template-columns:
        repeat(auto-fill,minmax(220px,1fr));

    gap:20px;

}


.card{

    background:white;

    padding:20px;

    border-radius:20px;

    cursor:pointer;

    box-shadow:0 0 10px rgba(0,0,0,.1);

    transition:.2s;

}


.card:hover{

    transform:scale(1.03);

}


.card h3{

    margin-top:0;

}


/* 확대 화면 */

#viewer{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,.7);

    display:none;

    justify-content:center;
    align-items:center;

}


#viewerBox{

    width:90%;
    max-width:1100px;

    background:white;

    border-radius:20px;

    padding:20px;

}


#viewerTop{

    display:flex;
    justify-content:space-between;
    align-items:center;

}


#closeViewer{

    padding:10px 15px;

    border:none;

    border-radius:10px;

    background:red;
    color:white;

    cursor:pointer;

}


#bigVideo{

    width:100%;

    margin-top:20px;

    border-radius:15px;

    background:black;

}


</style>

</head>

<body>


<header>

<div class="left">

<button id="back">

← 홈

</button>

<div id="online">

🟢 접속 0명

</div>

</div>


<h2>

화면 모니터링

</h2>


</header>



<div id="grid">

</div>



<div id="viewer">

<div id="viewerBox">

<div id="viewerTop">

<h2 id="viewerTitle">

학생 화면

</h2>

<button id="closeViewer">

닫기

</button>

</div>


<video
id="bigVideo"
autoplay
playsinline>

</video>


</div>

</div>



<script type="module">
// ===================================
// 1. Firebase 및 모듈 Import (최상단 배치)
// ===================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
    getFirestore,
    collection,
    onSnapshot,
    doc,
    getDoc,
    updateDoc,
    arrayUnion
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// ===================================
// 2. Firebase 설정 및 초기화
// ===================================
const firebaseConfig = {
    apiKey: "AIzaSyBgOAO72ArbW8dO7OSYsTVEQtRHT049U20",
    authDomain: "points2026-f5e50.firebaseapp.com",
    projectId: "points2026-f5e50",
    storageBucket: "points2026-f5e50.firebasestorage.app",
    messagingSenderId: "248724251417",
    appId: "1:248724251417:web:02d85cdc4addac98069b88"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===================================
// 3. 전역 변수 선언
// ===================================
let selectedId = null;
let peerConnection = null;
let unsubscribeUser = null; // 학생 candidate 감시 취소용 변수

const rtcConfig = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" }
    ]
};

// ===================================
// 4. 초기 인증 및 권한 확인 (동기적 흐름 제어)
// ===================================
const adminId = localStorage.getItem("userId");

if (!adminId) {
    alert("로그인이 필요합니다.");
    location.href = "/signin?redirect=/admin/mirroring.html";
    throw new Error("로그인 필요");
}

// 초기 권한 검증 및 데이터 로딩 시작
async function initAdmin() {
    try {
        const adminSnap = await getDoc(doc(db, "users", adminId));

        if (!adminSnap.exists()) {
            alert("계정을 찾을 수 없습니다.");
            location.href = "/";
            return;
        }

        const adminData = adminSnap.data();

        // 회장 또는 부회장만 허용
        if (adminData.role !== "president" && adminData.role !== "vice") {
            alert("관리자만 접근 가능합니다.");
            location.href = "/";
            return;
        }

        // 권한 확인이 완료된 후 접속자 목록을 불러옴
        loadUsers();

    } catch (error) {
        console.error("인증 과정 중 오류 발생:", error);
        alert("데이터를 불러오는 중 오류가 발생했습니다.");
    }
}

// ===================================
// 5. 기능 함수 정의
// ===================================

// 홈 버튼 이벤트 바인딩
document.getElementById("back").onclick = () => {
    location.href = "/";
};

// 접속 인원 표시 UI 업데이트
function updateOnlineCount(count) {
    document.getElementById("online").innerText = `🟢 접속 ${count}명`;
}

// 카드 HTML 생성
function createCard(id, data) {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
        <h3>${data.name ?? id}</h3>
        <p>ID : ${id}</p>
        <p>상태 : ${data.online ? "온라인" : "오프라인"}</p>
        <p>모드 : ${data.mode ?? "unknown"}</p>
    `;

    if (data.online === true) {
        card.onclick = () => {
            connectStudent(id);
        };
    }
    return card;
}

// 접속자 목록 실시간 불러오기
function loadUsers() {
    onSnapshot(collection(db, "users"), (snapshot) => {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        let onlineCount = 0;

        snapshot.forEach((userDoc) => {
            const data = userDoc.data();
            const id = userDoc.id;

            // 자기 자신은 목록에서 제외
            if (id === adminId) return;

            if (data.online === true) {
                onlineCount++;
            }

            const card = createCard(id, data);
            grid.appendChild(card);
        });

        updateOnlineCount(onlineCount);
    }, (error) => {
        console.error("목록 불러오기 실패:", error);
    });
}

// 학생 WebRTC 연결 시작
// [관리자 코드 내부 connectStudent 함수 수정본]
async function connectStudent(userId) {
    if (peerConnection) { try { peerConnection.close(); } catch (e) {} peerConnection = null; }
    if (unsubscribeUser) { unsubscribeUser(); unsubscribeUser = null; }

    selectedId = userId;
    adminAnswerCreated = false;

    document.getElementById("viewer").style.display = "flex";
    document.getElementById("viewerTitle").innerText = `${userId} 화면`;

    const userRef = doc(db, "users", userId);
    const snap = await getDoc(userRef);

    if (!snap.exists()) {
        alert("사용자를 찾을 수 없습니다.");
        return;
    }

    const data = snap.data();
    if (!data.clientOffer) {
        alert("학생이 아직 화면 공유를 시작하지 않았습니다.");
        return;
    }

    peerConnection = new RTCPeerConnection(rtcConfig);

    // 🔍 [진단 로그] 원격 트랙 이벤트 세부 정보 확인
    peerConnection.ontrack = (event) => {
        console.log("[ADMIN] ontrack 이벤트 발생!", event);
        console.log("[ADMIN] 수신된 미디어 스트림 배열:", event.streams);
        
        const video = document.getElementById("bigVideo");
        if (event.streams[0]) {
            video.srcObject = event.streams[0];
            video.onloadedmetadata=()=>{

                console.log(
                    "[ADMIN] 영상 메타데이터 로드 완료"
                );
            
                video.play()
                .then(()=>{
                    console.log(
                        "[ADMIN] 영상 재생 성공"
                    );
                })
                .catch((e)=>{
                    console.error(
                        "[ADMIN] 영상 재생 실패",
                        e
                    );
                });
            
            };
            console.log("[ADMIN] 비디오 엘리먼트에 스트림 바인딩 완");
        }
    };

    peerConnection.onconnectionstatechange = () => {
        console.log("[ADMIN] Connection State 변경됨:", peerConnection?.connectionState);
    };

    peerConnection.onicecandidate = async (event)=>{

        if(!event.candidate){
            console.log("[ADMIN] Candidate 생성 종료");
            return;
        }
    
        console.log(
            "[ADMIN] Candidate 생성:",
            event.candidate.candidate
        );
    
        try{
    
            await updateDoc(userRef,{
                adminCandidates:
                arrayUnion(
                    event.candidate.toJSON()
                )
            });
    
        }catch(e){
            console.error(e);
        }
    
    };
    try {
        const offer = data.clientOffer; 
        
        // 🔍 [진단 로그] 시그널링 단계별 추적
        console.log("[ADMIN] setRemoteDescription 시작 전 SignalingState:", peerConnection.signalingState);
        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
        console.log("[ADMIN] setRemoteDescription 완료 후 SignalingState:", peerConnection.signalingState);

        const answer = await peerConnection.createAnswer();
        console.log("[ADMIN] createAnswer 완료 후 SignalingState:", peerConnection.signalingState);
        
        await peerConnection.setLocalDescription(answer);
        console.log("[ADMIN] setLocalDescription 완료 후 SignalingState:", peerConnection.signalingState);

        // ⚠️ 관리자가 Answer를 다 만든 후, 안전하게 Firestore의 이전 기기 잔재를 초기화하며 Answer 업데이트
        await updateDoc(userRef, {
            adminAnswer: {
                type: answer.type,
                sdp: answer.sdp
            },
            adminCandidates: [] // Candidate 청소 및 교환 준비
        });

        console.log("[ADMIN] Answer 전송 완료");
        adminAnswerCreated = true;

        watchClientCandidates(userId);

    } catch (error) {
        console.error("WebRTC 연결 설정 중 에러:", error);
        alert("연결 설정 중 오류가 발생했습니다.");
    }
}

// ===================================
// 6. 실행 (엔트리 포인트)
// ===================================
initAdmin();
</script>
