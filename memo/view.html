<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메모 보기</title>

  <style>

    body {
      font-family: sans-serif;
      background: #f0f0f0;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: white;
      max-width: 700px;
      margin: auto;
      padding: 20px;
      border-radius: 16px;
    }

    h2 {
      margin-top: 0;
    }

    .meta {
      color: #666;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .content {
      white-space: pre-wrap;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-right: 8px;
    }

    .back {
      background: #ddd;
    }

    .delete {
      background: #ff4d4d;
      color: white;
    }

    .edit {
      background: #111;
      color: white;
    }

  </style>
</head>

<body>

<div class="card">

  <button class="back" onclick="goBack()">← 목록</button>

  <h2 id="title">로딩중...</h2>

  <div class="meta" id="meta"></div>

  <div class="content" id="content"></div>

  <button class="edit" onclick="editMemo()">수정</button>
  <button class="delete" onclick="deleteMemo()">삭제</button>

</div>

<script type="module">

import { db } from "/js/firebase.js";
import {
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const params =
  new URLSearchParams(location.search);

const id =
  params.get("id");

let memoRef;

async function loadMemo() {

  if (!id) {
    alert("잘못된 접근");
    location.href = "index.html";
    return;
  }

  memoRef = doc(db, "notes", id);

  const snap = await getDoc(memoRef);

  if (!snap.exists()) {
    alert("메모 없음");
    location.href = "index.html";
    return;
  }

  const data = snap.data();

  if (data.deleted) {
    alert("삭제된 메모");
    location.href = "index.html";
    return;
  }

  document.getElementById("title").innerText =
    data.title;

  document.getElementById("content").innerText =
    data.content;

  document.getElementById("meta").innerText =
    `작성자: ${data.author} | 작성일: ${data.createdAt}`;

}

async function deleteMemo() {

  if (!confirm("삭제할까?")) return;

  await updateDoc(memoRef, {
    deleted: true
  });

  location.href = "index.html";

}

function goBack() {
  location.href = "index.html";
}

function editMemo() {
  location.href = "edit.html?id=" + id;
}

window.deleteMemo = deleteMemo;
window.goBack = goBack;
window.editMemo = editMemo;

loadMemo();

</script>

</body>
</html>
