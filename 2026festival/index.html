<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>코딩과 함께라면 2026 Festival</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f0f14;
  color: white;
}

/* Home */
.home-link {
  position: fixed;
  top: 18px;
  left: 20px;
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  font-size: 13px;
  z-index: 1000;
}
.home-link:hover { color: white; }

/* Header */
header {
  text-align: center;
  padding: 12px 20px;
  font-family: 'Black Han Sans', sans-serif;
  font-size: 30px;
  background: linear-gradient(90deg, #00c853, #64dd17);
  color: white;
  box-shadow: 0 4px 20px rgba(0,0,0,.3);
}

.subtitle {
  text-align: center;
  padding: 10px;
  color: #b8ffb8;
  font-size: 14px;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  padding: 20px;
}

@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

.card {
  background: #1c1c25;
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s;
  display: flex;
  flex-direction: column;
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  display: block;
}

.info {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
}

.title {
  font-weight: bold;
  font-size: 18px;
}

.desc {
  font-size: 13px;
  color: #bbb;
  height: 2.6em;
  overflow: hidden;
}

.likes {
  color: #64dd17;
  margin-top: auto;
}

.like-btn {
  margin-top: 8px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #00c853;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<a class="home-link" href="/">Home</a>

<header>코딩과 함께라면 2026 Festival</header>
<div class="subtitle">since 2025</div>

<div class="grid" id="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQccv_jkaNQuy1rOCcoFdUfo0GkxQDv9Q",
  authDomain: "festivallikes.firebaseapp.com",
  projectId: "festivallikes",
  storageBucket: "festivallikes.firebasestorage.app",
  messagingSenderId: "782245120700",
  appId: "1:782245120700:web:c61e16313e9ae688e6deb9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const grid = document.getElementById("grid");

async function loadProjects() {

  grid.innerHTML = "";

  const snap = await getDocs(collection(db, "projects"));

  let projects = [];

  snap.forEach(docSnap => {
    projects.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  projects.sort((a, b) => b.likes - a.likes);

  projects.forEach(p => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${p.thum}">
      <div class="info">
        <div class="title">${p.id}</div>
        <div class="desc">${p.detail}</div>
        <div class="likes">❤️ ${p.likes}</div>
        <button class="like-btn">좋아요</button>
      </div>
    `;

    // 🔥 여기 핵심 수정 (새 탭 제거)
    card.onclick = () => {
      location.href = p.url;
    };

    card.querySelector(".like-btn").onclick = async (e) => {
      e.stopPropagation();

      const ref = doc(db, "projects", p.id);

      await updateDoc(ref, {
        likes: increment(1)
      });

      p.likes++;
      card.querySelector(".likes").innerText = `❤️ ${p.likes}`;
    };

    grid.appendChild(card);
  });
}

loadProjects();

const pressed = new Set();

</script>
</body>
</html>
