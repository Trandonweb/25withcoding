<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>화면 모니터링</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#f0f0f0;
    font-family:sans-serif;
}


/* 상단 바 */

header{

    width:100%;
    height:70px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 20px;

    background:white;

    box-shadow:0 0 10px rgba(0,0,0,.1);

}

#back{

    padding:10px 15px;

    border:none;
    border-radius:10px;

    background:#27ae60;
    color:white;

    cursor:pointer;

}

#online{

    font-weight:bold;
    margin-left:20px;

}

.left{

    display:flex;
    align-items:center;

}


/* 학생 카드 */

#grid{

    padding:20px;

    display:grid;
    grid-template-columns:
        repeat(auto-fill,minmax(220px,1fr));

    gap:20px;

}


.card{

    background:white;

    padding:20px;

    border-radius:20px;

    cursor:pointer;

    box-shadow:0 0 10px rgba(0,0,0,.1);

    transition:.2s;

}


.card:hover{

    transform:scale(1.03);

}


.card h3{

    margin-top:0;

}


/* 확대 화면 */

#viewer{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,.7);

    display:none;

    justify-content:center;
    align-items:center;

}


#viewerBox{

    width:90%;
    max-width:1100px;

    background:white;

    border-radius:20px;

    padding:20px;

}


#viewerTop{

    display:flex;
    justify-content:space-between;
    align-items:center;

}


#closeViewer{

    padding:10px 15px;

    border:none;

    border-radius:10px;

    background:red;
    color:white;

    cursor:pointer;

}


#bigVideo{

    width:100%;

    margin-top:20px;

    border-radius:15px;

    background:black;

}


</style>

</head>

<body>


<header>

<div class="left">

<button id="back">

← 홈

</button>

<div id="online">

🟢 접속 0명

</div>

</div>


<h2>

화면 모니터링

</h2>


</header>



<div id="grid">

</div>



<div id="viewer">

<div id="viewerBox">

<div id="viewerTop">

<h2 id="viewerTitle">

학생 화면

</h2>

<button id="closeViewer">

닫기

</button>

</div>


<video
id="bigVideo"
autoplay
playsinline>

</video>


</div>

</div>



<script type="module">
// ===================================
// 1. Firebase 및 모듈 Import (최상단 배치)
// ===================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
    getFirestore,
    collection,
    onSnapshot,
    doc,
    getDoc,
    updateDoc,
    arrayUnion
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// ===================================
// 2. Firebase 설정 및 초기화
// ===================================
const firebaseConfig = {
    apiKey: "AIzaSyBgOAO72ArbW8dO7OSYsTVEQtRHT049U20",
    authDomain: "points2026-f5e50.firebaseapp.com",
    projectId: "points2026-f5e50",
    storageBucket: "points2026-f5e50.firebasestorage.app",
    messagingSenderId: "248724251417",
    appId: "1:248724251417:web:02d85cdc4addac98069b88"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===================================
// 3. 전역 변수 선언
// ===================================
let selectedId = null;
let peerConnection = null;
let unsubscribeUser = null; // 학생 candidate 감시 취소용 변수

const rtcConfig = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" }
    ]
};

// ===================================
// 4. 초기 인증 및 권한 확인 (동기적 흐름 제어)
// ===================================
const adminId = localStorage.getItem("userId");

if (!adminId) {
    alert("로그인이 필요합니다.");
    location.href = "/signin?redirect=/admin/mirroring.html";
    throw new Error("로그인 필요");
}

// 초기 권한 검증 및 데이터 로딩 시작
async function initAdmin() {
    try {
        const adminSnap = await getDoc(doc(db, "users", adminId));

        if (!adminSnap.exists()) {
            alert("계정을 찾을 수 없습니다.");
            location.href = "/";
            return;
        }

        const adminData = adminSnap.data();

        // 회장 또는 부회장만 허용
        if (adminData.role !== "president" && adminData.role !== "vice") {
            alert("관리자만 접근 가능합니다.");
            location.href = "/";
            return;
        }

        // 권한 확인이 완료된 후 접속자 목록을 불러옴
        loadUsers();

    } catch (error) {
        console.error("인증 과정 중 오류 발생:", error);
        alert("데이터를 불러오는 중 오류가 발생했습니다.");
    }
}

// ===================================
// 5. 기능 함수 정의
// ===================================

// 홈 버튼 이벤트 바인딩
document.getElementById("back").onclick = () => {
    location.href = "/";
};

// 접속 인원 표시 UI 업데이트
function updateOnlineCount(count) {
    document.getElementById("online").innerText = `🟢 접속 ${count}명`;
}

// 카드 HTML 생성
function createCard(id, data) {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
        <h3>${data.name ?? id}</h3>
        <p>ID : ${id}</p>
        <p>상태 : ${data.online ? "온라인" : "오프라인"}</p>
        <p>모드 : ${data.mode ?? "unknown"}</p>
    `;

    if (data.online === true) {
        card.onclick = () => {
            connectStudent(id);
        };
    }
    return card;
}

// 접속자 목록 실시간 불러오기
function loadUsers() {
    onSnapshot(collection(db, "users"), (snapshot) => {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        let onlineCount = 0;

        snapshot.forEach((userDoc) => {
            const data = userDoc.data();
            const id = userDoc.id;

            // 자기 자신은 목록에서 제외
            if (id === adminId) return;

            if (data.online === true) {
                onlineCount++;
            }

            const card = createCard(id, data);
            grid.appendChild(card);
        });

        updateOnlineCount(onlineCount);
    }, (error) => {
        console.error("목록 불러오기 실패:", error);
    });
}

// 학생 WebRTC 연결 시작
async function connectStudent(userId) {
    // 1. 기존 연결 및 리스너 완벽히 초기화 (중요)
    if (peerConnection) {
        try {
            peerConnection.close();
        } catch (e) {
            console.warn(e);
        }
        peerConnection = null;
    }
    if (unsubscribeUser) {
        unsubscribeUser();
        unsubscribeUser = null;
    }

    selectedId = userId;

    document.getElementById("viewer").style.display = "flex";
    document.getElementById("viewerTitle").innerText = `${userId} 화면`;

    const userRef = doc(db, "users", userId);
    const snap = await getDoc(userRef);

    if (!snap.exists()) {
        alert("사용자를 찾을 수 없습니다.");
        return;
    }

    const data = snap.data();

    if (!data.clientOffer) {
        alert("학생이 아직 화면 공유를 시작하지 않았습니다.");
        return;
    }

    // 2. PeerConnection 생성
    peerConnection = new RTCPeerConnection(rtcConfig);

    // 영상 트랙 수신 설정
    peerConnection.ontrack = (event) => {
        const video = document.getElementById("bigVideo");
        if (event.streams[0]) {
            video.srcObject = event.streams[0];
        }
    };

    peerConnection.onconnectionstatechange = () => {
        console.log("[ADMIN] Connection State:", peerConnection?.connectionState);
    };

    // 관리자 ICE Candidate 생성 시 Firestore에 추가
    peerConnection.onicecandidate = async (event) => {
        if (!event.candidate) return;
        try {
            await updateDoc(userRef, {
                adminCandidates: arrayUnion(event.candidate.toJSON())
            });
        } catch (e) {
            console.error("관리자 Candidate 전송 실패:", e);
        }
    };

    try {
        // 3. OFFER 적용 및 ANSWER 전송
        const offer = JSON.parse(data.clientOffer);
        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));

        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);

        await updateDoc(userRef, {
            adminAnswer: {
                type: answer.type,
                sdp: answer.sdp
            }
        });

        console.log("[ADMIN] Answer 전송 완료");

        // 4. ANSWER 전송 완료 후 학생 Candidate 감시 시작
        watchClientCandidates(userId);

    } catch (error) {
        console.error("WebRTC 연결 설정 중 에러:", error);
        alert("연결 설정 중 오류가 발생했습니다.");
    }
}

// 학생 ICE Candidate 실시간 감시
async function watchClientCandidates(userId) {
    const userRef = doc(db, "users", userId);
    const addedCandidates = new Set();

    unsubscribeUser = onSnapshot(userRef, async (snapshot) => {
        if (!snapshot.exists() || !peerConnection) return;

        const data = snapshot.data();
        if (!data.clientCandidates || !Array.isArray(data.clientCandidates)) return;

        // 원격 Description(Offer)이 적용되기 전에 candidate가 추가되는 것을 방지
        if (!peerConnection.remoteDescription) {
            console.warn("아직 remoteDescription이 설정되지 않아 candidate를 보류합니다.");
            return;
        }

        for (const candidate of data.clientCandidates) {
            const key = JSON.stringify(candidate);

            if (addedCandidates.has(key)) continue;
            addedCandidates.add(key);

            try {
                await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                console.log("[ADMIN] 학생 Candidate 추가 성공");
            } catch (e) {
                console.warn("학생 Candidate 추가 실패:", e);
            }
        }
    });
}

// ===================================
// 6. 실행 (엔트리 포인트)
// ===================================
initAdmin();
</script>
