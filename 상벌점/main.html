<!DOCTYPE html>
<html>
<body>

<h2>메인</h2>

<p id="info"></p>

<button onclick="logout()">로그아웃</button>

<hr>

<select id="userList"></select>
<br><br>

<input id="scoreInput" type="text" placeholder="점수 입력 (+3, -2)">
<button onclick="apply()">적용</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgOAO72ArbW8dO7OSYsTVEQtRHT049U20",
  authDomain: "points2026-f5e50.firebaseapp.com",
  projectId: "points2026-f5e50"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const myId = localStorage.getItem("userId");

if(!myId){
  alert("로그인 필요");
  location.href = "index.html";
}

// 🔥 내 정보 먼저 가져오기
const mySnap = await getDoc(doc(db, "users", myId));
const myData = mySnap.data();

document.getElementById("info").innerText =
  "내 정보 → " + myData.name + " / 점수: " + myData.score + " / 역할: " + myData.role;

// 🔥 목록 불러오기
const querySnapshot = await getDocs(collection(db, "users"));
const select = document.getElementById("userList");

querySnapshot.forEach((docu) => {
  const d = docu.data();
  const option = document.createElement("option");
  option.value = docu.id;
  option.text = docu.id + " - " + d.name;
  select.appendChild(option);
});

// 🔥 점수 적용
window.apply = async () => {
  if(myData.role === "student"){
    alert("권한 없음");
    return;
  }

  const target = select.value;
  const raw = document.getElementById("scoreInput").value.trim();

  if(raw === ""){
    alert("값 입력");
    return;
  }

  const val = Number(raw);

  if(isNaN(val)){
    alert("숫자만 입력 (+3, -2)");
    return;
  }

  await updateDoc(doc(db, "users", target), {
    score: increment(val)
  });

  alert("적용 완료");
  location.reload(); // 새로고침으로 점수 갱신
};

// 🔥 로그아웃
window.logout = () => {
  localStorage.removeItem("userId");
  location.href = "index.html";
};
</script>

</body>
</html>
