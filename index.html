<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2025 코딩과 함께라면 기념관</title>

<link rel="icon" href="/2025withcoding_logo.png" type="image/png">
<link rel="apple-touch-icon" href="/2025withcoding_logo.png">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  min-height: 100vh;
  color: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  position: relative;
  background-image: url("bg1.png");
  background-size: cover;
  background-position: center;
}

/* 햄버거 버튼 */
.hamburger {
  position: fixed;
  top: 20px;
  left: 20px;
  width: 30px;
  height: 30px;
  background: url("hamburgerbotton.png") no-repeat center/contain;
  border: none;
  cursor: pointer;
  z-index: 3000;
}

/* 상벌점 버튼 (텍스트) */
.POINT_BTN {
  position: fixed;
  top: 20px;
  left: 110px;
  padding: 10px 16px;
  border: none;
  background: #222;
  color: #fff;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  z-index: 2000;
  transition: 0.2s;
}

/* hover 효과 */
.POINT_BTN:hover {
  background: #444;
  transform: scale(1.05);
}

/* 클릭 느낌 */
.POINT_BTN:active {
  transform: scale(0.95);
}

/* 음소거 버튼 */
#musicBtn {
  position: fixed;
  top: 20px;
  left: 70px;
  width: 38px;
  height: 38px;
  border: none;
  background: url('sound1.png') no-repeat center / contain;
  cursor: pointer;
  z-index: 2000;
}

/* 사이드 메뉴 */
.menu {
  position: fixed;
  top: 0;
  left: -260px;
  width: 260px;
  height: 100vh;
  background: #f0f0f0;
  padding-top: 80px;
  transition: left 0.3s ease;
  z-index: 2500;
  box-shadow: 2px 0 10px rgba(0,0,0,0.2);
  pointer-events: none;
}

.menu.active {
  left: 0;
  pointer-events: auto;
}

.menu a {
  display: block;
  padding: 16px 24px;
  color: #000;
  text-decoration: none;
  font-size: 1.1em;
  text-align: center;
  font-weight: bold;
}

.menu a:hover {
  background: rgba(0,0,0,0.06);
}

.menu-logo img {
  width: 90px;
  max-width: 90px;
  height: auto;
  margin-bottom: 20px;
}

/* 상단 텍스트 */
.content {
  margin: 15vh auto 0 auto;
  max-width: 900px;
  line-height: 1.8em;
  text-align: center;
}

.pc-text { display: block; }
.mobile-text { display: none; }

/* 로고 */
.logo {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 80px;
}

/* 캐러셀 */
.carousel-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-top: 60px;
  position: relative;
}

#prev, #next {
  position: absolute;
  background-color: rgba(0,0,0,0.5);
  color: white;
  border: none;
  border-radius: 5px;
  padding: 10px;
  cursor: pointer;
  font-size: 1.5em;
  z-index: 2;
}

#prev { left: -50px; }
#next { right: -50px; }

/* 썸네일 */
.thumb {
  border-radius: 10px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.thumb-info {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 5px 0;
  opacity: 0;
  text-align: center;
  box-sizing: border-box;
  transition: 0.3s;
}

.thumb.big:hover .thumb-info {
  opacity: 1;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.small { width: 160px; height: 90px; }
.big { width: 320px; height: 180px; }

/* 모바일 */
@media screen and (max-width: 600px) {
  body { background-image: url("bg2.png"); }
  .pc-text { display: none; }
  .mobile-text { display: block; }
  .carousel-container { flex-direction: column; }
  .small { display: none; }
  .big { width: 80vw; height: calc(80vw * 9 / 16); }
  #prev { left: 10px; }
  #next { right: 10px; }
}

.mobile-text {
  margin: 12vh auto 0 auto;
  max-width: 90vw;
  text-align: center;
}
</style>
</head>

<body>

<!-- 상벌점 버튼 -->
<button class="POINT_BTN" onclick="window.open('https://25withcoding.kr/상벌점')">
  상벌점 시스템
</button>

<!-- 햄버거 + 음악 -->
<button class="hamburger" onclick="toggleMenu()"></button>
<button id="musicBtn" onclick="toggleMusic()"></button>

<!-- 나머지 코드는 그대로 유지 -->
