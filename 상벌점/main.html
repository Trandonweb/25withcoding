<!DOCTYPE html>
<html>
<head>
  <title>메인</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background-color: #f0f0f0;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      padding: 10px 14px;
      margin: 5px;
      border-radius: 14px;
      border: none;
      background-color: #ffffff;
      cursor: pointer;
    }

    button:hover {
      background-color: #e6e6e6;
    }

    .home-icon {
      width: 24px;
      height: 24px;
      position: relative;
      display: inline-block;
    }

    .home-icon::before {
      content: "";
      position: absolute;
      width: 20px;
      height: 14px;
      background: black;
      bottom: 0;
      left: 2px;
    }

    .home-icon::after {
      content: "";
      position: absolute;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-bottom: 12px solid black;
      top: -2px;
      left: 0;
    }

    .card {
      background-color: white;
      padding: 15px;
      border-radius: 20px;
      margin-top: 10px;
    }

    .user-item {
      display: flex;
      align-items: center;
      padding: 10px;
      margin: 5px 0;
      border-radius: 14px;
      background-color: #f9f9f9;
      cursor: pointer;
      transition: 0.2s;
    }

    .user-item.selected {
      background-color: #dcdcdc;
    }

    .user-item input {
      margin-right: 10px;
    }

    .user-item.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    input[type="text"] {
      padding: 10px;
      border-radius: 14px;
      border: none;
      background-color: white;
      width: 180px;
    }

    .footer {
      position: fixed;
      bottom: 10px;
      right: 15px;
      font-size: 12px;
      color: #555;
    }

    .plus {
      color: blue;
      font-weight: bold;
    }

    .minus {
      color: red;
      font-weight: bold;
    }

    .zero {
      color: black;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="top-bar">

  <div>
    <button onclick="goHome()">
      <div class="home-icon"></div>
    </button>

    <!-- 관리자 버튼 -->
    <button id="adminBtn"
      onclick="goAdmin()"
      style="display:none;">
      관리자
    </button>
  </div>

  <button onclick="logout()">로그아웃</button>

</div>


<div class="card" id="myInfo">
  로딩중...
</div>

<button onclick="selectAll()">모두 선택</button>
<button onclick="clearAll()">모두 해제</button>

<div class="card" id="userList"></div>

<br>

<input id="scoreInput" type="text" placeholder="점수를 입력하세요.">
<button id="applyBtn" onclick="apply()">적용</button>

<div id="loadingBox" style="display:none; margin-top:10px;">
  <div class="loading-inline">
    <span>적용 중...</span>
    <div class="spinner"></div>
  </div>
</div>

<div class="footer">
  *이 시스템은 학교 내 그린마일리지와는 무관합니다.*
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  getDoc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgOAO72ArbW8dO7OSYsTVEQtRHT049U20",
  authDomain: "points2026-f5e50.firebaseapp.com",
  projectId: "points2026-f5e50"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedUsers = new Set();

const myId = localStorage.getItem("userId");

if (!myId) {
  alert("로그인이 필요합니다.");
  location.href = "index.html";
}

const mySnap = await getDoc(doc(db, "users", myId));

if (!mySnap.exists()) {
  alert("사용자 정보를 찾을 수 없습니다.");
  localStorage.removeItem("userId");
  location.href = "index.html";
}

const myData = mySnap.data();
  
if (myData.role === "president") {
  document.getElementById("adminBtn").style.display = "inline-block";
}
  
/* 점수 색상 */
function formatScore(score) {

  if (score > 0) {
    return `<span class="plus">${score}</span>`;
  }

  if (score < 0) {
    return `<span class="minus">${score}</span>`;
  }

  return `<span class="zero">${score}</span>`;
}

/* 권한 한글화 */
function roleToText(role) {

  if (role === "president") return "회장";
  if (role === "vice") return "부회장";

  return "학생";
}

/* 내 정보 표시 */
document.getElementById("myInfo").innerHTML =
  "이름: " + myData.name +
  " / 점수: " + formatScore(myData.score) +
  " / 권한: " + roleToText(myData.role);

/* 유저 목록 */
const listDiv = document.getElementById("userList");

const querySnapshot = await getDocs(collection(db, "users"));

querySnapshot.forEach((docu) => {

  const d = docu.data();

  const isMe = docu.id === myId;

  /* 권한별 제한 */
  let disabled = false;

  // 학생은 전부 막힘
  if (myData.role === "student") {
    disabled = true;
  }

  // 부회장 제한
  if (myData.role === "vice") {

    // 자기 자신 금지
    if (isMe) {
      disabled = true;
    }

    // 회장 금지
    if (d.role === "president") {
      disabled = true;
    }
  }

  const div = document.createElement("div");

  div.className =
    "user-item" + (disabled ? " disabled" : "");

  const checkbox = document.createElement("input");

  checkbox.type = "checkbox";

  checkbox.disabled = disabled;

  const text = document.createElement("span");

  text.innerHTML =
    docu.id + " - " +
    d.name +
    " (" + formatScore(d.score) + ") " +
    "[" + roleToText(d.role) + "]";

  function updateSelection() {

    if (checkbox.checked) {

      selectedUsers.add(docu.id);

      div.classList.add("selected");

    } else {

      selectedUsers.delete(docu.id);

      div.classList.remove("selected");

    }
  }

  checkbox.addEventListener("click", (e) => {
    e.stopPropagation();
  });

  checkbox.addEventListener("change", () => {
    updateSelection();
  });

  div.addEventListener("click", () => {

    if (disabled) return;

    checkbox.checked = !checkbox.checked;

    updateSelection();

  });

  div.appendChild(checkbox);
  div.appendChild(text);

  listDiv.appendChild(div);

});

/* 모두 선택 */
window.selectAll = () => {

  selectedUsers.clear();

  document.querySelectorAll(".user-item").forEach((el) => {

    const cb = el.querySelector("input");

    if (cb.disabled) return;

    cb.checked = true;

    el.classList.add("selected");

  });

  querySnapshot.forEach((docu) => {

    const d = docu.data();

    const isMe = docu.id === myId;

    let disabled = false;

    if (myData.role === "student") {
      disabled = true;
    }

    if (myData.role === "vice") {

      if (isMe) disabled = true;

      if (d.role === "president") disabled = true;
    }

    if (!disabled) {
      selectedUsers.add(docu.id);
    }

  });

};

/* 모두 해제 */
window.clearAll = () => {

  selectedUsers.clear();

  document.querySelectorAll(".user-item").forEach((el) => {

    el.classList.remove("selected");

    el.querySelector("input").checked = false;

  });

};

/* 점수 적용 */
window.apply = async () => {

  if (myData.role === "student") {
    alert("권한이 없습니다.");
    return;
  }

  if (selectedUsers.size === 0) {
    alert("대상을 선택해주세요.");
    return;
  }

  const val =
    Number(document.getElementById("scoreInput").value);

  if (isNaN(val)) {
    alert("숫자를 입력해주세요.");
    return;
  }

  try {
    document.getElementById("applyBtn").style.display = "none";
    document.getElementById("loadingBox").style.display = "block";
    for (const id of selectedUsers) {

      await updateDoc(doc(db, "users", id), {
        score: increment(val)
      });

    }

    alert("적용 완료!");

    location.reload();

  } catch (err) {

    console.error(err);

    alert("오류 발생");

  }

};

/* 로그아웃 */
window.logout = () => {

  localStorage.removeItem("userId");

  location.href = "index.html";

};

/* 홈 이동 */
window.goHome = () => {

  location.href = "https://25withcoding.kr";

};

window.goAdmin = () => {
  location.href = "admin.html";
};
</script>

</body>
</html>
