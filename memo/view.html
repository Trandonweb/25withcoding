<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>메모 보기</title>

  <style>

    body {
      font-family: sans-serif;
      background: #f0f0f0;
      padding: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 14px;
      background: white;
      cursor: pointer;
      margin: 3px;
    }

    button:hover {
      background: #e6e6e6;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      position: relative;
      min-height: 400px;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 5px;
    }

    .meta {
      font-size: 13px;
      color: gray;
      margin-bottom: 20px;
    }

    .content {
      white-space: pre-wrap;
      line-height: 1.7;
      display: none;
      background: #f5f5f5;
      padding: 16px;
      border-radius: 14px;
    }

    .pin-box {
      text-align: center;
      margin-top: 80px;
    }

    input {
      width: 200px;
      box-sizing: border-box;
      border: none;
      border-radius: 14px;
      padding: 12px;
      margin-top: 10px;
      background: #f5f5f5;
      font-family: sans-serif;
    }

    .actions {
      margin-top: 20px;
      display: none;
      justify-content: flex-end;
      gap: 10px;
    }

    .edit {
      background: #111;
      color: white;
    }

    .delete {
      background: #ff4d4d;
      color: white;
    }

    #version {
      position: fixed;
      right: 15px;
      bottom: 15px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 12px;
      z-index: 9999;
    }

  </style>
</head>

<body>

<div class="top-bar">

  <button onclick="goBack()">
    뒤로가기
  </button>

</div>

<div class="card">

  <h2 id="title">
    로딩중...
  </h2>

  <div class="meta" id="meta"></div>

  <!-- PIN 입력 -->
  <div class="pin-box" id="pinBox">

    <p>PIN 입력</p>

    <input
      id="pinInput"
      type="password"
      placeholder="4자리 PIN"
    >

    <button onclick="checkPin()">
      확인
    </button>

  </div>

  <!-- 내용 -->
  <div
    class="content"
    id="content"
  ></div>

  <!-- 버튼 -->
  <div
    class="actions"
    id="actions"
  >

    <button
      class="edit"
      onclick="goEdit()"
    >
      수정
    </button>

    <button
      class="delete"
      onclick="deleteMemo()"
    >
      삭제
    </button>

  </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc,
  updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCN6oIrvun0LDBJ940l5c7-cfRrJuePIA",
  authDomain: "memo-5123c.firebaseapp.com",
  projectId: "memo-5123c"
};

const app =
  initializeApp(firebaseConfig);

const db =
  getFirestore(app);

const id =
  new URLSearchParams(location.search)
  .get("id");

let memoRef;
let memoData;

// 마스터키
const MASTER_KEY = "20262326";

async function load() {

  memoRef =
    doc(db, "notes", id);

  const snap =
    await getDoc(memoRef);

  if (!snap.exists()) {

    alert("메모 없음");

    location.href =
      "index.html";

    return;

  }

  memoData =
    snap.data();

  document.getElementById("title").innerText =
    memoData.title || "제목 없음";

  document.getElementById("meta").innerText =
    `작성자: ${memoData.authorName || "unknown"}`;

}

const pinInput =
  document.getElementById("pinInput");

/*
  일반 PIN:
  4자리까지만 가능

  마스터키:
  앞부분이 일치하면 계속 입력 가능
*/

pinInput.addEventListener("input", () => {

  let value =
    pinInput.value;

  // 숫자만 허용
  value =
    value.replace(/\D/g, "");

  // 현재 입력값이
  // 마스터키 prefix인지 확인
  const isMasterPrefix =
    MASTER_KEY.startsWith(value);

  // 마스터키 흐름 아니면
  // 4자리 제한
  if (!isMasterPrefix &&
      value.length > 4) {

    value =
      value.slice(0, 4);

  }

  // 마스터키 길이 초과 방지
  if (value.length >
      MASTER_KEY.length) {

    value =
      value.slice(
        0,
        MASTER_KEY.length
      );

  }

  pinInput.value =
    value;

});

function checkPin() {

  const pin =
    document.getElementById("pinInput")
    .value;

  // 일반 PIN 또는 마스터키
  const ok =
    pin === memoData.pin ||
    pin === MASTER_KEY;

  if (!ok) {

    alert("PIN 틀림");
    return;

  }

  document.getElementById("pinBox").style.display =
    "none";

  document.getElementById("content").style.display =
    "block";

  document.getElementById("actions").style.display =
    "flex";

  document.getElementById("content").innerText =
    memoData.content || "";

}

async function deleteMemo() {

  const ok =
    confirm("삭제할까?");

  if (!ok) return;

  await updateDoc(
    memoRef,
    {
      deleted: true
    }
  );

  location.href =
    "index.html";

}

function goEdit() {

  location.href =
    "edit.html?id=" + id;

}

function goBack() {

  location.href =
    "index.html";

}

window.checkPin = checkPin;
window.deleteMemo = deleteMemo;
window.goEdit = goEdit;
window.goBack = goBack;

load();

</script>

<div id="version">
  v26.5.19.2
</div>

</body>
</html>
