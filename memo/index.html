<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>코딩과 함께라면_메모장</title>

  <style>
    body {
      font-family: sans-serif;
      background: #f0f0f0;
      padding: 20px;
    }

    .notice-box {
      background: #fff7d1;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .notice-title {
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 18px;
    }

    .notice-item {
      background: white;
      border-radius: 10px;
      padding: 12px;
      margin-top: 8px;
      transition: 0.2s;
      font-weight: bold;
    }

    .notice-item:hover {
      background: #f3f3f3;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .left-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
      background: white;
      cursor: pointer;
    }

    button:hover {
      background: #e8e8e8;
    }

    .memo {
      background: white;
      padding: 15px;
      margin-top: 10px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .memo-content {
      flex: 1;
    }

    .title {
      font-weight: bold;
      font-size: 17px;
    }

    .info {
      font-size: 12px;
      color: gray;
      margin-top: 5px;
    }

    #search {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 12px;
      box-sizing: border-box;
    }

    .empty {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      color: gray;
      margin-top: 10px;
    }

    .select-bar {
      margin-bottom: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #version {
      position: fixed;
      right: 15px;
      bottom: 15px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 12px;
      z-index: 9999;
    }

    #warning {
      position: fixed;
      left: 15px;
      bottom: 15px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 12px;
      z-index: 9999;
    }
  </style>
</head>

<body>

<div class="notice-box">
  <div class="notice-title">📢 공지사항</div>
  <div id="notice-list">
    <div class="notice-item">현재 공지사항이 없습니다.</div>
  </div>
</div>

<div class="top-bar">
  <div class="left-buttons">
    <button onclick="goHome()">홈</button>
    <button onclick="goTrash()">휴지통</button>
    <button onclick="resetAll()">초기화</button>
  </div>
  <button onclick="goCreate()">+ 새 메모</button>
</div>

<div class="select-bar">
  <button onclick="selectAll()">전체 선택</button>
  <button onclick="deleteSelected()">선택 삭제</button>
</div>

<div style="display:flex; gap:8px; margin-bottom:10px;">
  <input id="search" placeholder="검색..." onkeydown="handleSearchKey(event)" style="flex:1;">
  <button onclick="render()">검색</button>
</div>

<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const MASTER_KEY = "20262326";

const app = initializeApp({
  apiKey: "AIzaSyCN6oIrvun0LDBJ940l5c7-cfRrJuePIA",
  authDomain: "memo-5123c.firebaseapp.com",
  projectId: "memo-5123c"
});

const db = getFirestore(app);
let notes = [];

function isNotice(title) {
  if (!title) return false;
  return title.startsWith("!@#") && title.endsWith("#@!");
}

async function load() {
  try {
    // ❗ 쿼리 폭파 및 먹통 방지를 위해 orderBy 구문 제거하고 단순 수집
    const q = query(collection(db, "notes"));
    const snap = await getDocs(q);

    const rawNotes = snap.docs.map(d => ({
      id: d.id,
      ...d.data()
    }));

    // ❗ 데이터 필드 가리지 않고 유연하게 정렬해주는 JS 단 내림차순 정렬
    notes = rawNotes.sort((a, b) => {
      const timeA = a.createdAt ? new Date(a.createdAt).getTime() : 0;
      const timeB = b.createdAt ? new Date(b.createdAt).getTime() : 0;
      return timeB - timeA; 
    });

    render();
    renderNotice();
  } catch (error) {
    console.error("데이터 불러오기 중 치명적 에러:", error);
    const list = document.getElementById("list");
    if (list) list.innerHTML = `<div class="empty">데이터를 불러오는 중 오류가 발생했습니다.</div>`;
  }
}

function renderNotice() {
  const list = document.getElementById("notice-list");
  if (!list) return;

  const notices = notes.filter(n => !n.deleted && !n.delete && isNotice(n.title));

  if (notices.length === 0) {
    list.innerHTML = `<div class="notice-item">현재 공지사항이 없습니다.</div>`;
    return;
  }

  list.innerHTML = notices.map(n => `
    <div class="notice-item" onclick="location.href='view.html?id=${n.id}'" style="cursor:pointer;">
      ⭐️ ${n.title.replace("!@#", "").replace("#@!", "").trim()}
    </div>
  `).join("");
}

function render() {
  const searchInput = document.getElementById("search");
  const search = searchInput ? searchInput.value.toLowerCase() : "";
  const list = document.getElementById("list");
  if (!list) return;

  list.innerHTML = "";

  const filtered = notes
    .filter(n => !n.deleted && !n.delete)
    .filter(n => !isNotice(n.title))
    .filter(n => {
      const title = (n.title || "").toLowerCase();
      const content = (n.content || "").toLowerCase();
      const author = (n.authorName || "").toLowerCase();
      return title.includes(search) || content.includes(search) || author.includes(search);
    });

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">메모 없음</div>`;
    return;
  }

  filtered.forEach(n => {
    const div = document.createElement("div");
    div.className = "memo";

    // 문자열 날짜 포맷팅 방어 조치
    let dateString = "알 수 없음";
    if (n.createdAt) {
      const d = new Date(n.createdAt);
      if (!isNaN(d.getTime())) dateString = d.toLocaleString();
    }

    div.innerHTML = `
      <input type="checkbox" class="memo-check" value="${n.id}" onclick="event.stopPropagation()">
      <div class="memo-content">
        <div class="title">📄 ${n.title}</div>
        <div class="info">
          👤 ${n.authorName || "guest"} · 🕒 ${dateString}
        </div>
      </div>
    `;

    div.onclick = () => {
      location.href = "view.html?id=" + n.id;
    };

    list.appendChild(div);
  });
}

function handleSearchKey(event) {
  if (event.key === "Enter") render();
}

function goHome() { location.href = "https://25withcoding.kr"; }
function goCreate() { location.href = "create.html"; }
function goTrash() { location.href = "trash.html"; }

async function resetAll() {
  const password = prompt("초기화 마스터키 입력");
  if (password !== MASTER_KEY) return alert("마스터키 틀림");

  const ok = confirm("모든 메모를 완전히 삭제할까요?");
  if (!ok) return;

  const snap = await getDocs(collection(db, "notes"));
  for (const d of snap.docs) {
    await deleteDoc(doc(db, "notes", d.id));
  }

  alert("초기화 완료!");
  location.reload();
}

function selectAll() {
  document.querySelectorAll(".memo-check").forEach(c => c.checked = true);
}

async function deleteSelected() {
  const password = prompt("선택 삭제 마스터키 입력");
  if (password !== MASTER_KEY) return alert("마스터키 틀림");

  const checks = document.querySelectorAll(".memo-check:checked");
  if (checks.length === 0) return alert("선택된 메모 없음");

  const ok = confirm("선택한 메모를 삭제할까요?");
  if (!ok) return;

  for (const c of checks) {
    await updateDoc(doc(db, "notes", c.value), { deleted: true });
  }

  alert("선택 삭제 완료!");
  load();
}

// 전역 window 스코프에 바인딩 처리
window.goHome = goHome;
window.goCreate = goCreate;
window.goTrash = goTrash;
window.resetAll = resetAll;
window.selectAll = selectAll;
window.deleteSelected = deleteSelected;
window.handleSearchKey = handleSearchKey;
window.render = render;

// DOM이 완벽히 그려진 다음 로딩을 개시하여 바인딩 오류 원천 방지
document.addEventListener("DOMContentLoaded", () => {
  load();
});
</script>

<div id="version">v26.6.27.2</div>
<div id="warning">부적절한 어휘는 조치될 수 있습니다.</div>

</body>
</html>
