<!DOCTYPE html>
<html>
<head>
  <title>메모</title>

  <style>
    body {
      font-family: sans-serif;
      background: #f0f0f0;
      padding: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 14px;
      background: white;
      cursor: pointer;
      margin: 3px;
    }

    button:hover {
      background: #e6e6e6;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 20px;
      margin-top: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 14px;
      background: white;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    .memo-item {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 16px;
      margin-top: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .memo-item:hover {
      background: #ececec;
    }

    .memo-title {
      font-size: 18px;
      font-weight: bold;
    }

    .memo-info {
      color: gray;
      font-size: 13px;
      margin-top: 5px;
    }

    .empty {
      text-align: center;
      color: gray;
      padding: 30px;
    }
  </style>
</head>

<body>

<div class="top-bar">
  <div>
    <button onclick="goHome()">홈</button>
    <button onclick="goTrash()">휴지통</button>
  </div>

  <button onclick="goCreate()">새 메모</button>
</div>

<input id="searchInput" placeholder="메모 검색..." oninput="renderMemos()" />

<div id="memoList"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import {
    getFirestore,
    collection,
    getDocs,
    query,
    orderBy
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  // 🔥 Firebase 설정
  const firebaseConfig = {
    apiKey: "AIzaSyCN6oIrvun0LDBJ940l5c7-cfRrJuePIA",
    authDomain: "memo-5123c.firebaseapp.com",
    projectId: "memo-5123c",
    storageBucket: "memo-5123c.firebasestorage.app",
    messagingSenderId: "984347291633",
    appId: "1:984347291633:web:e80fd3f599f62c46a11e50"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let notes = [];

  // 🔥 Firestore에서 가져오기
  async function loadNotes() {
    const q = query(collection(db, "memo"), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);

    notes = snap.docs.map(doc => ({
      id: doc.id,
      ...doc.data()
    }));

    renderMemos();
  }

  function renderMemos() {
    const memoList = document.getElementById("memoList");
    const search = document.getElementById("searchInput").value.toLowerCase();

    const filtered = notes
      .filter(n => !n.deleted)
      .filter(n => n.title.toLowerCase().includes(search));

    memoList.innerHTML = "";

    if (filtered.length === 0) {
      memoList.innerHTML = `
        <div class="card empty">메모가 없습니다.</div>
      `;
      return;
    }

    filtered.forEach(note => {
      const div = document.createElement("div");
      div.className = "memo-item";

      div.innerHTML = `
        <div class="memo-title">📄 ${note.title}</div>
        <div class="memo-info">
          👤 ${note.author || "unknown"}
          · 🕒 ${new Date(note.createdAt).toLocaleString()}
        </div>
      `;

      div.onclick = () => {
        location.href = "view.html?id=" + note.id;
      };

      memoList.appendChild(div);
    });
  }

  function goCreate() {
    location.href = "create.html";
  }

  function goTrash() {
    location.href = "trash.html";
  }

  function goHome() {
    location.href = "https://25withcoding.kr";
  }

  loadNotes();

  // 🔥 버튼 복구 (필수)
window.goCreate = () => {
  location.href = "create.html";
};

window.goTrash = () => {
  location.href = "trash.html";
};

window.goHome = () => {
  location.href = "https://25withcoding.kr";
};
  
</script>

</body>
</html>
