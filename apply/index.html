<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2기 지원 | 코딩과 함께라면</title>

<link rel="icon" href="/2025withcoding_logo.png" type="image/png">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  min-height: 100vh;
  background-image: url("/bg1.png");
  background-size: cover;
  background-position: center;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 햄버거 버튼 */
.hamburger {
  position: fixed;
  top: 20px;
  left: 20px;
  width: 30px;
  height: 30px;
  background: url("/hamburgerbotton.png") no-repeat center/contain;
  border: none;
  cursor: pointer;
  z-index: 3000;
}

/* 사이드 메뉴 */
.menu {
  position: fixed;
  top: 0;
  left: -260px;
  width: 260px;
  height: 100vh;
  background: #f0f0f0;
  transition: left 0.3s ease;
  z-index: 2500;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.menu.active { left: 0; }

.menu .menu-logo {
  margin-top: 8vh;
  margin-bottom: 5vh;
}

.menu .menu-logo img {
  width: 70px;
}

.menu a {
  text-decoration: none;
  color: #000;
  font-weight: bold;
  margin: 10px 0;
  font-size: 1.05em;
  text-align: center;
}

/* 신청 박스 */
.apply-box {
  background: rgba(255,255,255,0.85);
  padding: 22px 20px;
  border-radius: 14px;
  width: 82%;
  max-width: 300px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.18);
  text-align: center;
}

.apply-box h2 {
  margin-bottom: 18px;
}

.apply-box input {
  width: 100%;
  padding: 9px;
  margin-bottom: 10px;
  font-size: 0.95em;
}

.apply-box button {
  width: 100%;
  padding: 10px;
  font-size: 0.95em;
  font-weight: bold;
  cursor: pointer;
}

/* 모바일 배경 */
@media screen and (max-width: 600px) {
  body {
    background-image: url("/bg2.png");
  }
}
</style>
</head>

<body>

<!-- 햄버거 버튼 -->
<button class="hamburger" onclick="toggleMenu()"></button>

<!-- 사이드 메뉴 -->
<nav class="menu" id="sideMenu">
  <div class="menu-logo">
    <img src="/2025withcoding_logo.png" alt="logo">
  </div>
  <a href="/" onclick="closeMenu()">홈</a>
  <a href="/apply" onclick="closeMenu()">2기 지원</a>
  <a href="/result" onclick="closeMenu()">결과 확인</a>
</nav>

<!-- 신청 박스 -->
<div class="apply-box">
  <h2>2기 지원</h2>

  <input type="text" id="name" placeholder="이름">
  <input type="text" id="number" placeholder="학번">

  <button onclick="submitForm()">제출하기</button>
</div>

<script>
/* 🔧 안내 문구는 여기만 수정하면 됨 */
const INTERVIEW_DATE = "3월 15l3일";
const INTERVIEW_TIME = "점심시간 (13:05)";
const INTERVIEW_PLACE = "1층 컴퓨터실 (118호)";

function toggleMenu(){
  document.getElementById("sideMenu").classList.toggle("active");
}
function closeMenu(){
  document.getElementById("sideMenu").classList.remove("active");
}

function submitForm(){
  const name = document.getElementById("name").value.trim();
  const number = document.getElementById("number").value.trim();

  if(!name || !number){
    alert("이름과 학번을 입력하세요.");
    return;
  }

  if(!confirm("신청하시겠습니까?")) return;

  const url =
    "https://docs.google.com/forms/d/e/1FAIpQLScCTt2QrJ9dgBgDjHRXBkYtZkn2bA0Aa5gMwmwmUppiIEtJ3A/formResponse" +
    "?entry.436690331=" + encodeURIComponent(name) +
    "&entry.930905451=" + encodeURIComponent(number) +
    "&submit=Submit";

  fetch(url, { mode: "no-cors" });

  alert(
    "신청이 완료되었습니다.\n\n" +
    "면접일자 : " + INTERVIEW_DATE + " " + INTERVIEW_TIME + "\n" +
    INTERVIEW_PLACE + "로 오세요."
  );

  document.getElementById("name").value = "";
  document.getElementById("number").value = "";
}
</script>

</body>
</html>
