<!DOCTYPE html>
<html>
<head>
  <title>메인</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background-color: #f0f0f0;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      padding: 10px 14px;
      margin: 5px;
      border-radius: 14px;
      border: none;
      background-color: #ffffff;
      cursor: pointer;
    }

    button:hover {
      background-color: #e6e6e6;
    }

    .home-icon {
      width: 24px;
      height: 24px;
      position: relative;
      display: inline-block;
    }

    .home-icon::before {
      content: "";
      position: absolute;
      width: 20px;
      height: 14px;
      background: black;
      bottom: 0;
      left: 2px;
    }

    .home-icon::after {
      content: "";
      position: absolute;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-bottom: 12px solid black;
      top: -2px;
      left: 0;
    }

    .card {
      background-color: white;
      padding: 15px;
      border-radius: 20px;
      margin-top: 10px;
    }

    .user-item {
      display: flex;
      align-items: center;
      padding: 10px;
      margin: 5px 0;
      border-radius: 14px;
      background-color: #f9f9f9;
      cursor: pointer;
    }

    .user-item.selected {
      background-color: #dcdcdc;
    }

    .user-item input {
      margin-right: 10px;
    }

    input[type="text"] {
      padding: 10px;
      border-radius: 14px;
      border: none;
      background-color: white;
      width: 180px;
    }

    .footer {
      position: fixed;
      bottom: 10px;
      right: 15px;
      font-size: 12px;
      color: #555;
    }

    .loading-inline {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .spinner {
      border: 4px solid #ddd;
      border-top: 4px solid black;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

  </style>
</head>

<body>

<div class="top-bar">
  <button onclick="goHome()"><div class="home-icon"></div></button>
  <button onclick="logout()">로그아웃</button>
</div>

<h2>2026 코딩과 함께라면 상벌점 시스템</h2>

<!-- 내 정보 -->
<div class="card" id="myInfo">
  <div class="loading-inline">
    <span>불러오는 중...</span>
    <div class="spinner"></div>
  </div>
</div>

<!-- 컨트롤 -->
<button onclick="selectAll()">모두 선택</button>
<button onclick="clearAll()">선택 해제</button>

<!-- 리스트 -->
<div class="card" id="userList"></div>

<br>

<input id="scoreInput" type="text" placeholder="상벌점을 입력하세요.">
<button onclick="apply()">적용</button>

<div class="footer">
  *이 시스템은 학교 내 그린마일리지와는 무관합니다.*
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgOAO72ArbW8dO7OSYsTVEQtRHT049U20",
  authDomain: "points2026-f5e50.firebaseapp.com",
  projectId: "points2026-f5e50"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedUsers = new Set();

const myId = localStorage.getItem("userId");

if(!myId){
  alert("로그인 필요");
  location.href = "index.html";
}

// 내 정보
const mySnap = await getDoc(doc(db, "users", myId));
const myData = mySnap.data();

document.getElementById("myInfo").innerText =
  "이름: " + myData.name +
  " / 점수: " + myData.score +
  " / 역할: " + myData.role;

// 리스트 생성
const listDiv = document.getElementById("userList");
const querySnapshot = await getDocs(collection(db, "users"));

querySnapshot.forEach((docu) => {
  const d = docu.data();

  const div = document.createElement("div");
  div.className = "user-item";

  const checkbox = document.createElement("input");
  checkbox.type = "checkbox";

  const text = document.createElement("span");
  text.innerText = docu.id + " - " + d.name + " (" + d.score + ")";

  checkbox.onchange = () => {
    if(checkbox.checked){
      selectedUsers.add(docu.id);
      div.classList.add("selected");
    } else {
      selectedUsers.delete(docu.id);
      div.classList.remove("selected");
    }
  };

  div.onclick = () => {
    checkbox.checked = !checkbox.checked;
    checkbox.onchange();
  };

  div.appendChild(checkbox);
  div.appendChild(text);
  listDiv.appendChild(div);
});

// 모두 선택
window.selectAll = () => {
  document.querySelectorAll(".user-item").forEach((el, i) => {
    const cb = el.querySelector("input");
    cb.checked = true;
    cb.onchange();
  });
};

// 선택 해제
window.clearAll = () => {
  selectedUsers.clear();
  document.querySelectorAll(".user-item").forEach(el => {
    el.classList.remove("selected");
    el.querySelector("input").checked = false;
  });
};

// 점수 적용
window.apply = async () => {
  if(myData.role === "student"){
    alert("권한 없음");
    return;
  }

  const val = Number(document.getElementById("scoreInput").value);

  if(isNaN(val)){
    alert("숫자 입력");
    return;
  }

  for(const id of selectedUsers){
    await updateDoc(doc(db, "users", id), {
      score: increment(val)
    });
  }

  alert("적용 완료");
  location.reload();
};

// 로그아웃
window.logout = () => {
  localStorage.removeItem("userId");
  location.href = "index.html";
};

// 홈 이동
window.goHome = () => {
  location.href = "https://25withcoding.kr";
};
</script>

</body>
</html>
