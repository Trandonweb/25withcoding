<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상벌점 시스템 관리자</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 50px; }
    input, select, button { margin: 5px; padding: 5px; }
    h1 { margin-bottom: 20px; }
  </style>
</head>
<body>

  <!-- 관리자 로그인 화면 -->
  <div id="loginDiv">
    <h1>관리자 로그인</h1>
    <input type="password" id="adminPassword" placeholder="비밀번호">
    <button onclick="adminLogin()">로그인</button>
  </div>

  <!-- 관리자 대시보드 화면 -->
  <div id="dashboardDiv" style="display:none;">
    <h1>관리자 대시보드</h1>
    <label>사용자 선택:</label>
    <select id="userSelect">
      <option value="">선택</option>
    </select>
    <br>
    <input type="number" id="scoreInput" placeholder="점수 입력">
    <input type="text" id="reasonInput" placeholder="사유 입력">
    <button onclick="addScore()">점수 추가</button>
    <p id="status"></p>
  </div>

  <script>
    // Supabase 설정
    const SUPABASE_URL = "https://YOUR_PROJECT_ID.supabase.co"; // 본인 프로젝트 URL로 변경
    const SUPABASE_ANON_KEY = "sb_publishable_RpNZKmYfi_mvYgLjjhAgpw_hQkk4641";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 관리자 비밀번호 (하드코딩)
    const ADMIN_PASSWORD = "zheldrhkgkaRpffkaus";

    // 로그인 함수
    function adminLogin() {
      const pw = document.getElementById('adminPassword').value;
      if (pw === ADMIN_PASSWORD) {
        document.getElementById('loginDiv').style.display = 'none';
        document.getElementById('dashboardDiv').style.display = 'block';
        loadUsers();
      } else {
        alert("비밀번호가 틀렸습니다.");
      }
    }

    // 사용자 목록 불러오기
    async function loadUsers() {
      const { data, error } = await supabase.from('users').select('*').order('name');
      if (error) {
        alert("사용자 로딩 실패: " + error.message);
        return;
      }
      const select = document.getElementById('userSelect');
      select.innerHTML = '<option value="">선택</option>'; // 초기화
      data.forEach(user => {
        const option = document.createElement('option');
        option.value = user.id;
        option.text = user.name;
        select.add(option);
      });
    }

    // 점수 추가 함수
    async function addScore() {
      const userId = document.getElementById('userSelect').value;
      const score = document.getElementById('scoreInput').value;
      const reason = document.getElementById('reasonInput').value;

      if (!userId || !score || !reason) {
        alert("모든 항목을 입력해주세요.");
        return;
      }

      const { error } = await supabase.from('score_logs').insert([
        { user_id: userId, score: parseInt(score), reason: reason, admin_id: null }
      ]);

      if (error) {
        document.getElementById('status').textContent = "점수 추가 실패: " + error.message;
      } else {
        document.getElementById('status').textContent = "점수 추가 완료!";
        document.getElementById('scoreInput').value = '';
        document.getElementById('reasonInput').value = '';
      }
    }
  </script>

</body>
</html>
