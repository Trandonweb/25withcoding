<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메모 목록</title>

  <style>

    body {
      font-family: sans-serif;
      background: #f0f0f0;
      margin: 0;
      padding: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
      background: white;
      cursor: pointer;
    }

    button:hover {
      background: #e6e6e6;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 16px;
      margin-top: 10px;
    }

    .memo {
      background: #f9f9f9;
      padding: 12px;
      border-radius: 12px;
      margin: 8px 0;
      cursor: pointer;
    }

    .memo:hover {
      background: #eee;
    }

  </style>
</head>

<body>

<div class="top-bar">

  <button onclick="goHome()">홈</button>

  <button onclick="goCreate()">새 메모</button>

</div>

<h2>📝 메모 목록</h2>

<div class="card" id="list">
  로딩중...
</div>

<script type="module">

import { db } from "/js/firebase.js";
import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const listDiv =
  document.getElementById("list");

async function loadMemos() {

  const snap =
    await getDocs(collection(db, "notes"));

  listDiv.innerHTML = "";

  snap.forEach(docu => {

    const data = docu.data();

    if (data.deleted) return;

    const div =
      document.createElement("div");

    div.className = "memo";

    div.innerHTML = `
      <b>${data.title}</b><br>
      <small>${data.author}</small>
    `;

    div.onclick = () => {
      location.href =
        "view.html?id=" + docu.id;
    };

    listDiv.appendChild(div);

  });

}

function goHome() {
  location.href = "/";
}

function goCreate() {
  location.href = "create.html";
}

loadMemos();

</script>

</body>
</html>
