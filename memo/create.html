<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메모 작성</title>

  <style>

    body {
      font-family: sans-serif;
      background: #f0f0f0;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      max-width: 600px;
      margin: auto;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-family: sans-serif;
    }

    textarea {
      height: 200px;
      resize: none;
    }

    button {
      margin-top: 15px;
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #111;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    .top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

  </style>
</head>

<body>

<div class="card">

  <div class="top">
    <button onclick="goBack()">← 뒤로</button>
    <h3>📝 메모 작성</h3>
    <div></div>
  </div>

  <input id="title" placeholder="제목">

  <textarea id="content" placeholder="내용"></textarea>

  <button onclick="saveMemo()">저장</button>

</div>

<script type="module">

import { db } from "/js/firebase.js";
import {
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

function getUser() {
  return localStorage.getItem("userId") || "unknown";
}

async function saveMemo() {

  const title =
    document.getElementById("title").value;

  const content =
    document.getElementById("content").value;

  if (!title || !content) {
    alert("제목/내용 입력");
    return;
  }

  const user = getUser();

  await addDoc(collection(db, "notes"), {

    title: title,
    content: content,
    author: user,
    deleted: false,
    createdAt: new Date().toISOString()

  });

  location.href = "index.html";

}

function goBack() {
  location.href = "index.html";
}

window.saveMemo = saveMemo;
window.goBack = goBack;

</script>

</body>
</html>
