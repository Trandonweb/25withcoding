<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상벌점 시스템 관리자</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    #loginDiv, #dashboardDiv {
      background-color: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      text-align: center;
      width: 320px;
    }
    input, select, button {
      margin: 10px 0;
      padding: 10px;
      width: 90%;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      border: none;
      transition: 0.3s;
    }
    button:hover {
      background-color: #45a049;
    }
    h1 {
      margin-bottom: 25px;
    }
    #status {
      margin-top: 15px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>

  <!-- 관리자 로그인 화면 -->
  <div id="loginDiv">
    <h1>관리자 로그인</h1>
    <input type="password" id="adminPassword" placeholder="비밀번호">
    <button type="button" onclick="adminLogin()">로그인</button>
  </div>

  <!-- 관리자 대시보드 화면 -->
  <div id="dashboardDiv" style="display:none;">
    <h1>관리자 대시보드</h1>
    <select id="userSelect">
      <option value="">사용자 선택</option>
    </select>
    <input type="number" id="scoreInput" placeholder="점수 입력">
    <input type="text" id="reasonInput" placeholder="사유 입력">
    <button type="button" onclick="addScore()">점수 추가</button>
    <p id="status"></p>
  </div>

  <script>
    // Supabase 설정
    const SUPABASE_URL = "https://YOUR_PROJECT_ID.supabase.co"; // 본인 프로젝트 URL
    const SUPABASE_ANON_KEY = "sb_publishable_RpNZKmYfi_mvYgLjjhAgpw_hQkk4641";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const ADMIN_PASSWORD = "zheldrhkgkaRpffkaus";

    // 로그인 함수
    function adminLogin() {
      const pw = document.getElementById("adminPassword").value;
      if (pw === ADMIN_PASSWORD) {
        document.getElementById("loginDiv").style.display = "none";
        document.getElementById("dashboardDiv").style.display = "block";
        loadUsers();
      } else {
        alert("비밀번호가 틀렸습니다.");
      }
    }

    // 사용자 목록 불러오기
    async function loadUsers() {
      const { data, error } = await supabase.from('users').select('*').order('name');
      if (error) {
        alert("사용자 로딩 실패: " + error.message);
        return;
      }
      const select = document.getElementById('userSelect');
      select.innerHTML = '<option value="">사용자 선택</option>'; // 초기화
      data.forEach(user => {
        const option = document.createElement('option');
        option.value = user.id;
        option.text = user.name;
        select.add(option);
      });
    }

    // 점수 추가 함수
    async function addScore() {
      const userId = document.getElementById('userSelect').value;
      const score = document.getElementById('scoreInput').value;
      const reason = document.getElementById('reasonInput').value;

      if (!userId || !score || !reason) {
        alert("모든 항목을 입력해주세요.");
        return;
      }

      const { error } = await supabase.from('score_logs').insert([
        { user_id: userId, score: parseInt(score), reason: reason, admin_id: null }
      ]);

      if (error) {
        document.getElementById('status').textContent = "점수 추가 실패: " + error.message;
      } else {
        document.getElementById('status').textContent = "점수 추가 완료!";
        document.getElementById('scoreInput').value = '';
        document.getElementById('reasonInput').value = '';
      }
    }
  </script>

</body>
</html>
