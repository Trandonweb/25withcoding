<!DOCTYPE html>
<html>
<head>
  <title>메인</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
    }

    #loading {
      display: none;
      margin-top: 20px;
    }

    .spinner {
      border: 5px solid #ddd;
      border-top: 5px solid black;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="top-bar">
  <button onclick="goHome()">🏠 홈</button>
  <button onclick="logout()">로그아웃</button>
</div>

<h2>코딩과 함께라면</h2>

<!-- 🔥 내 정보 -->
<div class="card" id="myInfo">불러오는 중...</div>

<hr>

<!-- 🔥 대상 선택 -->
<select id="userList"></select>
<br><br>

<input id="scoreInput" type="text" placeholder="점수 입력 (+3, -2)">
<button onclick="apply()">적용</button>

<!-- 🔥 로딩 -->
<div id="loading">
  <div class="spinner"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgOAO72ArbW8dO7OSYsTVEQtRHT049U20",
  authDomain: "points2026-f5e50.firebaseapp.com",
  projectId: "points2026-f5e50"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const loading = document.getElementById("loading");

function showLoading(state){
  loading.style.display = state ? "block" : "none";
}

const myId = localStorage.getItem("userId");

if(!myId){
  alert("로그인 필요");
  location.href = "index.html";
}

showLoading(true);

// 🔥 내 정보 먼저 로드
const mySnap = await getDoc(doc(db, "users", myId));
const myData = mySnap.data();

document.getElementById("myInfo").innerText =
  "이름: " + myData.name +
  " / 점수: " + myData.score +
  " / 역할: " + myData.role;

// 🔥 목록 불러오기
const querySnapshot = await getDocs(collection(db, "users"));
const select = document.getElementById("userList");

querySnapshot.forEach((docu) => {
  const d = docu.data();
  const option = document.createElement("option");
  option.value = docu.id;
  option.text = docu.id + " - " + d.name;
  select.appendChild(option);
});

showLoading(false);

// 🔥 점수 적용
window.apply = async () => {
  if(myData.role === "student"){
    alert("권한 없음");
    return;
  }

  const target = select.value;
  const val = Number(document.getElementById("scoreInput").value);

  if(isNaN(val)){
    alert("숫자 입력 (+3, -2)");
    return;
  }

  showLoading(true);

  await updateDoc(doc(db, "users", target), {
    score: increment(val)
  });

  alert("적용 완료");
  location.reload();
};

// 🔥 로그아웃
window.logout = () => {
  localStorage.removeItem("userId");
  location.href = "index.html";
};

// 🔥 홈 이동
window.goHome = () => {
  location.href = "https://25withcoding.kr";
};
</script>

</body>
</html>
