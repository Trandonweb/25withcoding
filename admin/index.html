<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>관리자 | 코딩과 함께라면</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    background:#f0f0f0;
}

header{
    background:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

header h1{
    font-size:26px;
}

header p{
    color:#666;
    margin-top:5px;
}

#logout{
    background:#ff5b5b;
    border:none;
    color:white;
    padding:10px 18px;
    border-radius:12px;
    cursor:pointer;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:18px;
    cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    transition:.2s;
}

.card:hover{
    transform:translateY(-5px);
}

.main{
    border-left:6px solid #33cc77;
}

.disabled{
    opacity:.45;
    cursor:default;
}

footer{
    text-align:center;
    padding:30px;
    color:#888;
}

#loading{
    position:fixed;
    inset:0;
    background:#f0f0f0;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:25px;
}
</style>

</head>


<body>


<div id="loading">
확인 중...
</div>


<header>

<div>

<h1>
관리자 페이지
</h1>

<p id="welcome">
불러오는 중...
</p>

</div>


<button id="logout">
로그아웃
</button>


</header>



<div class="container">


<div class="grid">


<div class="card main" id="mirroring">

<h2>
🖥 화면 모니터링
</h2>

<p>
학생 화면 실시간 확인
</p>

</div>



<div class="card disabled">

<h2>
👥 사용자 관리
</h2>

<p>
준비 중
</p>

</div>



<div class="card disabled">

<h2>
🏅 상벌점 관리
</h2>

<p>
준비 중
</p>

</div>



<div class="card disabled">

<h2>
📊 통계
</h2>

<p>
준비 중
</p>

</div>



</div>


</div>


<footer>

2026 Coding Together Administrator

</footer>



<script type="module">

import {
    requireAdmin
} from "./js/auth.js";



try{


const user =
    await requireAdmin();



document.getElementById("welcome").innerHTML =
`
안녕하세요,
<b>${user.name}</b>님
(${user.role})
`;



document.getElementById("loading").style.display="none";



}catch(e){

console.error(e);

}



document.getElementById("logout").onclick=()=>{

localStorage.removeItem("userId");

location.href="/signin/";

};



document.getElementById("mirroring").onclick=()=>{

location.href="/admin/mirroring.html";

};


</script>


</body>
</html>
