<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>1학년 부장 투표</title>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://puioibuxdbpzlxcfgvep.supabase.co',
  'YOUR_KEY'
)

window.supabase = supabase
</script>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #111;
  color: white;
}
input {
  padding: 15px;
  font-size: 18px;
  width: 250px;
  margin: 10px;
  border-radius: 10px;
}
.card {
  background: #222;
  margin: 10px auto;
  padding: 15px;
  width: 280px;
  border-radius: 15px;
}
button {
  margin: 5px;
  padding: 10px 15px;
  border-radius: 10px;
}
#adminPanel {
  display:none;
  position:fixed;
  bottom:10px;
  right:10px;
  background:#222;
  padding:10px;
}
</style>
</head>

<body>

<h1>1학년 부장 투표</h1>

<input id="studentId" placeholder="학번 입력">
<div id="candidates"></div>

<button onclick="toggleAdmin()">⚙</button>

<div id="adminPanel">
  <input id="name" placeholder="후보 이름">
  <button onclick="addCandidate()">추가</button>
  <button onclick="resetVotes()">초기화</button>
  <button onclick="toggleResult()">결과 보기</button>
</div>

<script>

const adminKey = "1234"; // 바꿔
let showResult = false;

const validStudents = [
"20623","20417","20522","20524","20813","20921",
"10814","10810","10805","10206","10212","10403"
];

// 🔥 데이터 로드
async function loadData() {

  const { data: candidates } = await supabase
    .from('candidates')
    .select('*')

  const { data: votes } = await supabase
    .from('votes')
    .select('*')

  let map = {}

  candidates.forEach(c => {
    map[c.name] = 0
  })

  votes.forEach(v => {
    const name = v.choice?.trim()
    if (map[name] !== undefined) {
      map[name]++
    }
  })

  render(map)
}

// 🔥 렌더
function render(data) {
  const div = document.getElementById("candidates")
  div.innerHTML = ""

  for (let name in data) {
    const card = document.createElement("div")
    card.className = "card"

    const h = document.createElement("h2")
    h.innerText = name

    const p = document.createElement("p")
    p.innerText = showResult ? "득표: " + data[name] : "투표 진행중"

    const btn = document.createElement("button")
    btn.innerText = "투표"
    btn.onclick = () => vote(name)

    card.appendChild(h)
    card.appendChild(p)
    card.appendChild(btn)

    div.appendChild(card)
  }
}

// 🔥 투표
async function vote(name) {

  const id = document.getElementById("studentId").value.trim()

  if (!id) return alert("학번 입력")
  if (!validStudents.includes(id)) return alert("허용된 학번 아님")

  const { data: existing } = await supabase
    .from('votes')
    .select('*')
    .eq('user_id', id)

  if (existing.length > 0) return alert("이미 투표함")

  const { error } = await supabase.from('votes').insert([
    { user_id: id, choice: name.trim() }
  ])

  if (error) {
    alert("에러: " + error.message)
    return
  }

  alert("투표 완료")
  loadData()
}

// 🔥 후보 추가
async function addCandidate() {

  const key = prompt("관리자 암호")
  if (key !== adminKey) return alert("암호 틀림")

  const name = document.getElementById("name").value.trim()
  if (!name) return alert("이름 입력")

  const { error } = await supabase.from('candidates').insert([
    { name }
  ])

  if (error) {
    alert("이미 존재하거나 오류")
    return
  }

  loadData()
}

// 🔥 초기화
async function resetVotes() {

  const key = prompt("관리자 암호")
  if (key !== adminKey) return alert("암호 틀림")

  await supabase.from('votes').delete().neq('id', 0)

  alert("초기화 완료")
  loadData()
}

// 🔥 결과 보기
function toggleResult() {
  showResult = !showResult
  loadData()
}

// 🔥 관리자 패널
function toggleAdmin() {
  const p = document.getElementById("adminPanel")
  p.style.display = p.style.display === "none" ? "block" : "none"
}

// 시작
loadData()

</script>

</body>
</html>
