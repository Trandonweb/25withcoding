<!DOCTYPE html>
<html>
<head>
  <title>관리자 페이지</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background-color: #f0f0f0;
    }

    h2 {
      margin-bottom: 10px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 20px;
      margin-bottom: 15px;
    }

    input, select {
      padding: 10px;
      border-radius: 12px;
      border: none;
      margin: 5px;
      background: #f5f5f5;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
      background: white;
      cursor: pointer;
      margin: 5px;
    }

    button:hover {
      background: #e6e6e6;
    }

    .user {
      padding: 10px;
      border-radius: 12px;
      background: #f9f9f9;
      margin-top: 8px;
    }

    .plus {
      color: blue;
      font-weight: bold;
    }

    .minus {
      color: red;
      font-weight: bold;
    }

    .zero {
      color: black;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="top-bar">

  <button onclick="goBack()">
    뒤로가기
  </button>

  <h2>관리자 페이지</h2>

</div>

<div class="card">

  <h3>유저 추가</h3>

  <input id="newId" placeholder="아이디">
  <input id="newName" placeholder="이름">

  <select id="newRole">
    <option value="student">학생</option>
    <option value="vice">부회장</option>
    <option value="president">회장</option>
  </select>

  <button onclick="createUser()">생성</button>

</div>

<div class="card">

  <h3>전체 점수 초기화</h3>

  <button onclick="resetAll()">전체 초기화</button>

</div>

<div class="card">

  <h3>유저 관리</h3>

  <div id="userList">로딩중...</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  getDoc,
  setDoc,
  updateDoc,
  deleteDoc
}
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgOAO72ArbW8dO7OSYsTVEQtRHT049U20",
  authDomain: "points2026-f5e50.firebaseapp.com",
  projectId: "points2026-f5e50"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const myId = localStorage.getItem("userId");

if (!myId) {
  alert("로그인이 필요합니다.");
  location.href = "index.html";
}

const mySnap = await getDoc(doc(db, "users", myId));

if (!mySnap.exists()) {
  alert("사용자 없음");
  location.href = "index.html";
}

const myData = mySnap.data();

/* 회장만 접근 가능 */
if (myData.role !== "president") {
  alert("접근 권한이 없습니다.");
  location.href = "main.html";
}

/* 점수 색상 */
function formatScore(score) {

  if (score > 0) {
    return `<span class="plus">${score}</span>`;
  }

  if (score < 0) {
    return `<span class="minus">${score}</span>`;
  }

  return `<span class="zero">${score}</span>`;
}

/* 권한 한글화 */
function roleToText(role) {

  if (role === "president") return "회장";
  if (role === "vice") return "부회장";

  return "학생";
}

/* 유저 생성 */
window.createUser = async () => {

  const id =
    document.getElementById("newId").value.trim();

  const name =
    document.getElementById("newName").value.trim();

  const role =
    document.getElementById("newRole").value;

  if (!id || !name) {
    alert("입력해주세요.");
    return;
  }

  const ref = doc(db, "users", id);

  const snap = await getDoc(ref);

  if (snap.exists()) {
    alert("이미 존재하는 아이디");
    return;
  }

  await setDoc(ref, {
    name: name,
    role: role,
    score: 0
  });

  alert("생성 완료");

  location.reload();
};

/* 전체 초기화 */
window.resetAll = async () => {

  if (!confirm("전체 점수를 초기화할까요?")) {
    return;
  }

  const snaps =
    await getDocs(collection(db, "users"));

  for (const user of snaps.docs) {

    await updateDoc(doc(db, "users", user.id), {
      score: 0
    });

  }

  alert("초기화 완료");

  location.reload();
};

/* 유저 목록 */
const userList =
  document.getElementById("userList");

userList.innerHTML = "";

const querySnapshot =
  await getDocs(collection(db, "users"));

querySnapshot.forEach((docu) => {

  const d = docu.data();

  const div = document.createElement("div");

  div.className = "user";

  div.innerHTML = `

    <b>${docu.id}</b> -
    ${d.name}

    (${formatScore(d.score)})

    [${roleToText(d.role)}]

    <br><br>

    <select id="role_${docu.id}">
      <option value="student"
        ${d.role === "student" ? "selected" : ""}>
        학생
      </option>

      <option value="vice"
        ${d.role === "vice" ? "selected" : ""}>
        부회장
      </option>

      <option value="president"
        ${d.role === "president" ? "selected" : ""}>
        회장
      </option>
    </select>

    <button onclick="changeRole('${docu.id}')">
      권한 변경
    </button>

    <button onclick="deleteUser('${docu.id}')">
      삭제
    </button>

  `;

  userList.appendChild(div);

});

/* 권한 변경 */
window.changeRole = async (id) => {

  const role =
    document.getElementById("role_" + id).value;

  await updateDoc(doc(db, "users", id), {
    role: role
  });

  alert("권한 변경 완료");

  location.reload();
};

/* 유저 삭제 */
window.deleteUser = async (id) => {

  if (id === myId) {
    alert("자기 자신은 삭제 불가");
    return;
  }

  if (!confirm(id + " 삭제할까요?")) {
    return;
  }

  await deleteDoc(doc(db, "users", id));

  alert("삭제 완료");

  location.reload();
};
window.goBack = () => {

  location.href = "main.html";

};
  
</script>

</body>
</html>
