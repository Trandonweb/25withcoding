<!DOCTYPE html>
<html>
<body>

<h2>로그인</h2>

<input id="id" placeholder="학번">
<input id="pw" type="password" placeholder="비밀번호">
<button onclick="togglePw()">👁</button>
<br><br>
<button onclick="login()">로그인</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgOAO72ArbW8dO7OSYsTVEQtRHT049U20",
  authDomain: "points2026-f5e50.firebaseapp.com",
  projectId: "points2026-f5e50"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.togglePw = () => {
  const pw = document.getElementById("pw");
  pw.type = pw.type === "password" ? "text" : "password";
};

window.login = async () => {
  const id = document.getElementById("id").value;
  const pw = document.getElementById("pw").value;

  const snap = await getDoc(doc(db, "users", id));
  if(!snap.exists()){
    alert("계정 없음");
    return;
  }

  const data = snap.data();

  if(pw !== data.password){
    alert("비밀번호 틀림");
    return;
  }

  localStorage.setItem("userId", id);

  if(data.password === data.birth || data.password === "qwer1234!"){
    location.href = "change.html";
  } else {
    location.href = "main.html";
  }
};
</script>

</body>
</html>
