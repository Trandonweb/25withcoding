<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI vs HUMAN</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Pretendard",sans-serif;
}

body{
    background:#111827;
    color:white;
    min-height:100vh;
}

header{
    text-align:center;
    padding:25px;
    background:#1f2937;
    border-bottom:2px solid #374151;
}

header h1{
    font-size:2rem;
}

header p{
    margin-top:8px;
    color:#9ca3af;
}

#screen{
    padding:20px;
    max-width:1200px;
    margin:auto;
}

#homeScreen{
    display:flex;
    flex-direction:column;
    gap:15px;
    max-width:700px;
    margin:auto;
}

.main-btn{
    width:100%;
    padding:25px;
    border:none;
    border-radius:15px;
    background:#2563eb;
    color:white;
    font-size:1.3rem;
    cursor:pointer;
    transition:0.2s;
}

.main-btn:hover{
    transform:translateY(-2px);
}

.back-btn{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#374151;
    color:white;
    cursor:pointer;
    margin-bottom:20px;
}

#gameList{
    display:grid;
    gap:15px;
}

.game-select-btn{
    width:100%;
    padding:20px;
    border:none;
    border-radius:15px;
    background:#1f2937;
    color:white;
    font-size:1.1rem;
    cursor:pointer;
    transition:0.2s;
}

.game-select-btn:hover{
    background:#374151;
}

#gameArea{
    background:#1f2937;
    border-radius:15px;
    padding:25px;
    min-height:600px;
}

.placeholder{
    text-align:center;
    color:#9ca3af;
    margin-top:100px;
    line-height:1.8;
}

footer{
    text-align:center;
    color:#6b7280;
    padding:20px;
}

</style>
</head>
<body>

<header>
    <h1>🤖 AI vs HUMAN</h1>
    <p>인공지능을 이길 수 있을까?</p>
</header>

<div id="screen">

    <!-- 홈 화면 -->
    <div id="homeScreen">

        <button
            class="main-btn"
            onclick="showCategory('intelligence')">
            🧠 지능
        </button>

        <button
            class="main-btn"
            onclick="showCategory('physical')">
            ⚽ 피지컬
        </button>

        <button
            class="main-btn"
            onclick="showRanking()">
            🏆 랭킹
        </button>

    </div>

    <!-- 카테고리 화면 -->
    <div
        id="categoryScreen"
        style="display:none;">

        <button
            class="back-btn"
            onclick="showHome()">
            ← 뒤로가기
        </button>

        <div id="gameList"></div>

    </div>

    <!-- 게임 화면 -->
    <div
        id="gameScreen"
        style="display:none;">

        <button
            class="back-btn"
            onclick="backToCategory()">
            ← 뒤로가기
        </button>

        <div id="gameArea"></div>

    </div>

</div>

<footer>
    AI vs HUMAN · 2026 Festival
</footer>

<script>

const intelligenceGames = [
    "⭕ 틱택토",
    "🧩 미로",
    "🔢 숫자 맞추기"
];

const physicalGames = [
    "⚽ 축구",
    "⚾ 야구"
];

let currentCategory = "";

const homeScreen =
    document.getElementById(
        "homeScreen"
    );

const categoryScreen =
    document.getElementById(
        "categoryScreen"
    );

const gameScreen =
    document.getElementById(
        "gameScreen"
    );

const gameList =
    document.getElementById(
        "gameList"
    );

const gameArea =
    document.getElementById(
        "gameArea"
    );

function showHome(){

    homeScreen.style.display =
        "flex";

    categoryScreen.style.display =
        "none";

    gameScreen.style.display =
        "none";
}

function showCategory(type){

    currentCategory = type;

    homeScreen.style.display =
        "none";

    categoryScreen.style.display =
        "block";

    gameScreen.style.display =
        "none";

    gameList.innerHTML = "";

    const list =
        type === "intelligence"
        ? intelligenceGames
        : physicalGames;

    list.forEach(game=>{

        const btn =
            document.createElement(
                "button"
            );

        btn.className =
            "game-select-btn";

        btn.textContent =
            game;

        btn.onclick =
            ()=>openGame(game);

        gameList.appendChild(btn);

    });

}

function openGame(game){

    categoryScreen.style.display =
        "none";

    gameScreen.style.display =
        "block";

    gameArea.innerHTML = `
        <h2>${game}</h2>

        <div class="placeholder">
            아직 개발되지 않았습니다.<br><br>
            곧 AI와 인간의 대결이 시작됩니다.
        </div>
    `;
}

function backToCategory(){

    showCategory(
        currentCategory
    );
}

function showRanking(){

    alert(
        "랭킹 시스템은 곧 구현됩니다."
    );
}

</script>

</body>
</html>
