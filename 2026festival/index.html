<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>2026 Festival</title>
  <style>
    body { font-family: sans-serif; background:#111; color:white; }
    h1 { text-align:center; }

    .grid {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
      gap:15px;
      padding:20px;
    }

    .card {
      background:#222;
      border-radius:12px;
      overflow:hidden;
      cursor:pointer;
      transition:0.2s;
    }

    .card:hover { transform: scale(1.03); }

    .card img {
      width:100%;
      height:120px;
      object-fit:cover;
    }

    .info {
      padding:10px;
    }

    .likes {
      color:#4af;
      font-size:14px;
    }
  </style>
</head>
<body>

<h1>🎉 2026 Festival 실시간 랭킹</h1>

<div class="grid" id="grid"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const grid = document.getElementById("grid");

const projectsRef = ref(db, "projects");

onValue(projectsRef, (snapshot) => {
  const data = snapshot.val();
  grid.innerHTML = "";

  if (!data) return;

  // likes 기준 정렬
  const sorted = Object.entries(data).sort((a,b) => b[1].likes - a[1].likes);

  sorted.forEach(([id, p]) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${p.thumbnail}">
      <div class="info">
        <div>${p.title}</div>
        <div class="likes">❤️ ${p.likes}</div>
      </div>
    `;

    card.onclick = () => {
      location.href = `/2026festival/detail.html?id=${id}`;
    };

    grid.appendChild(card);
  });
});
</script>

</body>
</html>
