<!DOCTYPE html>
<html>
<head>
  <title>휴지통</title>

  <style>

    body {
      font-family: sans-serif;
      background: #f0f0f0;
      padding: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 14px;
      background: white;
      cursor: pointer;
      margin: 3px;
    }

    button:hover {
      background: #e6e6e6;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 20px;
      margin-top: 10px;
    }

    .memo-item {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 16px;
      margin-top: 10px;
    }

    .memo-title {
      font-size: 18px;
      font-weight: bold;
    }

    .memo-info {
      margin-top: 5px;
      color: gray;
      font-size: 13px;
    }

    .actions {
      margin-top: 10px;
      text-align: right;
    }

    .empty {
      text-align: center;
      color: gray;
      padding: 30px;
    }

  </style>
</head>

<body>

<div class="top-bar">

  <button onclick="goBack()">
    뒤로가기
  </button>

</div>

<h2>🗑 휴지통</h2>

<div id="trashList"></div>

<script>

  function getNotes() {

    return JSON.parse(
      localStorage.getItem("notes")
    ) || [];

  }

  let notes = getNotes();

  function renderTrash() {

    const trashList =
      document.getElementById("trashList");

    trashList.innerHTML = "";

    const deletedNotes =
      notes.filter(n => n.deleted);

    if (deletedNotes.length === 0) {

      trashList.innerHTML = `
        <div class="card empty">
          휴지통이 비어있습니다.
        </div>
      `;

      return;

    }

    deletedNotes.forEach(note => {

      const div =
        document.createElement("div");

      div.className = "memo-item";

      div.innerHTML = `

        <div class="memo-title">
          📄 ${note.title}
        </div>

        <div class="memo-info">
          👤 ${note.author}
          ·
          🕒 ${note.createdAt}
        </div>

        <div class="actions">

          <button onclick="restoreNote('${note.id}')">
            복구
          </button>

          <button onclick="deleteForever('${note.id}')">
            영구삭제
          </button>

        </div>

      `;

      trashList.appendChild(div);

    });

  }

  function restoreNote(id) {

    const note =
      notes.find(n => n.id === id);

    if (!note) return;

    note.deleted = false;

    localStorage.setItem(
      "notes",
      JSON.stringify(notes)
    );

    renderTrash();

  }

  function deleteForever(id) {

    const ok =
      confirm("영구 삭제할까요?");

    if (!ok) return;

    notes =
      notes.filter(n => n.id !== id);

    localStorage.setItem(
      "notes",
      JSON.stringify(notes)
    );

    renderTrash();

  }

  function goBack() {

    location.href = "index.html";

  }

  renderTrash();

</script>

</body>
</html>
