<!DOCTYPE html>
<html>
<head>
  <title>메모 수정</title>

  <style>

    body {
      font-family: sans-serif;
      background: #f0f0f0;
      padding: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 14px;
      background: white;
      cursor: pointer;
      margin: 3px;
    }

    button:hover {
      background: #e6e6e6;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
    }

    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      border: none;
      border-radius: 14px;
      padding: 12px;
      margin-top: 10px;
      background: #f5f5f5;
      font-family: sans-serif;
    }

    textarea {
      resize: vertical;
      min-height: 300px;
      font-family: monospace;
    }

    .label {
      margin-top: 15px;
      font-weight: bold;
    }

    .bottom {
      margin-top: 20px;
      text-align: right;
    }

  </style>
</head>

<body>

<div class="top-bar">

  <button onclick="goBack()">
    뒤로가기
  </button>

</div>

<div class="card">

  <h2>✏ 메모 수정</h2>

  <div class="label">
    제목
  </div>

  <input
    id="titleInput"
    placeholder="제목"
  >

  <div class="label">
    내용
  </div>

  <textarea
    id="contentInput"
    placeholder="내용"
  ></textarea>

  <div class="bottom">

    <button onclick="saveEdit()">
      저장
    </button>

  </div>

</div>

<script>

  const params =
    new URLSearchParams(location.search);

  const noteId =
    params.get("id");

  function getNotes() {

    return JSON.parse(
      localStorage.getItem("notes")
    ) || [];

  }

  const notes = getNotes();

  const note =
    notes.find(n => n.id === noteId);

  if (!note) {

    alert("메모를 찾을 수 없습니다.");

    location.href = "index.html";

  }

  /* 기존 데이터 채우기 */

  document.getElementById("titleInput")
    .value = note.title;

  document.getElementById("contentInput")
    .value = note.content;

  /* 저장 */

  function saveEdit() {

    const title =
      document.getElementById("titleInput")
      .value
      .trim();

    const content =
      document.getElementById("contentInput")
      .value;

    if (!title) {

      alert("제목을 입력해주세요.");

      return;

    }

    note.title = title;

    note.content = content;

    localStorage.setItem(
      "notes",
      JSON.stringify(notes)
    );

    alert("수정 완료!");

    location.href =
      "view.html?id=" + noteId;

  }

  function goBack() {

    location.href =
      "view.html?id=" + noteId;

  }

</script>

</body>
</html>
