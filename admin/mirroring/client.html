<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>화면 공유</title>
<style>
body{margin:0;font-family:sans-serif;background:#f0f0f0;display:flex;justify-content:center;align-items:center;height:100vh;}
.box{width:90%;max-width:600px;background:white;padding:30px;border-radius:20px;box-shadow:0 0 20px rgba(0,0,0,.1);}
h1{margin-top:0;color:#27ae60;}
.status{margin-top:20px;font-size:18px;font-weight:bold;}
.warn{margin-top:25px;color:red;line-height:1.7;}
</style>
</head>
<body>

<div class="box">
<h1>화면 공유 중</h1>
<p>관리자에게 화면을 공유하고 있습니다.<br>이 창을 닫지 마세요.</p>
<div class="status" id="status">연결 준비중...</div>
<div class="warn">
- 창을 닫으면 화면 공유가 종료됩니다.<br>
- 새로고침하지 마세요.<br>
- 뒤로가기 하지 마세요.<br>
- 공유가 종료되면 다시 로그인해야 합니다.
</div>
</div>

<!-- 스크립트 블록 전체 교체 -->
<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {getFirestore, doc, getDoc, updateDoc, onSnapshot, arrayUnion, serverTimestamp} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig={
    apiKey:"AIzaSyBgOAO72ArbW8dO7OSYsTVEQtRHT049U20",
    authDomain:"points2026-f5e50.firebaseapp.com",
    projectId:"points2026-f5e50",
    storageBucket:"points2026-f5e50.firebasestorage.app",
    messagingSenderId:"248724251417",
    appId:"1:248724251417:web:02d85cdc4addac98069b88"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const userId=localStorage.getItem("userId");

if(!userId){ alert("로그인이 필요합니다."); location.href="/"; }

const userRef=doc(db,"users",userId);
const statusEl=document.getElementById("status");
function setStatus(text){ statusEl.innerText=text; }

// 💡 지정하신 Metered TURN 서버 정보 적용 완료
const rtcConfig = {
    iceServers: [
        { urls: "stun:stun.relay.metered.ca:80" },
        { urls: "turn:standard.relay.metered.ca:80", username: "cc29acf1a234c7ca3a5ae899", credential: "CW4V8T/D1+AnGnED" },
        { urls: "turn:standard.relay.metered.ca:80?transport=tcp", username: "cc29acf1a234c7ca3a5ae899", credential: "CW4V8T/D1+AnGnED" },
        { urls: "turn:standard.relay.metered.ca:443", username: "cc29acf1a234c7ca3a5ae899", credential: "CW4V8T/D1+AnGnED" },
        { urls: "turns:standard.relay.metered.ca:443?transport=tcp", username: "cc29acf1a234c7ca3a5ae899", credential: "CW4V8T/D1+AnGnED" }
    ]
};
let pc=null;
let stream=null;
let unsubscribe=null;

let answerReceived = false;
let settingRemoteDescription = false; 
const addedAdminCandidates = new Set();

window.addEventListener("beforeunload",(e)=>{ e.preventDefault(); e.returnValue=""; });

async function startSharing(){
    try{
        setStatus("화면 선택창을 열고 있습니다...");
        stream=await navigator.mediaDevices.getDisplayMedia({ video:{ frameRate:10 }, audio:false });

        stream.getVideoTracks()[0].onended=()=>{ alert("화면 공유가 종료되었습니다."); location.href="/"; };

        setStatus("WEBRTC 연결 준비중...");
        pc=new RTCPeerConnection(rtcConfig);

        stream.getTracks().forEach(track=>{ pc.addTrack(track,stream); });

        // 🚀 connectionState 변경 시 UI 문구를 건드리지 않고 디버깅 로그만 기록
        pc.onconnectionstatechange=()=>{
            console.log("[CLIENT] Connection State:", pc.connectionState);
        };
        pc.oniceconnectionstatechange=()=>{
            console.log("[CLIENT] ICE Connection State:", pc.iceConnectionState);
        };

        pc.onicecandidate = async (event)=>{
            if(!event.candidate) return;
            console.log("[CLIENT] Candidate 생성 성공 -> Firestore 전송:", event.candidate.candidate);
            try{
                await updateDoc(userRef,{ clientCandidates: arrayUnion(event.candidate.toJSON()) });
            }catch(e){ console.error(e); }
        };

        // 🚀 초기화 시 sharing: false 추가
        await updateDoc(userRef,{
            online:true, state:"live", mode:"webrtc", sharing:false,
            clientOffer:null, clientCandidates:[],
            adminAnswer:null, adminCandidates:[],
            updatedAt:serverTimestamp()
        });

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        console.log("[CLIENT] setLocalDescription 완료. SignalingState:", pc.signalingState);
        
        await updateDoc(userRef,{ clientOffer: { type: offer.type, sdp: offer.sdp } });
        
        // 🚀 기존 "기다리는 중" 문구를 지우고 대기 문구 즉시 출력
        setStatus("관리자와 연결됨. (관리자와 공유 대기 중)");

    }catch(e){ console.error(e); alert(e.message); }
}

function waitAdminAnswer() {
    unsubscribe = onSnapshot(userRef, async (snapshot) => {
        if (!snapshot.exists() || !pc) return;
        const data = snapshot.data();

        // 🚀 실시간 sharing 필드 감시를 통한 최우선 문구 제어
        if (data.sharing === true) {
            setStatus("관리자와 공유 중");
        } else {
            setStatus("관리자와 연결됨. (관리자와 공유 대기 중)");
        }

        if (data.adminAnswer) {
            console.log("[CLIENT] adminAnswer 감지됨 (현재 플래그상태 - received:", answerReceived, "/ locking:", settingRemoteDescription, ")");
        }

        if (data.adminAnswer && !answerReceived && !settingRemoteDescription && !pc.currentRemoteDescription) {
            settingRemoteDescription = true; 
            try {
                const answer = new RTCSessionDescription(data.adminAnswer);
                console.log("[CLIENT] 원격 디스크립션 설정 시도. 현재 SignalingState:", pc.signalingState);
                
                await pc.setRemoteDescription(answer);
                answerReceived = true; 
                console.log("[CLIENT] setRemoteDescription 성공 완료. 변경된 SignalingState:", pc.signalingState);
            } catch (e) { 
                console.error("[CLIENT] 원격 디스크립션 설정 중 에러 발생:", e); 
            } finally {
                settingRemoteDescription = false; 
            }
        }

        if (data.adminCandidates && Array.isArray(data.adminCandidates)) {
            console.log("[CLIENT] Firestore 보관된 관리자 Candidate 개수:", data.adminCandidates.length);

            for (const candidate of data.adminCandidates) {
                if (!answerReceived) continue; 

                const key = JSON.stringify(candidate);
                if (addedAdminCandidates.has(key)) continue;

                try {
                    await pc.addIceCandidate(new RTCIceCandidate(candidate));
                    addedAdminCandidates.add(key);
                    console.log("[CLIENT] 관리자 Candidate 추가 성공 -> 수신내용:", candidate.candidate);
                } catch (e) { console.warn("[CLIENT] 관리자 Candidate 추가 실패:", e); }
            }
        }
    });
}

async function disconnect() {
    try {
        if (unsubscribe) unsubscribe();
        if (stream) stream.getTracks().forEach(track => track.stop());
        if (pc) { pc.close(); pc = null; } 

        answerReceived = false;
        settingRemoteDescription = false;
        addedAdminCandidates.clear();

        await updateDoc(userRef, {
            online: false, state: "offline", mode: "firebase", sharing: false,
            clientOffer: null, adminAnswer: null,
            clientCandidates: [], adminCandidates: [],
            updatedAt: serverTimestamp()
        });
    } catch (e) { console.warn(e); }
}

window.addEventListener("unload", () => { disconnect(); });

(async () => {
    const snap = await getDoc(userRef);
    if (!snap.exists()) { alert("계정을 찾을 수 없습니다."); location.href = "/"; return; }
    
    // 🚀 타이밍 버그 방지: 스냅샷 리스너를 먼저 열고 나서 화면 공유 시작
    waitAdminAnswer();
    await startSharing();
})();
</script>
</body>
</html>
