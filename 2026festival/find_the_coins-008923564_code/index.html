  <script src="/_sdk/e063511df281944a.editing_sdk.js" integrity="sha512-Xa8p4aPfoMxVnzxQE2WAG0FfoaPLxdjOJMfUZGm1yZosJTYmnNDvgLkJ2EoN0i3zxjeQVAzUMSXNvTKQVqbXyQ=="></script>
  <script>
    const startScreen = document.getElementById('start-screen');
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const playBtn = document.getElementById('play-btn');
    const colBtn = document.getElementById('col-btn');
    const spawnBtn = document.getElementById('spawn-btn');

    let gameStarted = false;

    playBtn.addEventListener('click', () => {
        startScreen.style.display = 'none';
        canvas.style.display = 'block';
        colBtn.style.display = 'block';
        spawnBtn.style.display = 'block';
        gameStarted = true;
    });

    spawnBtn.addEventListener('click', () => {
        px = MAP_W / 2;
        py = MAP_H / 2;
    });

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const MAP_W = 3000, MAP_H = 3000;
    const PLAYER_SIZE = 40, SPEED = 7;
    let px = MAP_W / 2, py = MAP_H / 2;
    const keys = {};

    // [변경점 1] 데이터 구조에 난이도(difficulty) 속성 추가
    const coins = [
        {name:"Yellow Coin", color:"#ffdc00", x:1500, y:1350, found:false, difficulty:"Easy"}
    ];

    // 캐릭터의 생김새를 Canvas 코드로 그리는 헬퍼 함수 (크기 비율 조절용 scale 인자 추가)
    function drawYellowCoinCharacter(ctx, x, y, scale = 1, isFound = true) {
        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        // 아직 획득하지 못한 도감 상태라면 회색조 처리
        const bodyColor = isFound ? "#ffdc00" : "#777777";
        const strokeColor = isFound ? "#000000" : "#333333";
        const borderColor = isFound ? "#ffa500" : "#555555";

        // 1. 다리 그리기
        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = 4 * scale;
        
        ctx.beginPath();
        ctx.moveTo(x - 8 * scale, y + 15 * scale);
        ctx.lineTo(x - 8 * scale, y + 33 * scale);
        ctx.lineTo(x - 18 * scale, y + 33 * scale);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(x + 10 * scale, y + 15 * scale);
        ctx.lineTo(x + 10 * scale, y + 31 * scale);
        ctx.lineTo(x + 23 * scale, y + 31 * scale);
        ctx.stroke();

        // 2. 동전 몸통 외곽 테두리
        ctx.beginPath();
        ctx.arc(x, y, 25 * scale, 0, Math.PI * 2);
        ctx.fillStyle = borderColor;
        ctx.fill();

        // 3. 동전 몸통 내부
        ctx.beginPath();
        ctx.arc(x, y, 23 * scale, 0, Math.PI * 2);
        ctx.fillStyle = bodyColor;
        ctx.fill();

        // 4. 얼굴 그리기
        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = 3 * scale;

        // 왼쪽 눈
        ctx.beginPath();
        ctx.moveTo(x - 5 * scale, y - 10 * scale);
        ctx.lineTo(x - 5 * scale, y + 1 * scale);
        ctx.stroke();

        // 미소 입
        ctx.beginPath();
        ctx.moveTo(x - 13 * scale, y + 9 * scale);
        ctx.lineTo(x - 4 * scale, y + 9 * scale);
        ctx.lineTo(x + 1 * scale, y + 3 * scale);
        ctx.lineTo(x + 8 * scale, y + 3 * scale);
        ctx.stroke();

        ctx.restore();
    }

    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);

    let showCollection = false;
    const modal = document.getElementById('collection-modal');
    document.getElementById('col-btn').onclick = () => {
        showCollection = !showCollection;
        modal.style.display = showCollection ? 'flex' : 'none';
        if (showCollection) renderSlots();
    };
    modal.addEventListener('click', e => { if (e.target === modal) { showCollection = false; modal.style.display = 'none'; }});

    // [변경점 2] 도감(Slots) 렌더링 시 원형 그래픽 대신 캔버스를 생성해 Yellow Coin 캐릭터를 똑같이 드로잉
    function renderSlots() {
        const el = document.getElementById('slots');
        el.innerHTML = '';
        coins.forEach(c => {
            const d = document.createElement('div');
            d.style.cssText = 'background:'+(c.found?'#64dc64':'#b4b4b4')+';border-radius:8px;padding:16px;text-align:center;border:2px solid #333;display:flex;flex-direction:column;align-items:center;justify-content:center;';
            
            // 미니 캐릭터를 그릴 작은 독립형 캔버스 생성
            const slotCanvas = document.createElement('canvas');
            slotCanvas.width = 70;
            slotCanvas.height = 75;
            const sCtx = slotCanvas.getContext('2d');
            
            // 도감용 크기(scale = 0.8)에 맞게 캐릭터 그리기 (미발견 시 회색)
            drawYellowCoinCharacter(sCtx, 35, 30, 0.8, c.found);

            const name = document.createElement('span');
            name.textContent = c.name;
            name.style.cssText = 'font-size:14px;font-weight:700;margin-top:4px;color:#222;';

            // [변경점 3] Easy 난이도 텍스트 태그 생성 및 스타일링
            const diffTag = document.createElement('span');
            diffTag.textContent = `[${c.difficulty}]`;
            diffTag.style.cssText = 'font-size:12px;font-weight:600;color:#007aff;margin-top:2px;';
            
            d.appendChild(slotCanvas);
            d.appendChild(name);
            d.appendChild(diffTag); // 난이도 표시 추가
            el.appendChild(d);
        });
    }

    function showCoinPopup(coin) {
        const popup = document.createElement('div');
        popup.className = 'coin-popup';
        
        const text = document.createElement('div');
        text.className = 'coin-popup-text';
        text.textContent = 'YOU FOUND';
        
        const circle = document.createElement('div');
        circle.className = 'coin-popup-circle';
        circle.style.backgroundColor = coin.color;
        
        popup.appendChild(text);
        popup.appendChild(circle);
        
        document.getElementById('popup-container').appendChild(popup);
        
        setTimeout(() => popup.remove(), 2000);
    }

    function loop() {
        if (keys['w']||keys['W']||keys['ArrowUp']) py -= SPEED;
        if (keys['s']||keys['S']||keys['ArrowDown']) py += SPEED;
        if (keys['a']||keys['A']||keys['ArrowLeft']) px -= SPEED;
        if (keys['d']||keys['D']||keys['ArrowRight']) px += SPEED;
        px = Math.max(0, Math.min(px, MAP_W));
        py = Math.max(0, Math.min(py, MAP_H));

        // collect
        coins.forEach(c => {
            if (!c.found && Math.abs(px - c.x) < 35 && Math.abs(py - c.y) < 35) {
                c.found = true;
                showCoinPopup(c);
            }
        });

        const W = canvas.width, H = canvas.height;
        let cx = px - W/2, cy = py - H/2;
        cx = Math.max(0, Math.min(cx, MAP_W - W));
        cy = Math.max(0, Math.min(cy, MAP_H - H));

        ctx.fillStyle = '#50b450';
        ctx.fillRect(0, 0, W, H);

        // spawn
        ctx.fillStyle = '#fff';
        ctx.fillRect(MAP_W/2-50-cx, MAP_H/2-50-cy, 100, 100);

        // coins
        coins.forEach(c => {
            if (!c.found) {
                drawYellowCoinCharacter(ctx, c.x - cx, c.y - cy, 1, true);
            }
        });

        // player
        ctx.fillStyle = '#3264ff';
        ctx.fillRect(px-cx-PLAYER_SIZE/2, py-cy-PLAYER_SIZE/2, PLAYER_SIZE, PLAYER_SIZE);

        requestAnimationFrame(loop);
    }
    loop();
    </script>
