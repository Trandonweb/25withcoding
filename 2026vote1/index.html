<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>1학년 부장 투표</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #111;
  color: white;
}

h1 { margin-top: 30px; }

button {
  margin: 10px;
  padding: 12px 25px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

/* 후보 카드 */
.candidate {
  display: inline-block;
  margin: 10px;
}

/* 관리자 버튼 (구석탱이) */
#adminToggle {
  position: fixed;
  bottom: 10px;
  right: 10px;
  font-size: 12px;
  opacity: 0.3;
}

/* 관리자 패널 */
#adminPanel {
  display: none;
  position: fixed;
  bottom: 50px;
  right: 10px;
  background: #222;
  padding: 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>1학년 부장 투표</h1>

<h3>학번 입력</h3>
<input type="text" id="studentId" placeholder="예: 20623">

<div id="candidates"></div>

<!-- 🔥 관리자 버튼 -->
<button id="adminToggle" onclick="toggleAdmin()">⚙</button>

<!-- 🔥 관리자 패널 -->
<div id="adminPanel">
  <h3>관리자</h3>
  <input type="text" id="name" placeholder="이름">
  <input type="password" id="key" placeholder="암호">
  <br>
  <button onclick="addCandidate()">추가</button>
</div>

<script>

// 🔥 설정
const voteType = "vote1";
const adminKey = "zheldrhkgkaRpfkaus";

const validStudents = [
"20623","20417","20522","20524","20813","20921",
"10814","10810","10805","10206","10212","10403"
];

const firebaseConfig = {
  apiKey: "AIzaSyCWRXgzbdMRzGw_uG66OqCkc0zoa9Iyx4c",
  authDomain: "withcoding-ff116.firebaseapp.com",
  databaseURL: "https://withcoding-ff116-default-rtdb.firebaseio.com",
  projectId: "withcoding-ff116",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔥 관리자 패널 토글
function toggleAdmin() {
  const panel = document.getElementById("adminPanel");
  panel.style.display = panel.style.display === "none" ? "block" : "none";
}

// 🔥 후보 불러오기
db.ref("votes/" + voteType + "/candidates")
  .on("value", snapshot => {
    const data = snapshot.val() || {};
    const div = document.getElementById("candidates");
    div.innerHTML = "";

    for (let name in data) {
      const wrapper = document.createElement("div");
      wrapper.className = "candidate";

      const btn = document.createElement("button");
      btn.innerText = name + " (" + data[name] + ")";
      btn.onclick = () => vote(name);

      // 🔥 삭제 버튼
      const del = document.createElement("button");
      del.innerText = "❌";
      del.style.fontSize = "12px";
      del.onclick = () => deleteCandidate(name);

      wrapper.appendChild(btn);
      wrapper.appendChild(del);
      div.appendChild(wrapper);
    }
  });

// 🔥 투표
function vote(name) {
  const studentId = document.getElementById("studentId").value.trim();

  if (!studentId) return alert("학번 입력해라");
  if (!validStudents.includes(studentId)) return alert("허용된 학번이 아니다");

  const voterRef = db.ref("voters/" + voteType + "/" + studentId);

  voterRef.get().then(snapshot => {
    if (snapshot.exists()) return alert("이미 투표했다");

    db.ref("votes/" + voteType + "/candidates/" + name)
      .transaction(current => (current || 0) + 1);

    voterRef.set(true);
    alert("투표 완료");
  });
}

// 🔥 후보 추가
function addCandidate() {
  const name = document.getElementById("name").value;
  const key = document.getElementById("key").value;

  if (key !== adminKey) return alert("암호 틀림");
  if (!name) return alert("이름 입력");

  db.ref("votes/" + voteType + "/candidates/" + name).set(0);
  alert("추가 완료");
}

// 🔥 후보 삭제
function deleteCandidate(name) {
  const key = prompt("관리자 암호 입력");

  if (key !== adminKey) return alert("암호 틀림");

  db.ref("votes/" + voteType + "/candidates/" + name).remove();
  alert("삭제 완료");
}

</script>

</body>
</html>
