<!DOCTYPE html>
<html>
<head>
  <title>메모</title>

  <style>
    body {
      font-family: sans-serif;
      background: #f0f0f0;
      padding: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
      background: white;
      cursor: pointer;
    }

    .memo {
      background: white;
      padding: 15px;
      margin-top: 10px;
      border-radius: 12px;
      cursor: pointer;
    }

    .title {
      font-weight: bold;
    }

    .info {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="top-bar">
  <button onclick="goTrash()">휴지통</button>
  <button onclick="goCreate()">+ 새 메모</button>
</div>

<input id="search" placeholder="검색..." oninput="render()" style="width:100%; padding:10px;">

<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCN6oIrvun0LDBJ940l5c7-cfRrJuePIA",
  authDomain: "memo-5123c.firebaseapp.com",
  projectId: "memo-5123c"
});

const db = getFirestore(app);

let notes = [];

async function load() {
  const q = query(collection(db, "notes"), orderBy("createdAt", "desc"));
  const snap = await getDocs(q);

  notes = snap.docs.map(d => ({
    id: d.id,
    ...d.data()
  }));

  render();
}

function render() {
  const search = document.getElementById("search").value.toLowerCase();
  const list = document.getElementById("list");

  list.innerHTML = "";

  const filtered = notes
    .filter(n => !n.deleted)
    .filter(n => n.title.toLowerCase().includes(search));

  if (filtered.length === 0) {
    list.innerHTML = "<div>메모 없음</div>";
    return;
  }

  filtered.forEach(n => {
    const div = document.createElement("div");
    div.className = "memo";

    div.innerHTML = `
      <div class="title">📄 ${n.title}</div>
      <div class="info">
        👤 ${n.authorName || "unknown"} · 🕒 ${new Date(n.createdAt).toLocaleString()}
      </div>
    `;

    div.onclick = () => {
      location.href = "view.html?id=" + n.id;
    };

    list.appendChild(div);
  });
}

function goCreate() {
  location.href = "create.html";
}

function goTrash() {
  location.href = "trash.html";
}

window.goCreate = goCreate;
window.goTrash = goTrash;

load();
</script>

</body>
</html>
