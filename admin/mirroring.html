<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>화면 모니터링</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    background:#181818;
    overflow:hidden;
}

/* 상단바 */

header{
    height:70px;
    background:#232323;
    color:white;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 25px;

    box-shadow:0 3px 10px rgba(0,0,0,.4);
}

.left{

    display:flex;
    align-items:center;
    gap:15px;

}

#back{

    border:none;
    background:#33cc77;
    color:white;

    border-radius:10px;

    padding:10px 18px;

    cursor:pointer;

    font-size:15px;

}

#back:hover{

    background:#29b366;

}

#online{

    font-size:18px;

    font-weight:bold;

}

/* 그리드 */

#grid{

    width:100vw;

    height:calc(100vh - 70px);

    display:grid;

    gap:8px;

    padding:8px;

}

/* 카드 */

.card{

    background:#2a2a2a;

    border-radius:12px;

    overflow:hidden;

    display:flex;

    flex-direction:column;

    cursor:pointer;

    transition:.2s;

    border:2px solid transparent;

}

.card:hover{

    border-color:#33cc77;

}

.cardHeader{

    height:40px;

    background:#202020;

    color:white;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 12px;

    font-size:14px;

}

.status{

    font-size:13px;

}

.preview{

    flex:1;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    background:black;

}

.preview img{

    width:100%;

    height:100%;

    object-fit:contain;

}

.black{

    color:white;

    font-size:22px;

    text-align:center;

}

.live{

    color:#42ff8a;

}

.off{

    color:#ff5555;

}

.away{

    color:#ffd54f;

}

/* 전체화면 보기 */

#viewer{

    position:fixed;

    inset:0;

    background:black;

    display:none;

    flex-direction:column;

    z-index:999;

}

#viewerTop{

    height:60px;

    background:#202020;

    color:white;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 20px;

}

#closeViewer{

    background:#33cc77;

    border:none;

    color:white;

    padding:10px 18px;

    border-radius:10px;

    cursor:pointer;

}

#viewerImage{

    flex:1;

    display:flex;

    justify-content:center;

    align-items:center;

}

#viewerImage img{

    max-width:100%;

    max-height:100%;

    object-fit:contain;

}

</style>

</head>

<body>

<header>

<div class="left">

<button id="back">

← 관리자

</button>

<div id="online">

🟢 접속 0명

</div>

</div>

<div>

화면 모니터링

</div>

</header>

<div id="grid">

<!-- 학생 카드 자동 생성 -->

</div>

<div id="viewer">

<div id="viewerTop">

<div id="viewerTitle">

학생

</div>

<button id="closeViewer">

닫기

</button>

</div>

<div id="viewerImage">

<img id="bigImage">

</div>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
    getFirestore,
    collection,
    doc,
    getDoc,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBgOAO72ArbW8dO7OSYsTVEQtRHT049U20",
    authDomain: "points2026-f5e50.firebaseapp.com",
    projectId: "points2026-f5e50",
    storageBucket: "points2026-f5e50.firebasestorage.app",
    messagingSenderId: "248724251417",
    appId: "1:248724251417:web:02d85cdc4addac98069b88"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 로그인 확인

const myId = localStorage.getItem("userId");

if(!myId){
    location.href="/login?redirect=/admin/mirroring.html";
    throw "";
}

// 권한 확인

const mySnap = await getDoc(doc(db,"users",myId));

if(!mySnap.exists()){
    location.href="/";
    throw "";
}

const me = mySnap.data();

if(me.role!="president" && me.role!="vice"){
    alert("관리자만 접근 가능합니다.");
    location.href="/";
    throw "";
}

document.getElementById("back").onclick=()=>{
    location.href="/admin/";
};

// ---------- Grid 계산 ----------

const grid=document.getElementById("grid");

function setGrid(count){

    let cols=1;

    if(count<=1){

        cols=1;

    }else if(count<=4){

        cols=2;

    }else if(count<=9){

        cols=3;

    }else if(count<=16){

        cols=4;

    }else if(count<=25){

        cols=5;

    }else{

        cols=6;

    }

    grid.style.gridTemplateColumns=
        `repeat(${cols},1fr)`;

}

// ---------- 카드 생성 ----------

function createCard(id,data){

    const card=document.createElement("div");

    card.className="card";

    card.innerHTML=`

    <div class="cardHeader">

        <b>${id}</b>

        <span class="status live">

            ● LIVE

        </span>

    </div>

    <div class="preview">

        <div class="black">

            화면 준비중...

        </div>

    </div>

    `;

    return card;

}

// ---------- 실시간 users ----------

onSnapshot(collection(db,"users"),snap=>{

    grid.innerHTML="";

    const docs=snap.docs;

    document.getElementById("online").innerHTML=
        `🟢 접속 ${docs.length}명`;

    setGrid(docs.length);

    docs.forEach(docu=>{

        const card=createCard(docu.id,docu.data());

        grid.appendChild(card);

    });

});
