  <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        canvas { display: block; }
        
        @keyframes pulse {
          0%, 100% { transform: scale(1); opacity: 0.9; }
          50% { transform: scale(1.05); opacity: 1; }
        }
        .interact-ui {
          animation: pulse 1s infinite ease-in-out;
        }

        /* 하단 회색 바 스크롤바 커스텀 */
        .scroll-container {
          width: 100%;
          overflow-x: auto;
          white-space: nowrap;
          padding: 20px 40px;
          background: #4b5563;
          border-top: 5px solid #1f2937;
          box-shadow: inset 0 3px 8px rgba(0,0,0,0.5), 0 -4px 12px rgba(0,0,0,0.25);
        }
        .scroll-container::-webkit-scrollbar {
          height: 8px;
        }
        .scroll-container::-webkit-scrollbar-track {
          background: #374151;
        }
        .scroll-container::-webkit-scrollbar-thumb {
          background: #4b5563;
          border-radius: 4px;
          border: 2px solid #374151;
        }
        .scroll-content {
          display: inline-flex;
          gap: 30px;
          min-width: max-content;
          padding-right: 100px; /* 끝까지 스크롤해야 보이도록 여백 확보 */
        }
    </style>

 <body data-template-id="__page-root" style="background: rgb(42, 42, 42);">

    }
    .coin-popup {
      animation: popupBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, popupFade 0.5s ease-out 1.5s forwards;

  <script>
    const startScreen = document.getElementById('start-screen');
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const playBtn = document.getElementById('play-btn');
    const colBtn = document.getElementById('col-btn');
    const spawnBtn = document.getElementById('spawn-btn');
    
    const chatBtn = document.getElementById('chat-btn');
    const chatInputContainer = document.getElementById('chat-input-container');
    const chatText = document.getElementById('chat-text');
    const chatSendBtn = document.getElementById('chat-send-btn');

    const detailModal = document.getElementById('detail-modal');
    const detailCanvas = document.getElementById('detail-canvas');
    const detailCtx = detailCanvas.getContext('2d');
    const detailName = document.getElementById('detail-name');
    const detailDiff = document.getElementById('detail-diff');
    const detailDesc = document.getElementById('detail-desc');
    const detailHint = document.getElementById('detail-hint');
    const detailCloseBtn = document.getElementById('detail-close-btn');

    const interactPrompt = document.getElementById('interact-prompt');
    const interactText = document.getElementById('interact-text');

    let gameStarted = false;
    let playerMessage = "";
    let messageTimer = 0;
    let currentMap = "main"; 

    // 타이틀 폰트 맞춤용 깔끔한 원형 코인
    function drawSimpleTitleCoin(ctx, cx, cy, r, bodyColor = "#ffdc00", borderColor = "#ffa500") {
        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = "#000000";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(cx, cy, r - 3, 0, Math.PI * 2);
        ctx.fillStyle = borderColor;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(cx, cy, r - 5.5, 0, Math.PI * 2);
        ctx.fillStyle = bodyColor;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(cx, cy, r - 11, 0, Math.PI * 2);
        ctx.strokeStyle = borderColor;
        ctx.lineWidth = 2.5;
        ctx.stroke();

        ctx.restore();
    }

    // 타이틀 'o' 코인 렌더링
    const titleCoinCanvas = document.getElementById('title-coin-canvas');
    if(titleCoinCanvas) {
        const tCtx = titleCoinCanvas.getContext('2d');
        drawSimpleTitleCoin(tCtx, 22, 22, 18.5, "#ffdc00", "#ffa500");
    }

    // 캐릭터 코인 기본 드로잉 구조
    function drawRealCoinCharacterForDeco(ctx, x, y, scale = 1.25, bodyColor = "#ffdc00", borderColor = "#ffa500", isDark = false) {
        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        const strokeColor = "#000000";
        const eyeLineColor = isDark ? "#ffffff" : "#000000";

        // 1. 다리 (검은색)
        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = 4.5 * scale;
        ctx.beginPath(); ctx.moveTo(x - 9 * scale, y + 15 * scale); ctx.lineTo(x - 9 * scale, y + 34 * scale); ctx.lineTo(x - 20 * scale, y + 34 * scale); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x + 11 * scale, y + 15 * scale); ctx.lineTo(x + 11 * scale, y + 32 * scale); ctx.lineTo(x + 25 * scale, y + 32 * scale); ctx.stroke();

        // 2. 외곽
        ctx.beginPath(); ctx.arc(x, y, 26 * scale, 0, Math.PI * 2); ctx.fillStyle = borderColor; ctx.fill(); ctx.lineWidth = 3.5 * scale; ctx.strokeStyle = strokeColor; ctx.stroke();

        // 3. 메인 바디
        ctx.beginPath(); ctx.arc(x, y, 23 * scale, 0, Math.PI * 2); ctx.fillStyle = bodyColor; ctx.fill();

        // 4. 얼굴 표정 (검은색)
        ctx.strokeStyle = eyeLineColor; ctx.lineWidth = 3.5 * scale;
        ctx.beginPath(); ctx.moveTo(x - 5 * scale, y - 10 * scale); ctx.lineTo(x - 5 * scale, y + 1 * scale); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x - 13 * scale, y + 9 * scale); ctx.lineTo(x - 4 * scale, y + 9 * scale); ctx.lineTo(x + 1 * scale, y + 3 * scale); ctx.lineTo(x + 8 * scale, y + 3 * scale); ctx.stroke();

        ctx.restore();
    }

    // [수정] Wire Frame Coin 전용 드로잉 함수 (노란색 완전 제거, 외곽 윤곽선 초록색, 다리와 눈입은 검은색 유지)
    function drawWireFrameCoinCharacter(ctx, x, y, scale = 1.25, isFound = true) {
        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        const blackStrokeColor = "#000000";
        // 원 부분의 윤곽선만 초록색으로 세팅 (획득 전에는 어두운 초록, 획득 후에는 선명한 네온 초록)
        const outerCircleLineColor = isFound ? "#22c55e" : "#15803d"; 
        const innerBodyBg = isFound ? "#064e3b" : "#14532d"; // 투명 혹은 딥그린 느낌의 사이버 코드 베이스

        // 1. 다리 구조 (검은색 그대로 유지)
        ctx.strokeStyle = blackStrokeColor;
        ctx.lineWidth = 4.5 * scale;
        ctx.beginPath(); ctx.moveTo(x - 9 * scale, y + 15 * scale); ctx.lineTo(x - 9 * scale, y + 34 * scale); ctx.lineTo(x - 20 * scale, y + 34 * scale); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x + 11 * scale, y + 15 * scale); ctx.lineTo(x + 11 * scale, y + 32 * scale); ctx.lineTo(x + 25 * scale, y + 32 * scale); ctx.stroke();

        // 2. 바디 베이스 원형 레이어
        ctx.beginPath();
        ctx.arc(x, y, 25 * scale, 0, Math.PI * 2);
        ctx.fillStyle = innerBodyBg;
        ctx.fill();
        
        // 원형 윤곽선 그리기 (초록색 선)
        ctx.lineWidth = 4.5 * scale;
        ctx.strokeStyle = outerCircleLineColor;
        ctx.stroke();

        // 3. 와이어프레임 격자(Grid) 그리기 (클립 패스로 내부 구체 내부만 꽉 채움)
        ctx.save();
        ctx.beginPath();
        ctx.arc(x, y, 22.5 * scale, 0, Math.PI * 2);
        ctx.clip();

        ctx.strokeStyle = isFound ? "#4ade80" : "#166534"; // 격자선 역시 완전히 초록초록하게 구성
        ctx.lineWidth = 2.5 * scale;

        // 세로줄 격자선
        for (let i = -4; i <= 4; i++) {
            ctx.beginPath();
            ctx.moveTo(x + (i * 6 * scale), y - 28 * scale);
            ctx.lineTo(x + (i * 6 * scale), y + 28 * scale);
            ctx.stroke();
        }
        // 가로줄 격자선
        for (let i = -4; i <= 4; i++) {
            ctx.beginPath();
            ctx.moveTo(x - 28 * scale, y + (i * 6 * scale));
            ctx.lineTo(x + 28 * scale, y + (i * 6 * scale));
            ctx.stroke();
        }
        ctx.restore();

        // 4. 얼굴 표정 (검은색 그대로 유지)
        ctx.strokeStyle = blackStrokeColor;
        ctx.lineWidth = 4.5 * scale;

        // 눈 선
        ctx.beginPath();
        ctx.moveTo(x - 6 * scale, y - 9 * scale);
        ctx.lineTo(x - 6 * scale, y + 2 * scale);
        ctx.stroke();

        // 괴짜 같은 입 선
        ctx.beginPath();
        ctx.moveTo(x - 15 * scale, y + 10 * scale);
        ctx.quadraticCurveTo(x - 2 * scale, y + 10 * scale, x + 5 * scale, y + 3 * scale);
        ctx.lineTo(x + 13 * scale, y + 3 * scale);
        ctx.stroke();

        ctx.restore();
    }

    // 11가지 시그니처 색상 매핑 데이터
    const decoColors = [
        { main: "#ef4444", border: "#b91c1c", dark: false }, // 빨강
        { main: "#f97316", border: "#c2410c", dark: false }, // 주황
        { main: "#ffdc00", border: "#ffa500", dark: false }, // 노랑
        { main: "#22c55e", border: "#15803d", dark: false }, // 초록
        { main: "#3b82f6", border: "#1d4ed8", dark: false }, // 파랑
        { main: "#1e3a8a", border: "#172554", dark: true },  // 남색
        { main: "#a855f7", border: "#7e22ce", dark: false }, // 보라
        { main: "#ec4899", border: "#be185d", dark: false }, // 핑크
        { main: "#1f2937", border: "#111827", dark: true },  // 검정
        { main: "#ffffff", border: "#d1d5db", dark: false }, // 흰색
        { main: "#78350f", border: "#451a03", dark: true }   // 갈색
    ];

    // 11개 일반 데코 코인 그리기
    decoColors.forEach((color, index) => {
        const canvasId = `deco-coin-${index + 1}`;
        const decoCanvas = document.getElementById(canvasId);
        if(decoCanvas) {
            const dCtx = decoCanvas.getContext('2d');
            drawRealCoinCharacterForDeco(dCtx, 40, 42, 1.15, color.main, color.border, color.dark);
        }
    });

    // 게임 데이터 배열 선언 및 관리
    const coins = [
        {
            name: "Yellow Coin", 
            color: "#ffdc00", 
            x: 1500, 
            y: 1350, 
            found: false, 
            difficulty: "Easy",
            description: "기본적인 노란색 코인. 반짝거리지는 않는다.",
            hint: "시작점에서 당신을 반기고 있어요."
        },
        {
            name: "Forgotin", 
            color: "#ff1a1a", 
            x: 0, 
            y: 0, 
            found: false, 
            difficulty: "Hard",
            description: "새빨간 질문의 굴레 속에서 울적해진 미지의 존재입니다.",
            hint: "잊어버렸다고 진심으로 고백해보세요."
        },
        {
            name: "Wild Card Coin",
            color: "#multi",
            x: 0,
            y: 0,
            found: false,
            difficulty: "Hard",
            description: "와일드 카드, 신 중의 신과 같은 존재의 코인 버전입니다. 와일드 카드에게 기도해야 합니다.",
            hint: "기도하는 마음을 적어주세요."
        }

    function sendChatMessage() {
        const txt = chatText.value.trim();
        if (txt.length > 0) {
            playerMessage = txt;
            messageTimer = 180;

            const lowerTxt = txt.toLowerCase();

            if (lowerTxt === "i forgot") {
                const forgotinCoin = coins.find(c => c.name === "Forgotin");
                if (forgotinCoin && !forgotinCoin.found) {
                    forgotinCoin.found = true;
                    showCoinPopup(forgotinCoin);
                }
            }
            
            if (lowerTxt === "pray to wild card" && currentMap === "house") {
                const carpetCenterX = HOUSE_MAP_W / 2;
                const carpetCenterY = (HOUSE_MAP_H / 2) + 80;
                const distToCarpet = Math.hypot(px - carpetCenterX, py - carpetCenterY);
                
                if (distToCarpet <= 95) {
                    const wildCardCoin = coins.find(c => c.name === "Wild Card Coin");
                    if (wildCardCoin && !wildCardCoin.found) {
                        wildCardCoin.found = true;
                        showCoinPopup(wildCardCoin);
                    }
                }
            }
            chatText.value = "";
        }
        chatInputContainer.style.display = 'none';
    }

        const strokeColor = isFound ? "#000000" : "#333333";
        const borderColor = isFound ? "#ffa500" : "#555555";

        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = 4 * scale;
        
        ctx.beginPath(); ctx.moveTo(x - 8 * scale, y + 15 * scale); ctx.lineTo(x - 8 * scale, y + 33 * scale); ctx.lineTo(x - 18 * scale, y + 33 * scale); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x + 10 * scale, y + 15 * scale); ctx.lineTo(x + 10 * scale, y + 31 * scale); ctx.lineTo(x + 23 * scale, y + 31 * scale); ctx.stroke();

        ctx.beginPath(); ctx.arc(x, y, 25 * scale, 0, Math.PI * 2); ctx.fillStyle = borderColor; ctx.fill();
        ctx.beginPath(); ctx.arc(x, y, 23 * scale, 0, Math.PI * 2); ctx.fillStyle = bodyColor; ctx.fill();

        ctx.strokeStyle = strokeColor; ctx.lineWidth = 3 * scale;
        ctx.beginPath(); ctx.moveTo(x - 5 * scale, y - 10 * scale); ctx.lineTo(x - 5 * scale, y + 1 * scale); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x - 13 * scale, y + 9 * scale); ctx.lineTo(x - 4 * scale, y + 9 * scale); ctx.lineTo(x + 1 * scale, y + 3 * scale); ctx.lineTo(x + 8 * scale, y + 3 * scale); ctx.stroke();

        ctx.restore();
    }

    function drawForgotinCharacter(ctx, x, y, scale = 1, isFound = true) {

        const qColor = isFound ? "#ff0000" : "#666666"; 
        const qStroke = isFound ? "#ff9999" : "#888888";

        ctx.translate(x + 12 * scale, y + 5 * scale); 
        ctx.rotate(45 * Math.PI / 180);               

        ctx.beginPath(); ctx.arc(0, 30 * scale, 15 * scale, 0, Math.PI * 2); ctx.fillStyle = qStroke; ctx.fill();
        ctx.beginPath(); ctx.arc(0, 28 * scale, 12 * scale, 0, Math.PI * 2); ctx.fillStyle = qColor; ctx.fill();

        ctx.lineWidth = 17 * scale; ctx.strokeStyle = qStroke;
        ctx.beginPath(); ctx.moveTo(0, 5 * scale); ctx.quadraticCurveTo(0, -25 * scale, 25 * scale, -35 * scale); ctx.arc(0, -50 * scale, 30 * scale, -Math.PI / 4, -Math.PI, true); ctx.stroke();

        ctx.strokeStyle = qColor; ctx.lineWidth = 13 * scale;
        ctx.beginPath(); ctx.moveTo(0, 5 * scale); ctx.quadraticCurveTo(0, -25 * scale, 25 * scale, -35 * scale); ctx.arc(0, -50 * scale, 30 * scale, -Math.PI / 4, -Math.PI, true); ctx.stroke();
        ctx.restore();

        const cx = x - 8 * scale; const cy = y + 10 * scale; 
        const bodyColor = isFound ? "#ffff00" : "#777777";
        const strokeColor = "#000000";
        const borderColor = isFound ? "#ffa500" : "#555555";

        ctx.strokeStyle = strokeColor; ctx.lineWidth = 3.5 * scale;
        ctx.beginPath(); ctx.moveTo(cx - 5 * scale, cy + 10 * scale); ctx.lineTo(cx - 5 * scale, cy + 25 * scale); ctx.lineTo(cx - 14 * scale, cy + 25 * scale); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 5 * scale, cy + 10 * scale); ctx.lineTo(cx + 5 * scale, cy + 25 * scale); ctx.lineTo(cx + 14 * scale, cy + 25 * scale); ctx.stroke();

        ctx.beginPath(); ctx.arc(cx, cy, 16 * scale, 0, Math.PI * 2); ctx.fillStyle = borderColor; ctx.fill();
        ctx.beginPath(); ctx.arc(cx, cy, 14 * scale, 0, Math.PI * 2); ctx.fillStyle = bodyColor; ctx.fill();

        ctx.strokeStyle = strokeColor; ctx.lineWidth = 2.5 * scale;
        ctx.beginPath(); ctx.moveTo(cx - 4 * scale, cy - 6 * scale); ctx.lineTo(cx - 4 * scale, cy + 1 * scale); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx - 8 * scale, cy + 8 * scale); ctx.quadraticCurveTo(cx - 3 * scale, cy + 4 * scale, cx + 1 * scale, cy + 9 * scale); ctx.lineTo(cx + 6 * scale, cy + 5 * scale); ctx.stroke();

        ctx.restore();
    }

    function drawWildCardCoinCharacter(ctx, x, y, scale = 1, isFound = true) {
        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        const redColor = isFound ? "#ef4444" : "#666666";
        const blueColor = isFound ? "#3b82f6" : "#444444";
        const yellowColor = isFound ? "#eab308" : "#888888";
        const greenColor = isFound ? "#22c55e" : "#555555";
        const cardBg = isFound ? "#333333" : "#222222";

        ctx.save();
        ctx.translate(x + 20 * scale, y - 18 * scale);
        ctx.rotate(18 * Math.PI / 180);

        const cardW = 50 * scale; const cardH = 76 * scale;

        ctx.fillStyle = "#000000"; ctx.beginPath(); ctx.roundRect(-cardW/2, -cardH/2, cardW, cardH, 6 * scale); ctx.fill();
        ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.roundRect(-cardW/2 + 3*scale, -cardH/2 + 3*scale, cardW - 6*scale, cardH - 6*scale, 4 * scale); ctx.fill();
        ctx.fillStyle = cardBg; ctx.beginPath(); ctx.roundRect(-cardW/2 + 6*scale, -cardH/2 + 6*scale, cardW - 12*scale, cardH - 12*scale, 3 * scale); ctx.fill();

        ctx.save();
        ctx.rotate(-25 * Math.PI / 180);
        const er1 = 12 * scale, er2 = 18 * scale;
        ctx.fillStyle = greenColor;  ctx.beginPath(); ctx.moveTo(0,0); ctx.ellipse(0,0, er1, er2, 0, -Math.PI/2, 0); ctx.fill();
        ctx.fillStyle = yellowColor; ctx.beginPath(); ctx.moveTo(0,0); ctx.ellipse(0,0, er1, er2, 0, 0, Math.PI/2); ctx.fill();
        ctx.fillStyle = redColor;    ctx.beginPath(); ctx.moveTo(0,0); ctx.ellipse(0,0, er1, er2, 0, Math.PI/2, Math.PI); ctx.fill();
        ctx.fillStyle = blueColor;   ctx.beginPath(); ctx.moveTo(0,0); ctx.ellipse(0,0, er1, er2, 0, Math.PI, -Math.PI/2); ctx.fill();
        ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 1.5 * scale; ctx.beginPath(); ctx.ellipse(0,0, er1, er2, 0, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
        ctx.restore();

        const cx = x; const cy = y; const radius = 23 * scale; const outerRadius = 25 * scale;

        ctx.strokeStyle = "#000000"; ctx.lineWidth = 4 * scale;
        ctx.beginPath(); ctx.moveTo(cx - 8 * scale, cy + 15 * scale); ctx.lineTo(cx - 8 * scale, cy + 33 * scale); ctx.lineTo(cx - 18 * scale, cy + 33 * scale); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 10 * scale, cy + 15 * scale); ctx.lineTo(cx + 10 * scale, cy + 31 * scale); ctx.lineTo(cx + 23 * scale, cy + 31 * scale); ctx.stroke();

        ctx.fillStyle = isFound ? "#ffa500" : "#555555";
        ctx.beginPath(); ctx.arc(cx, cy, outerRadius, 0, Math.PI*2); ctx.fill();

        ctx.fillStyle = blueColor;   ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, radius, -Math.PI/2, 0); ctx.fill();
        ctx.fillStyle = greenColor;  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, radius, 0, Math.PI/2); ctx.fill();
        ctx.fillStyle = yellowColor; ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, radius, Math.PI/2, Math.PI); ctx.fill();
        ctx.fillStyle = redColor;    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, radius, Math.PI, -Math.PI/2); ctx.fill();

        ctx.strokeStyle = "#000000"; ctx.lineWidth = 1.5 * scale;
        ctx.beginPath(); ctx.moveTo(cx - radius, cy); ctx.lineTo(cx + radius, cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx, cy - radius); ctx.lineTo(cx + radius, cy); ctx.stroke();

        ctx.strokeStyle = "#000000"; ctx.lineWidth = 3 * scale;
        ctx.beginPath(); ctx.moveTo(cx - 5 * scale, cy - 10 * scale); ctx.lineTo(cx - 5 * scale, cy + 1 * scale); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx - 13 * scale, y + 9 * scale); ctx.lineTo(cx - 4 * scale, y + 9 * scale); ctx.lineTo(cx + 1 * scale, y + 3 * scale); ctx.lineTo(cx + 8 * scale, y + 3 * scale); ctx.stroke();

        ctx.restore();
    }

        if(document.activeElement === chatText) {
            if(e.key === 'Tab') {
                e.preventDefault();
                toggleChat();
            }
            return;

            teleportToSpawn();

        keys[e.key] = true;
        if (e.key === 'e' || e.key === 'E') {
            handleInteraction();
        }

        if(e.key !== 'Tab') {

    function handleInteraction() {
        if (currentMap === "main") {
            const dist = Math.hypot(px - houseObj.doorX, py - houseObj.doorY);
            if (dist < houseObj.radius) {
                currentMap = "house"; 
                px = HOUSE_MAP_W / 2; 
                py = HOUSE_MAP_H - 80;
                interactPrompt.style.display = 'none'; 
            }
        } else if (currentMap === "house") {
            const dist = Math.hypot(px - houseExitObj.x, py - houseExitObj.y);
            if (dist < houseExitObj.radius) {
                currentMap = "main"; 
                px = houseObj.doorX;

                interactPrompt.style.display = 'none';
            }
        }

            detailDiff.style.background = "#f0f7ff";

    function renderSlots() {
        const el = document.getElementById('slots');

            d.style.cssText = 'background:'+(c.found?'#64dc64':'#b4b4b4')+';border-radius:8px;padding:16px;text-align:center;border:2px solid #333;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.1s;';

            if(c.name === "Forgotin") {

            } else if(c.name === "Wild Card Coin") {
                drawWildCardCoinCharacter(sCtx, 55, 45, 0.8, c.found);

                drawWireFrameCoinCharacter(sCtx, 55, 45, 0.8, c.found);

                drawYellowCoinCharacter(sCtx, 55, 45, 0.8, c.found);
            }

            const name = document.createElement('span');
            name.textContent = c.name;
            name.style.cssText = 'font-size:14px;font-weight:700;margin-top:4px;color:#222;';

            const diffTag = document.createElement('span');
            diffTag.textContent = `[${c.difficulty}]`;
            
            let diffColor = "#007aff";
            if(c.difficulty === "Hard") diffColor = "#ff1a1a";

    function drawSpeechBubble(ctx, text, playerX, playerY) {
        ctx.save();
        ctx.font = "bold 14px 'DM Sans', sans-serif";
        const textMetrics = ctx.measureText(text);
        const paddingH = 14; const paddingV = 8;
        const bubbleW = textMetrics.width + paddingH * 2; const bubbleH = 30;
        
        const bx = playerX - bubbleW / 2;
        const by = playerY - PLAYER_SIZE / 2 - bubbleH - 15;

        ctx.fillStyle = "#ffffff"; ctx.strokeStyle = "#333333"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.roundRect(bx, by, bubbleW, bubbleH, 8); ctx.fill(); ctx.stroke();

        ctx.beginPath(); ctx.moveTo(playerX - 6, by + bubbleH); ctx.lineTo(playerX, by + bubbleH + 8); ctx.lineTo(playerX + 6, by + bubbleH); ctx.fillStyle = "#ffffff"; ctx.fill(); ctx.stroke();

        ctx.fillStyle = "#222222"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(text, playerX, by + bubbleH / 2);
        ctx.restore();
    }

        ctx.beginPath(); ctx.moveTo(wcx + 5, wcy - 10); ctx.lineTo(wcx + 20, wcy - 2); ctx.lineTo(wcx + 10, wcy + 7); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(wcx - 8, wcy + 15); ctx.quadraticCurveTo(wcx, wcy + 8, wcx + 10, wcy + 13); ctx.stroke();
        ctx.fillStyle = "#fff"; ctx.fillRect(wcx - cardW/2 + 10, wcy - cardH/2 + 10, 10, 14); ctx.fillRect(wcx + cardW/2 - 20, wcy + cardH/2 - 24, 10, 14);

        ctx.textAlign = "center";
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 22px 'DM Sans', sans-serif"; ctx.fillText("WILD CARD", wcx, wcy + cardH/2 + 35);
        ctx.fillStyle = "#ffb703"; ctx.font = "italic 15px 'DM Sans', sans-serif"; ctx.fillText("(pray to him.)", wcx, wcy + cardH/2 + 58);
        ctx.restore();
    }

    function loop() {
        if (!gameStarted) {
            requestAnimationFrame(loop);
            return;
        }

        const activeMapW = (currentMap === "main") ? MAP_W : HOUSE_MAP_W;
        const activeMapH = (currentMap === "main") ? MAP_H : HOUSE_MAP_H;

        if (keys['w']||keys['W']||keys['ArrowUp']) py -= SPEED;
        if (keys['s']||keys['S']||keys['ArrowDown']) py += SPEED;
        if (keys['a']||keys['A']||keys['ArrowLeft']) px -= SPEED;
        if (keys['d']||keys['D']||keys['ArrowRight']) px += SPEED;
        
        px = Math.max(0, Math.min(px, activeMapW));
        py = Math.max(0, Math.min(py, activeMapH));

        if (currentMap === "main") {
            coins.forEach(c => {
                if (c.x !== 0 && c.y !== 0 && !c.found && Math.abs(px - c.x) < 35 && Math.abs(py - c.y) < 35) {
                    c.found = true;
                    showCoinPopup(c);
                }
            });
        }

        const W = canvas.width, H = canvas.height;
        ctx.clearRect(0, 0, W, H);
        ctx.save();

        let canInteract = false;
        let promptStr = "";

        if (currentMap === "main") {
            let cx = px - W/2; let cy = py - H/2;
            cx = Math.max(0, Math.min(cx, MAP_W - W)); cy = Math.max(0, Math.min(cy, MAP_H - H));

            const dist = Math.hypot(px - houseObj.doorX, py - houseObj.doorY);
            if (dist < houseObj.radius) { canInteract = true; promptStr = "들어가기"; }

            ctx.fillStyle = '#50b450'; ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#fff'; ctx.fillRect(MAP_W/2-50-cx, MAP_H/2-50-cy, 100, 100);

            drawHouse(ctx, houseObj.x - cx, houseObj.y - cy, cx, cy);

            coins.forEach(c => {
                if (!c.found && c.x !== 0 && c.y !== 0) {
                    drawYellowCoinCharacter(ctx, c.x - cx, c.y - cy, 1, true);
                }
            });

            ctx.fillStyle = '#1e3a8a'; ctx.fillRect(px - PLAYER_SIZE/2 - cx, py - PLAYER_SIZE/2 - cy, PLAYER_SIZE, PLAYER_SIZE);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(px - PLAYER_SIZE/2 - cx, py - PLAYER_SIZE/2 - cy, PLAYER_SIZE, PLAYER_SIZE);

            if (playerMessage && messageTimer > 0) {
                drawSpeechBubble(ctx, playerMessage, px - cx, py - cy);
                messageTimer--;
            }
        } else {
            const scale = Math.min(W / HOUSE_MAP_W, H / HOUSE_MAP_H);
            const offsetX = (W - HOUSE_MAP_W * scale) / 2; const offsetY = (H - HOUSE_MAP_H * scale) / 2;

            ctx.translate(offsetX, offsetY); ctx.scale(scale, scale);

            const dist = Math.hypot(px - houseExitObj.x, py - houseExitObj.y);
            if (dist < houseExitObj.radius) { canInteract = true; promptStr = "나가기"; }

            ctx.fillStyle = '#1e1e24'; ctx.fillRect(-offsetX/scale, -offsetY/scale, W/scale, H/scale);
            ctx.fillStyle = '#2d2d35'; ctx.fillRect(0, 0, HOUSE_MAP_W, HOUSE_MAP_H);
            ctx.lineWidth = 6; ctx.strokeStyle = '#4e4e5a'; ctx.strokeRect(0, 0, HOUSE_MAP_W, HOUSE_MAP_H);

            drawCarpet(ctx, 0, 0);
            drawWildCardCharacter(ctx, 0, 0);

            ctx.fillStyle = '#4e4e5a'; ctx.fillRect(houseExitObj.x - 30, houseExitObj.y - 20, 60, 40);
            ctx.fillStyle = '#1e3a8a'; ctx.fillRect(px - PLAYER_SIZE/2, py - PLAYER_SIZE/2, PLAYER_SIZE, PLAYER_SIZE);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(px - PLAYER_SIZE/2, py - PLAYER_SIZE/2, PLAYER_SIZE, PLAYER_SIZE);

            if (playerMessage && messageTimer > 0) { drawSpeechBubble(ctx, playerMessage, px, py); messageTimer--; }
        }

        ctx.restore();

        if (canInteract) {
            interactText.textContent = promptStr; interactPrompt.style.display = 'block';
        } else {
            interactPrompt.style.display = 'none';
        }

        requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
