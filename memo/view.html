<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>메모 보기</title>

  <style>
    body {
      font-family: sans-serif;
      background: #f0f0f0;
      margin: 0;
      padding: 20px;
    }

    .card {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 16px;
      position: relative;
      min-height: 400px;
    }

    h2 {
      margin-top: 0;
    }

    .meta {
      font-size: 13px;
      color: gray;
      margin-bottom: 15px;
    }

    .content {
      white-space: pre-wrap;
      line-height: 1.6;
      display: none;
    }

    .pin-box {
      text-align: center;
      margin-top: 80px;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      width: 150px;
    }

    button {
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-left: 5px;
    }

    .actions {
      position: absolute;
      bottom: 15px;
      right: 15px;
      display: none;
      gap: 8px;
    }

    .edit {
      background: #111;
      color: white;
    }

    .delete {
      background: #ff4d4d;
      color: white;
    }
  </style>
</head>

<body>

<div class="card">

  <h2 id="title">로딩중...</h2>
  <div class="meta" id="meta"></div>

  <!-- PIN 입력 -->
  <div class="pin-box" id="pinBox">
    <p>PIN 입력</p>
    <input id="pinInput" type="password" maxlength="4">
    <button onclick="checkPin()">확인</button>
  </div>

  <!-- 내용 -->
  <div class="content" id="content"></div>

  <!-- 버튼 -->
  <div class="actions" id="actions">
    <button class="edit" onclick="goEdit()">수정</button>
    <button class="delete" onclick="deleteMemo()">삭제</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCN6oIrvun0LDBJ940l5c7-cfRrJuePIA",
  authDomain: "memo-5123c.firebaseapp.com",
  projectId: "memo-5123c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");

let memoRef;
let memoData;

async function load() {
  memoRef = doc(db, "notes", id);
  const snap = await getDoc(memoRef);

  if (!snap.exists()) {
    alert("메모 없음");
    location.href = "index.html";
    return;
  }

  memoData = snap.data();

  document.getElementById("title").innerText = memoData.title;
  document.getElementById("meta").innerText =
  `작성자: ${memoData.authorName || "unknown"} · ${memoData.createdAt.toDate().toLocaleString()}`;

function checkPin() {
  const pin = document.getElementById("pinInput").value;

  if (pin !== memoData.pin) {
    alert("PIN 틀림");
    return;
  }

  document.getElementById("pinBox").style.display = "none";
  document.getElementById("content").style.display = "block";
  document.getElementById("actions").style.display = "flex";

  document.getElementById("content").innerText = memoData.content;
}

async function deleteMemo() {
  if (!confirm("삭제할까요?")) return;

  await updateDoc(memoRef, {
    deleted: true
  });

  location.href = "index.html";
}

function goEdit() {
  location.href = "edit.html?id=" + id;
}

window.checkPin = checkPin;
window.deleteMemo = deleteMemo;
window.goEdit = goEdit;

load();
</script>

</body>
</html>
