<!DOCTYPE html>
<html>
<body>

<h2>비밀번호 변경</h2>

<input id="pw1" type="password" placeholder="새 비밀번호">
<input id="pw2" type="password" placeholder="비밀번호 확인">
<button onclick="toggle()">👁</button>
<br><br>
<button onclick="change()">변경</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgOAO72ArbW8dO7OSYsTVEQtRHT049U20",
  authDomain: "points2026-f5e50.firebaseapp.com",
  projectId: "points2026-f5e50"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function valid(pw){
  const hasEng = /[a-zA-Z]/.test(pw);
  const hasNum = /[0-9]/.test(pw);
  const hasSpec = /[^a-zA-Z0-9]/.test(pw);

  let count = 0;
  if(hasEng) count++;
  if(hasNum) count++;
  if(hasSpec) count++;

  return pw.length >= 6 && count >= 2;
}

window.toggle = () => {
  const p1 = document.getElementById("pw1");
  const p2 = document.getElementById("pw2");
  const type = p1.type === "password" ? "text" : "password";
  p1.type = type;
  p2.type = type;
};

window.change = async () => {
  const id = localStorage.getItem("userId");
  const pw1 = document.getElementById("pw1").value;
  const pw2 = document.getElementById("pw2").value;

  if(pw1 !== pw2){
    alert("비밀번호 불일치");
    return;
  }

  if(!valid(pw1)){
    alert("조건 안 맞음");
    return;
  }

  await updateDoc(doc(db, "users", id), {
    password: pw1
  });

  alert("변경 완료");
  location.href = "main.html";
};
</script>

</body>
</html>
