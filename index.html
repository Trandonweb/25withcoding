<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>코딩과 함께라면</title>

  <style>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%;
      padding: 20px;
      background: #111;
      color: white;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      margin-top: 40px;
      width: 90%;
      max-width: 600px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 15px 0;
      border-radius: 16px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    .card:hover {
      transform: scale(1.03);
      background: #eee;
    }

    .login-box {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 16px;
      text-align: center;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      width: 80%;
      margin-top: 10px;
    }

    button {
      padding: 10px 14px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #111;
      color: white;
    }

    .user {
      margin-top: 10px;
      font-size: 14px;
      color: #555;
    }

  </style>
</head>

<body>

<header>
  코딩과 함께라면
</header>

<!-- 서비스 카드 -->
<div class="container">

  <div class="card" onclick="go('/2025/')">
    2025 기념관
  </div>

  <div class="card" onclick="go('/memo/')">
    저장 공간
  </div>

  <div class="card" onclick="go('/상벌점/')">
    상벌점
  </div>

  <div class="card" onclick="go('/NOTE/')">
    설명용 노트
  </div>

</div>

<script>

  function go(path) {
    location.href = path;
  }

  function login() {

    const id =
      document.getElementById("userIdInput").value;

    if (!id) {
      alert("학번 입력하세요");
      return;
    }

    localStorage.setItem("userId", id);

    updateUI();

  }

  function logout() {

    localStorage.removeItem("userId");

    updateUI();

  }

  function updateUI() {

    const user =
      localStorage.getItem("userId");

    document.getElementById("loginStatus").innerText =
      user ? "로그인됨: " + user : "로그인 안됨";

  }

  updateUI();

</script>

</body>
</html>
