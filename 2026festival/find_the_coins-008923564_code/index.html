<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find The Coins</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 기존 스타일 유지 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; overflow: hidden; background: rgb(42, 42, 42); }
        canvas { display: block; }
        .interact-ui { animation: pulse 1s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.05); opacity: 1; } }
        .scroll-container { width: 100%; overflow-x: auto; white-space: nowrap; padding: 20px 40px; background: #4b5563; border-top: 5px solid #1f2937; }
    </style>
</head>
<body>

    <!-- [UI 영역: Start Screen, Modals, Buttons 등 기존 코드 그대로 유지] -->
    <div id="start-screen">...</div>
    <canvas id="game"></canvas>
    
    <!-- [UI 요소들] -->
    <div id="interact-prompt" class="interact-ui" style="display:none;">...</div>
    <button id="col-btn" style="display:none;">🪙</button>
    <button id="spawn-btn" style="display:none;">📍</button>
    <button id="chat-btn" style="display:none;">💬</button>
    
    <div id="chat-input-container" style="display:none;">...</div>
    <div id="collection-modal" style="display:none;">...</div>
    <div id="detail-modal" style="display:none;">...</div>
    <div id="popup-container"></div>

    <!-- 
      스크립트 로드 순서: 
      데이터가 먼저 로드되고, 그다음에 기능이 로드되어야 합니다.
    -->
    
    <!-- 1. 데이터 및 유틸리티 -->
    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    
    <!-- 2. 게임 핵심 로직 (순서 중요) -->
    <script src="js/maps.js"></script>
    <script src="js/player.js"></script>
    <script src="js/coins.js"></script>
    <script src="js/draw.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/events.js"></script>
    
    <!-- 3. 마지막에 메인 실행 -->
    <script src="js/main.js"></script>

</body>
</html>
