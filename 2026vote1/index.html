<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>1학년 부장 투표</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #111;
  color: white;
}

input {
  padding: 15px;
  font-size: 20px;
  width: 260px;
  margin: 10px;
  border-radius: 10px;
}

.card {
  background: #222;
  margin: 15px auto;
  padding: 15px;
  width: 300px;
  border-radius: 15px;
}

button {
  margin: 5px;
  padding: 10px 20px;
  border-radius: 10px;
  cursor: pointer;
}

#adminToggle {
  position: fixed;
  bottom: 10px;
  right: 10px;
  opacity: 0.3;
}

#adminPanel {
  display: none;
  position: fixed;
  bottom: 60px;
  right: 10px;
  background: #222;
  padding: 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>1학년 부장 투표</h1>

<input id="studentId" placeholder="학번 입력">
<div id="candidates"></div>

<button id="adminToggle" onclick="toggleAdmin()">⚙</button>

<div id="adminPanel">
  <input id="name" placeholder="이름">
  <input id="key" type="password" placeholder="암호"><br>

  <button onclick="addCandidate()">후보 추가</button>
  <button onclick="resetVotes()">투표 초기화</button>
  <button onclick="resetVoters()">투표권 초기화</button>
  <button onclick="toggleResult()">결과 공개/숨김</button>
  <button onclick="logoutAdmin()">관리자 로그아웃</button>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://puioibuxdbpzlxcfgvep.supabase.co',
  'sb_publishable_agNICfNsuyI3ONKIkfEhfQ_82yae41w'
)

const adminKey = "zheldrhkgkaRpfkaus";

const validStudents = [
"20623","20417","20522","20524","20813","20921",
"10814","10810","10805","10206","10212","10403"
];

let isAdmin = localStorage.getItem("isAdmin") === "true";
let showResult = false;
let candidatesData = {};

window.toggleAdmin = function () {
  const p = document.getElementById("adminPanel");
  p.style.display = p.style.display === "none" ? "block" : "none";
}

function checkAdmin() {
  if (isAdmin) return true;
  const key = prompt("관리자 암호");
  if (key === adminKey) {
    isAdmin = true;
    localStorage.setItem("isAdmin", "true");
    alert("관리자 인증됨");
    return true;
  }
  alert("암호 틀림");
  return false;
}

window.logoutAdmin = function () {
  isAdmin = false;
  localStorage.removeItem("isAdmin");
  alert("로그아웃됨");
}

// 🔥 후보 추가 (디버깅 추가)
window.addCandidate = async function () {
  if (!checkAdmin()) return;

  const name = document.getElementById("name").value.trim();
  if (!name) return alert("이름 입력");

  const { data, error } = await supabase
    .from('candidates')
    .insert([{ name }])

  console.log("insert result:", data, error);

  if (error) {
    alert("에러: " + error.message);
    return;
  }

  alert("추가됨");
}

async function loadData() {
  const { data: candidateList } = await supabase.from('candidates').select('*')
  const { data: votes } = await supabase.from('votes').select('*')

  const newData = {}

  (candidateList || []).forEach(c => {
    newData[c.name] = 0
  })

  (votes || []).forEach(v => {
    const name = v.choice?.trim()
    if (newData[name] !== undefined) {
      newData[name]++
    }
  })

  candidatesData = newData
  render()
}

function render() {
  const div = document.getElementById("candidates");
  div.innerHTML = "";

  for (let name in candidatesData) {
    const card = document.createElement("div");

    const title = document.createElement("h2");
    title.innerText = name;

    const voteBtn = document.createElement("button");
    voteBtn.innerText = "투표";
    voteBtn.onclick = () => vote(name);

    card.appendChild(title);
    card.appendChild(voteBtn);
    div.appendChild(card);
  }
}

window.vote = async function (name) {
  const id = document.getElementById("studentId").value.trim();

  if (!validStudents.includes(id)) return alert("학번 오류");

  const { error } = await supabase.from('votes').insert([
    { user_id: id, choice: name }
  ])

  if (error) alert(error.message)
  else alert("투표 완료");
}

loadData()
</script>

</body>
</html>
