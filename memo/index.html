<!DOCTYPE html>
<html>
<head>
  <title>메모</title>

  <style>

    body {
      font-family: sans-serif;
      background: #f0f0f0;
      padding: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 14px;
      background: white;
      cursor: pointer;
      margin: 3px;
    }

    button:hover {
      background: #e6e6e6;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 20px;
      margin-top: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 14px;
      background: white;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    .memo-item {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 16px;
      margin-top: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .memo-item:hover {
      background: #ececec;
    }

    .memo-title {
      font-size: 18px;
      font-weight: bold;
    }

    .memo-info {
      color: gray;
      font-size: 13px;
      margin-top: 5px;
    }

    .empty {
      text-align: center;
      color: gray;
      padding: 30px;
    }

  </style>
</head>

<body>

<div class="top-bar">

  <div>

    <button onclick="goHome()">홈</button>
    <button onclick="goTrash()">휴지통</button>
    <button onclick="resetAllNotes()">초기화</button>

  </div>

  <button onclick="goCreate()">새 메모</button>

</div>

<input
  id="searchInput"
  placeholder="메모 검색..."
  oninput="renderMemos()"
/>

<div id="memoList"></div>

<!-- ===================== -->
<!-- Firebase 추가 부분 -->
<!-- ===================== -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCN6oIrvun0LDBJ940l5c7-cfRrJuePIA",
  authDomain: "memo-5123c.firebaseapp.com",
  projectId: "memo-5123c",
  storageBucket: "memo-5123c.firebasestorage.app",
  messagingSenderId: "984347291633",
  appId: "1:984347291633:web:e80fd3f599f62c46a11e50"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// =====================
// 기존 localStorage 함수
// =====================

async function renderMemos() {

  const memoList =
    document.getElementById("memoList");

  const search =
    document.getElementById("searchInput")
    .value
    .toLowerCase();

  memoList.innerHTML = "로딩중...";

  const snap =
    await getDocs(collection(db, "notes"));

  const notes = [];

  snap.forEach(docu => {
    const data = docu.data();

    if (data.deleted) return;

    notes.push({
      id: docu.id,
      ...data
    });
  });

  const filtered =
    notes.filter(note =>
      note.title.toLowerCase().includes(search)
    );

  memoList.innerHTML = "";

  if (filtered.length === 0) {
    memoList.innerHTML = `
      <div class="card empty">
        메모가 없습니다.
      </div>
    `;
    return;
  }

  filtered.forEach(note => {

    const div =
      document.createElement("div");

    div.className = "memo-item";

    div.innerHTML = `
      <div class="memo-title">
        📄 ${note.title}
      </div>

      <div class="memo-info">
        👤 ${note.author}
        ·
        🕒 ${note.createdAt}
      </div>
    `;

    div.onclick = () => {
      location.href =
        "view.html?id=" + note.id;
    };

    memoList.appendChild(div);

  });

}

// =====================
// 메모 렌더링 (그대로 유지)
// =====================

function renderMemos() {

  const memoList =
    document.getElementById("memoList");

  const search =
    document.getElementById("searchInput")
    .value
    .toLowerCase();

  const notes =
    getNotes()
    .filter(note => !note.deleted);

  memoList.innerHTML = "";

  const filtered =
    notes.filter(note =>
      note.title.toLowerCase().includes(search)
    );

  if (filtered.length === 0) {

    memoList.innerHTML = `
      <div class="card empty">
        메모가 없습니다.
      </div>
    `;

    return;
  }

  filtered.forEach(note => {

    const div =
      document.createElement("div");

    div.className = "memo-item";

    div.innerHTML = `
      <div class="memo-title">
        📄 ${note.title}
      </div>

      <div class="memo-info">
        👤 ${note.author}
        ·
        🕒 ${note.createdAt}
      </div>
    `;

    div.onclick = () => {
      location.href =
        "view.html?id=" + note.id;
    };

    memoList.appendChild(div);

  });

}

// =====================
// 페이지 이동
// =====================

function goCreate() {
  location.href = "create.html";
}

function goTrash() {
  location.href = "trash.html";
}

function goHome() {
  location.href = "https://25withcoding.kr";
}

// =====================
// Firebase 초기화 기능만 추가
// =====================

async function resetAllNotes() {

  const ok =
    confirm("모든 메모를 삭제할까요?");

  if (!ok) return;

  const snap =
    await getDocs(collection(db, "notes"));

  snap.forEach(async (d) => {
    await deleteDoc(doc(db, "notes", d.id));
  });

  alert("초기화 완료!");
  location.reload();

}

// =====================
// 실행
// =====================

renderMemos();

window.renderMemos = renderMemos;
window.goCreate = goCreate;
window.goTrash = goTrash;
window.goHome = goHome;
window.resetAllNotes = resetAllNotes;

</script>

</body>
</html>
