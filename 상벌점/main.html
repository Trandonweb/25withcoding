<!DOCTYPE html>
<html>
<head>
  <title>메인</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background-color: #ac9cff;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      padding: 10px 14px;
      margin: 5px;
      border-radius: 12px;
      border: none;
      background-color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #e0e0e0;
    }

    .card {
      background-color: white;
      padding: 15px;
      border-radius: 20px;
      margin-top: 10px;
    }

    .user-list {
      margin-top: 10px;
    }

    .user-item {
      padding: 10px;
      margin: 5px 0;
      border-radius: 12px;
      background-color: #f5f5f5;
      cursor: pointer;
    }

    .user-item.selected {
      background-color: #d0c2ff;
      font-weight: bold;
    }

    input {
      padding: 10px;
      border-radius: 12px;
      border: none;
      width: 150px;
    }

    .loading-inline {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .spinner {
      border: 4px solid #ddd;
      border-top: 4px solid black;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

  </style>
</head>

<body>

<div class="top-bar">
  <button onclick="goHome()">🏠 홈</button>
  <button onclick="logout()">로그아웃</button>
</div>

<h2>코딩과 함께라면</h2>

<!-- 내 정보 -->
<div class="card" id="myInfo">
  <div class="loading-inline">
    <span>불러오는 중...</span>
    <div class="spinner"></div>
  </div>
</div>

<!-- 대상 리스트 -->
<div class="card user-list" id="userList"></div>

<br>

<input id="scoreInput" type="text" placeholder="상벌점을 입력하세요.">
<button onclick="apply()">적용</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgOAO72ArbW8dO7OSYsTVEQtRHT049U20",
  authDomain: "points2026-f5e50.firebaseapp.com",
  projectId: "points2026-f5e50"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedUser = null;

const myId = localStorage.getItem("userId");

if(!myId){
  alert("로그인 필요");
  location.href = "index.html";
}

// 🔥 내 정보
const mySnap = await getDoc(doc(db, "users", myId));
const myData = mySnap.data();

document.getElementById("myInfo").innerText =
  "이름: " + myData.name +
  " / 점수: " + myData.score +
  " / 역할: " + myData.role;

// 🔥 리스트 UI 생성
const listDiv = document.getElementById("userList");
const querySnapshot = await getDocs(collection(db, "users"));

querySnapshot.forEach((docu) => {
  const d = docu.data();

  const div = document.createElement("div");
  div.className = "user-item";
  div.innerText = docu.id + " - " + d.name + " (" + d.score + ")";

  div.onclick = () => {
    document.querySelectorAll(".user-item").forEach(el => el.classList.remove("selected"));
    div.classList.add("selected");
    selectedUser = docu.id;
  };

  listDiv.appendChild(div);
});

// 🔥 점수 적용
window.apply = async () => {
  if(myData.role === "student"){
    alert("권한 없음");
    return;
  }

  if(!selectedUser){
    alert("대상 선택");
    return;
  }

  const val = Number(document.getElementById("scoreInput").value);

  if(isNaN(val)){
    alert("숫자 입력");
    return;
  }

  await updateDoc(doc(db, "users", selectedUser), {
    score: increment(val)
  });

  alert("적용 완료");
  location.reload();
};

// 🔥 로그아웃
window.logout = () => {
  localStorage.removeItem("userId");
  location.href = "index.html";
};

// 🔥 홈 이동
window.goHome = () => {
  location.href = "https://25withcoding.kr";
};
</script>

</body>
</html>
