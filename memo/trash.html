<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>휴지통</title>

  <style>

    body {
      font-family: sans-serif;
      background: #f0f0f0;
      margin: 0;
      padding: 20px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: white;
    }

    button:hover {
      background: #eee;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 16px;
      margin-top: 10px;
    }

    .memo {
      background: #f9f9f9;
      padding: 12px;
      border-radius: 12px;
      margin: 8px 0;
      cursor: pointer;
    }

    .memo:hover {
      background: #eee;
    }

    .empty {
      color: gray;
      text-align: center;
      margin-top: 30px;
    }

  </style>
</head>

<body>

<div class="top">

  <button onclick="goHome()">홈</button>

  <button onclick="goList()">← 목록</button>

</div>

<h2>🗑 휴지통</h2>

<div class="card" id="list">
  로딩중...
</div>

<script type="module">

import { db } from "/js/firebase.js";
import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const listDiv =
  document.getElementById("list");

async function loadTrash() {

  const snap =
    await getDocs(collection(db, "notes"));

  listDiv.innerHTML = "";

  let hasData = false;

  snap.forEach(docu => {

    const data = docu.data();

    if (!data.deleted) return;

    hasData = true;

    const div =
      document.createElement("div");

    div.className = "memo";

    div.innerHTML = `
      <b>${data.title}</b><br>
      <small>${data.author}</small>
    `;

    div.onclick = () => {
      location.href =
        "view.html?id=" + docu.id;
    };

    listDiv.appendChild(div);

  });

  if (!hasData) {
    listDiv.innerHTML =
      "<div class='empty'>휴지통이 비어있음</div>";
  }

}

function goHome() {
  location.href = "/";
}

function goList() {
  location.href = "index.html";
}

loadTrash();

</script>

</body>
</html>
