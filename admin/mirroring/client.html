<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>화면 공유</title>
<style>
body{margin:0;font-family:sans-serif;background:#f0f0f0;display:flex;justify-content:center;align-items:center;height:100vh;}
.box{width:90%;max-width:600px;background:white;padding:30px;border-radius:20px;box-shadow:0 0 20px rgba(0,0,0,.1);}
h1{margin-top:0;color:#27ae60;}
.status{margin-top:20px;font-size:18px;font-weight:bold;}
.warn{margin-top:25px;color:red;line-height:1.7;}
</style>
</head>
<body>

<div class="box">
<h1>화면 공유 중</h1>
<p>관리자에게 화면을 공유하고 있습니다.<br>이 창을 닫지 마세요.</p>
<div class="status" id="status">연결 준비중...</div>
<div class="warn">
- 창을 닫으면 화면 공유가 종료됩니다.<br>
- 새로고침하지 마세요.<br>
- 뒤로가기 하지 마세요.<br>
- 공유가 종료되면 다시 로그인해야 합니다.
</div>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {getFirestore, doc, getDoc, updateDoc, onSnapshot, arrayUnion, serverTimestamp} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig={
    apiKey:"AIzaSyBgOAO72ArbW8dO7OSYsTVEQtRHT049U20",
    authDomain:"points2026-f5e50.firebaseapp.com",
    projectId:"points2026-f5e50",
    storageBucket:"points2026-f5e50.firebasestorage.app",
    messagingSenderId:"248724251417",
    appId:"1:248724251417:web:02d85cdc4addac98069b88"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const userId=localStorage.getItem("userId");

if(!userId){
    alert("로그인이 필요합니다.");
    location.href="/";
}

const userRef=doc(db,"users",userId);
const statusEl=document.getElementById("status");
function setStatus(text){ statusEl.innerText=text; }

const rtcConfig={ iceServers:[{ urls:"stun:stun.l.google.com:19302" }] };
let pc=null;
let stream=null;
let unsubscribe=null;

let answerReceived = false;
const addedAdminCandidates = new Set();

// ==========================================
// 창 닫기 방지
// ==========================================
window.addEventListener("beforeunload",(e)=>{
    e.preventDefault();
    e.returnValue="";
});

// ==========================================
// 화면 공유 시작
// ==========================================
async function startSharing(){
    try{
        setStatus("화면 선택창을 열고 있습니다...");
        stream=await navigator.mediaDevices.getDisplayMedia({
            video:{ frameRate:10 },
            audio:false
        });

        console.log("[CLIENT] 수집된 스트림 전체 트랙:", stream.getTracks());
        console.log("[CLIENT] 비디오 트랙 상세:", stream.getVideoTracks());

        stream.getVideoTracks()[0].onended=()=>{
            alert("화면 공유가 종료되었습니다.");
            location.href="/";
        };

        setStatus("WEBRTC 연결 준비중...");
        pc=new RTCPeerConnection(rtcConfig);

        stream.getTracks().forEach(track=>{
            pc.addTrack(track,stream);
        });

        pc.onconnectionstatechange=()=>{
            console.log("[CLIENT] Connection State 변경됨:", pc.connectionState);
            switch(pc.connectionState){
                case "connected": setStatus("관리자와 연결되었습니다."); break;
                case "connecting": setStatus("연결 중..."); break;
                case "failed": setStatus("연결 실패"); break;
                case "disconnected": setStatus("연결이 끊겼습니다."); break;
            }
        };

        pc.onicecandidate = async (event)=>{
            if(!event.candidate){
                console.log("[CLIENT] Candidate 생성 종료");
                return;
            }
            
            console.log("[CLIENT] Candidate 생성:", event.candidate.candidate);
            
            try{
                await updateDoc(userRef,{
                    clientCandidates: arrayUnion(event.candidate.toJSON())
                });
            }catch(e){ console.error(e); }
        };

        await updateDoc(userRef,{
            online:true,
            state:"live",
            mode:"webrtc",
            clientOffer:null,
            clientCandidates:[],
            adminAnswer:null,
            adminCandidates:[],
            updatedAt:serverTimestamp()
        });

        console.log("1 : createOffer 시작");
        const offer = await pc.createOffer();
        
        console.log("2 : createOffer 성공");
        await pc.setLocalDescription(offer);
        
        console.log("[CLIENT] setLocalDescription 직후 SignalingState:", pc.signalingState);
        
        await updateDoc(userRef,{
            clientOffer: {
                type: offer.type,
                sdp: offer.sdp
            }
        });
        
        console.log("4 : Firestore 저장 성공");
        setStatus("관리자의 연결을 기다리는 중...");

    }catch(e){
        console.error(e);
        alert(e.message);
    }
}

// ==========================================
// 관리자의 Answer 및 Candidate 실시간 감시
// ==========================================
function waitAdminAnswer() {
    unsubscribe = onSnapshot(userRef, async (snapshot) => {
        if (!snapshot.exists()) return;
        if (!pc) return;

        const data = snapshot.data();

        // 🔍 피드백 반영: 실시간 adminAnswer 수신 감지 로그
        if (data.adminAnswer) {
            console.log("[CLIENT] adminAnswer 감지:", data.adminAnswer);
        }

        // 1. Answer 수신 및 원격 Description 적용
        if (data.adminAnswer && !answerReceived && !pc.currentRemoteDescription) {
            try {
                const answer = new RTCSessionDescription(data.adminAnswer);
                
                console.log("[CLIENT] Remote Description 설정 전 SignalingState:", pc.signalingState);
                await pc.setRemoteDescription(answer);
                console.log("[CLIENT] Remote Description 설정 후 SignalingState:", pc.signalingState);
                
                answerReceived = true;
                setStatus("관리자와 연결되었습니다.");
                console.log("[CLIENT] Answer 적용 완료");
            } catch (e) { console.error(e); }
        }

        // 2. 관리자 ICE Candidate 수신 처리
        if (data.adminCandidates && Array.isArray(data.adminCandidates)) {
            // 🔍 피드백 반영: 수신된 Candidate 배열 개수 로그
            console.log("[CLIENT] 관리자 Candidate 개수:", data.adminCandidates.length);

            for (const candidate of data.adminCandidates) {
                if (!answerReceived) {
                    continue;
                }

                const key = JSON.stringify(candidate);
                if (addedAdminCandidates.has(key)) {
                    continue;
                }

                try {
                    await pc.addIceCandidate(new RTCIceCandidate(candidate));
                    addedAdminCandidates.add(key);
                    console.log("[CLIENT] 관리자 Candidate 추가 성공");
                } catch (e) { 
                    console.warn(e); 
                }
            }
        }
    });
}

// ==========================================
// 접속 종료 처리
// ==========================================
async function disconnect() {
    try {
        if (unsubscribe) { unsubscribe(); }
        if (stream) { stream.getTracks().forEach(track => { track.stop(); }); }
        if (pc) { pc.close(); pc = null; } 

        // 피드백 반영: 재연결 세션을 위한 내부 상태 및 Set 초기화
        answerReceived = false;
        addedAdminCandidates.clear();
        console.log("[CLIENT] 세션 상태 초기화 완 (answerReceived = false, Set 비움)");

        await updateDoc(userRef, {
            online: false,
            state: "offline",
            mode: "firebase",
            clientOffer: null,
            adminAnswer: null,
            clientCandidates: [],
            adminCandidates: [],
            updatedAt: serverTimestamp()
        });
    } catch (e) { console.warn(e); }
}

window.addEventListener("unload", () => { disconnect(); });

// ==========================================
// 실행부
// ==========================================
(async () => {
    const snap = await getDoc(userRef);
    if (!snap.exists()) {
        alert("계정을 찾을 수 없습니다.");
        location.href = "/";
        return;
    }
    await startSharing();
    waitAdminAnswer();
})();
</script>
</body>
</html>
