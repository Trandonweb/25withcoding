<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메모 수정</title>

  <style>

    body {
      font-family: sans-serif;
      background: #f0f0f0;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: white;
      max-width: 700px;
      margin: auto;
      padding: 20px;
      border-radius: 16px;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-family: sans-serif;
    }

    textarea {
      height: 200px;
      resize: none;
    }

    button {
      margin-top: 15px;
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-right: 8px;
    }

    .save {
      background: #111;
      color: white;
    }

    .back {
      background: #ddd;
    }

  </style>
</head>

<body>

<div class="card">

  <h2>✏️ 메모 수정</h2>

  <input id="title" placeholder="제목">

  <textarea id="content" placeholder="내용"></textarea>

  <br>

  <button class="save" onclick="saveEdit()">저장</button>
  <button class="back" onclick="goBack()">취소</button>

</div>

<script type="module">

import { db } from "/js/firebase.js";
import {
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const params =
  new URLSearchParams(location.search);

const id =
  params.get("id");

let memoRef;

async function loadMemo() {

  if (!id) {
    alert("잘못된 접근");
    location.href = "index.html";
    return;
  }

  memoRef = doc(db, "notes", id);

  const snap = await getDoc(memoRef);

  if (!snap.exists()) {
    alert("메모 없음");
    location.href = "index.html";
    return;
  }

  const data = snap.data();

  document.getElementById("title").value =
    data.title;

  document.getElementById("content").value =
    data.content;

}

async function saveEdit() {

  const title =
    document.getElementById("title").value;

  const content =
    document.getElementById("content").value;

  if (!title || !content) {
    alert("제목/내용 입력");
    return;
  }

  await updateDoc(memoRef, {
    title: title,
    content: content,
    updatedAt: new Date().toISOString()
  });

  location.href = "view.html?id=" + id;

}

function goBack() {
  location.href = "view.html?id=" + id;
}

window.saveEdit = saveEdit;
window.goBack = goBack;

loadMemo();

</script>

</body>
</html>
