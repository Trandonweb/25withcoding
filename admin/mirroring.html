<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBgOAO72ArbW8dO7OSYsTVEQtRHT049U20",
    authDomain: "points2026-f5e50.firebaseapp.com",
    projectId: "points2026-f5e50",
    storageBucket: "points2026-f5e50.firebasestorage.app",
    messagingSenderId: "248724251417",
    appId: "1:248724251417:web:02d85cdc4addac98069b88"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedId = null;
let peerConnection = null;
let unsubscribeUser = null; 
let adminAnswerCreated = false;
const addedClientCandidates = new Set();
    
const rtcConfig = {
    iceServers: [
        { urls: "stun:stun.relay.metered.ca:80" },
        { urls: "turn:standard.relay.metered.ca:80", username: "cc29acf1a234c7ca3a5ae899", credential: "CW4V8T/D1+AnGnED" },
        { urls: "turn:standard.relay.metered.ca:80?transport=tcp", username: "cc29acf1a234c7ca3a5ae899", credential: "CW4V8T/D1+AnGnED" },
        { urls: "turn:standard.relay.metered.ca:443", username: "cc29acf1a234c7ca3a5ae899", credential: "CW4V8T/D1+AnGnED" },
        { urls: "turns:standard.relay.metered.ca:443?transport=tcp", username: "cc29acf1a234c7ca3a5ae899", credential: "CW4V8T/D1+AnGnED" }
    ]
};
const adminId = localStorage.getItem("userId");

if (!adminId) { alert("로그인이 필요합니다."); location.href = "/signin?redirect=/admin/mirroring.html"; throw new Error("로그인 필요"); }

// 💡 모든 DOM 관련 이벤트 등록을 HTML 로드 이후 시점인 이 함수 내부에서 처리합니다.
async function initAdmin() {
    try {
        const backBtn = document.getElementById("back");
        if (backBtn) {
            backBtn.onclick = () => { location.href = "/"; };
        }

        const closeBtn = document.getElementById("closeViewer");
        if (closeBtn) {
            closeBtn.onclick = async () => {
                document.getElementById("viewer").style.display = "none";
                document.getElementById("bigVideo").srcObject = null;
                
                if (selectedId) {
                    try {
                        await updateDoc(doc(db, "users", selectedId), { sharing: false });
                    } catch (e) { console.error(e); }
                }

                if (peerConnection) { try { peerConnection.close(); } catch(e){} peerConnection = null; }
                if (unsubscribeUser) { unsubscribeUser(); unsubscribeUser = null; }
                selectedId = null; adminAnswerCreated = false; addedClientCandidates.clear();
            };
        }

        const adminSnap = await getDoc(doc(db, "users", adminId));
        if (!adminSnap.exists()) { alert("계정을 찾을 수 없습니다."); location.href = "/"; return; }
        const adminData = adminSnap.data();
        if (adminData.role !== "president" && adminData.role !== "vice") { alert("관리자만 접근 가능합니다."); location.href = "/"; return; }
        loadUsers();
    } catch (error) { console.error(error); }
}

function updateOnlineCount(count) { 
    const onlineEl = document.getElementById("online");
    if (onlineEl) onlineEl.innerText = `🟢 접속 ${count}명`; 
}

function createCard(id, data) {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<h3>${data.name ?? id}</h3><p>ID : ${id}</p><p>상태 : ${data.online ? "온라인" : "오프라인"}</p><p>모드 : ${data.mode ?? "unknown"}</p>`;
    if (data.online === true) { card.onclick = () => { connectStudent(id); }; }
    return card;
}

// 💡 윈도우가 완전히 준비된 후 로드되도록 안전장치 추가
function loadUsers() {
    onSnapshot(collection(db, "users"), (snapshot) => {
        const grid = document.getElementById("grid"); 
        if (!grid) return;
        grid.innerHTML = ""; 
        let onlineCount = 0;
        snapshot.forEach((userDoc) => {
            const data = userDoc.data(); const id = userDoc.id; if (id === adminId) return;
            if (data.online === true) onlineCount++;
            grid.appendChild(createCard(id, data));
        });
        updateOnlineCount(onlineCount);
    });
}

async function connectStudent(userId) {
    if (peerConnection) { try { peerConnection.close(); } catch (e) {} peerConnection = null; }
    if (unsubscribeUser) { unsubscribeUser(); unsubscribeUser = null; }

    selectedId = userId;
    adminAnswerCreated = false;
    addedClientCandidates.clear();

    document.getElementById("viewer").style.display = "flex";
    document.getElementById("viewerTitle").innerText = `${userId} 화면`;

    const userRef = doc(db, "users", userId);
    
    try {
        await updateDoc(userRef, { sharing: true });
    } catch (e) { console.error(e); }

    const snap = await getDoc(userRef);
    if (!snap.exists()) { alert("사용자를 찾을 수 없습니다."); return; }

    const data = snap.data();
    if (!data.clientOffer) { alert("학생이 아직 화면 공유를 시작하지 않았습니다."); return; }

    peerConnection = new RTCPeerConnection(rtcConfig);

    peerConnection.ontrack = (event) => {
        console.log("[ADMIN] ontrack 이벤트 발생! 스트림:", event.streams);
        const video = document.getElementById("bigVideo");
        if (event.streams[0] && video) {
            video.srcObject = event.streams[0];
            video.onloadedmetadata = () => { video.play().catch((e) => console.error(e)); };
        }
    };

    peerConnection.onconnectionstatechange = () => {
        console.log("[ADMIN] Connection State:", peerConnection?.connectionState);
    };
    peerConnection.oniceconnectionstatechange = () => {
        console.log("[ADMIN] ICE Connection State:", peerConnection?.iceConnectionState);
    };

    peerConnection.onicecandidate = async (event) => {
        if (!event.candidate) return;
        console.log("[ADMIN] Candidate 생성 성공 -> Firestore 전송:", event.candidate.candidate);
        try {
            await updateDoc(userRef, { adminCandidates: arrayUnion(event.candidate.toJSON()) });
        } catch (e) { console.error(e); }
    };

    try {
        const offer = data.clientOffer; 
        
        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);

        await updateDoc(userRef, {
            adminAnswer: { type: answer.type, sdp: answer.sdp }
        });

        console.log("[ADMIN] Answer 전송 완료 (Candidate 필드 보존함)");
        adminAnswerCreated = true;

        watchClientCandidates(userId);

    } catch (error) { console.error("WebRTC 설정 에러:", error); }
}

function watchClientCandidates(userId) {
    const userRef = doc(db, "users", userId);
    unsubscribeUser = onSnapshot(userRef, async (snapshot) => {
        if (!snapshot.exists() || !peerConnection) return;
        const data = snapshot.data();

        if (data.clientCandidates && Array.isArray(data.clientCandidates)) {
            console.log("[ADMIN] Firestore 보관된 학생 Candidate 개수:", data.clientCandidates.length);

            for (const candidate of data.clientCandidates) {
                if (!adminAnswerCreated) continue;

                const key = JSON.stringify(candidate);
                if (addedClientCandidates.has(key)) continue;

                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                    addedClientCandidates.add(key);
                    console.log("[ADMIN] 학생 Candidate 추가 성공 -> 수신내용:", candidate.candidate);
                } catch (e) { console.warn("[ADMIN] 학생 Candidate 추가 실패:", e); }
            }
        }
    });
}

// 스크립트가 로드되면 초기화 즉시 실행
initAdmin();
</script>
