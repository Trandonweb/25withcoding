<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI vs HUMAN</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Pretendard",sans-serif;
}

body{
    background:#0f172a;
    color:white;
    width:100%;
    min-height:100vh;
    overflow-x:hidden;
}

#screen{
    width:100%;
    min-height:100vh;
    padding:20px;
}

#homeScreen{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    gap:20px;
}

.logo{
    font-size:4rem;
    margin-bottom:20px;
}

.subtitle{
    color:#94a3b8;
    margin-bottom:30px;
    text-align:center;
    font-size:1rem;
}

.main-btn{
    width:min(600px,95%);
    border:none;
    border-radius:25px;
    background:#22b45c;
    color:white;
    padding:28px;
    font-size:1.4rem;
    cursor:pointer;
    transition:0.2s;
    font-weight:700;
}

.main-btn:hover{
    transform:translateY(-3px);
    background:#1fa451;
}

#categoryScreen,
#gameScreen{
    display:none;
    width:100%;
    min-height:100vh;
    padding:10px;
}

.top-bar{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:25px;
}

.back-btn{
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
    padding:12px 18px;
    cursor:pointer;
    font-size:1rem;
}

.screen-title{
    font-size:1.4rem;
    font-weight:bold;
}

#gameList{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.game-select-btn{
    background:#1e293b;
    border:none;
    color:white;
    border-radius:20px;
    padding:30px;
    font-size:1.2rem;
    cursor:pointer;
    transition:0.2s;
    min-height:140px;
}

.game-select-btn:hover{
    transform:translateY(-3px);
    background:#263548;
}

#gameArea{
    width:100%;
    min-height:calc(100vh - 80px);
    background:#1e293b;
    border-radius:20px;
    padding:25px;
}

.game-title{
    font-size:2rem;
    margin-bottom:20px;
}

.placeholder{
    height:70vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:#94a3b8;
    font-size:1.2rem;
    line-height:1.8;
}

</style>
</head>
<body>

<div id="screen">

    <!-- 홈 -->

    <div id="homeScreen">

        <div class="logo">
            🤖 VS 🧑
        </div>

        <div class="subtitle">
            인간은 AI를 이길 수 있을까?
        </div>

        <button
            class="main-btn"
            onclick="showCategory('intelligence')">
            🧠 지능 대결
        </button>

        <button
            class="main-btn"
            onclick="showCategory('physical')">
            ⚽ 피지컬 대결
        </button>

        <button
            class="main-btn"
            onclick="showRanking()">
            🏆 랭킹
        </button>

    </div>

    <!-- 카테고리 -->

    <div id="categoryScreen">

        <div class="top-bar">

            <button
                class="back-btn"
                onclick="showHome()">
                ←
            </button>

            <div
                class="screen-title"
                id="categoryTitle">
            </div>

        </div>

        <div id="gameList"></div>

    </div>

    <!-- 게임 -->

    <div id="gameScreen">

        <div class="top-bar">

            <button
                class="back-btn"
                onclick="backToCategory()">
                ←
            </button>

            <div
                class="screen-title"
                id="gameTitle">
            </div>

        </div>

        <div id="gameArea"></div>

    </div>

</div>

<script>

const intelligenceGames = [
    "⭕ 틱택토",
    "🧩 미로",
    "🔢 숫자 맞추기"
];

const physicalGames = [
    "⚽ 축구",
    "⚾ 야구"
];

let currentCategory = "";

const homeScreen =
    document.getElementById("homeScreen");

const categoryScreen =
    document.getElementById("categoryScreen");

const gameScreen =
    document.getElementById("gameScreen");

function showHome(){

    homeScreen.style.display =
        "flex";

    categoryScreen.style.display =
        "none";

    gameScreen.style.display =
        "none";
}

function showCategory(type){

    currentCategory = type;

    homeScreen.style.display =
        "none";

    categoryScreen.style.display =
        "block";

    gameScreen.style.display =
        "none";

    document.getElementById(
        "categoryTitle"
    ).textContent =
        type === "intelligence"
        ? "🧠 지능 대결"
        : "⚽ 피지컬 대결";

    const gameList =
        document.getElementById(
            "gameList"
        );

    gameList.innerHTML = "";

    const list =
        type === "intelligence"
        ? intelligenceGames
        : physicalGames;

    list.forEach(game=>{

        const btn =
            document.createElement(
                "button"
            );

        btn.className =
            "game-select-btn";

        btn.textContent =
            game;

        btn.onclick =
            ()=>openGame(game);

        gameList.appendChild(btn);

    });

}

function openGame(game){

    categoryScreen.style.display =
        "none";

    gameScreen.style.display =
        "block";

    document.getElementById(
        "gameTitle"
    ).textContent =
        game;

    document.getElementById(
        "gameArea"
    ).innerHTML = `

        <div class="game-title">
            ${game}
        </div>

        <div class="placeholder">

            아직 구현되지 않았습니다.

            <br><br>

            곧 AI와 인간의 대결이
            시작됩니다.

        </div>

    `;
}

function backToCategory(){

    showCategory(
        currentCategory
    );
}

function showRanking(){

    alert(
        "랭킹 시스템은 추후 구현됩니다."
    );
}

showHome();

</script>

</body>
</html>
