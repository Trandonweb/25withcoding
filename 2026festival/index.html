<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>2026 Festival</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0f0f14;
  color:white;
}

header {
  text-align:center;
  padding:20px;
  font-size:24px;
  font-weight:bold;
  background:linear-gradient(90deg,#4af,#8f4);
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:#1c1c25;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}

.card:hover {
  transform:scale(1.03);
}

.card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

.info {
  padding:10px;
}

.title {
  font-weight:bold;
}

.likes {
  color:#4af;
  margin-top:5px;
}

button {
  margin-top:8px;
  width:100%;
  padding:6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#4af;
  color:white;
}
</style>
</head>

<body>

<header>🎉 2026 Coding Festival</header>

<div class="grid" id="grid"></div>

<script>
// 🔥 임시 데이터 (나중에 Firebase로 교체)
const projects = [
  {
    id:1,
    title:"미니게임",
    img:"https://picsum.photos/300/200?1",
    url:"https://playentry.org/",
    likes:12
  },
  {
    id:2,
    title:"웹 프로젝트",
    img:"https://picsum.photos/300/200?2",
    url:"https://github.com/",
    likes:8
  },
  {
    id:3,
    title:"AI 작품",
    img:"https://picsum.photos/300/200?3",
    url:"https://example.com",
    likes:20
  }
];

const grid = document.getElementById("grid");

function render(){
  grid.innerHTML = "";

  // 🔥 좋아요 순 정렬
  const sorted = [...projects].sort((a,b)=>b.likes-a.likes);

  sorted.forEach(p=>{
    const card = document.createElement("div");
    card.className="card";

    card.innerHTML = `
      <img src="${p.img}">
      <div class="info">
        <div class="title">${p.title}</div>
        <div class="likes">❤️ ${p.likes}</div>
        <button>좋아요</button>
      </div>
    `;

    // 🔗 클릭 → 작품 이동
    card.onclick = () => {
      window.open(p.url, "_blank");
    };

    // ❤️ 좋아요 (로컬 테스트용)
    card.querySelector("button").onclick = (e) => {
      e.stopPropagation();
      p.likes++;
      render();
    };

    grid.appendChild(card);
  });
}

render();
</script>

</body>
</html>
